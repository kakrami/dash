<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Coin Dash: Inferno Foundry</title>
<!-- v1.1.09 -->
<meta name="application-version" content="1.1.09">
<style>
:root{
  --bg:#010207;--surface:#060d1a;--surface-2:#0d1930;--surface-3:#02050c;
  --line:#6fe7ff55;--line-strong:#75ebffb5;--text:#ffffff;--muted:#c3cee0;
  --primary:#ff8a24;--primary-2:#ff3d1f;--accent:#ffd166;--danger:#ff355d;--ok:#65ffb3;
  --radius-sm:10px;--radius:17px;--radius-lg:24px;
  --shadow:0 24px 70px #000b,inset 0 1px #ffffff10;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box}
html,body{
margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
font-family:"Trebuchet MS",Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
touch-action:none;overscroll-behavior:none;-webkit-text-size-adjust:100%
}
.build-version{
position:fixed;left:max(4px,env(safe-area-inset-left,0px));bottom:max(3px,env(safe-area-inset-bottom,0px));
z-index:45;pointer-events:none;user-select:none;color:#dce7f6;opacity:.16;
font:700 6px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.08em
}

button,textarea{font:inherit}
button{appearance:none;border:0}
button:focus-visible,textarea:focus-visible,summary:focus-visible,.joy:focus-visible{outline:3px solid #7edcffaa;outline-offset:2px}
.hide{display:none!important}

.app{
position:fixed;inset:0;height:100dvh;isolation:isolate;overflow:hidden;
background:
radial-gradient(circle at 18% 12%,#ff641f42,transparent 29%),
radial-gradient(circle at 84% 9%,#16d9ff24,transparent 28%),
radial-gradient(circle at 50% 112%,#ffb0002e,transparent 40%),
linear-gradient(150deg,#050201 0%,#120906 48%,#02060b 100%)
}
.screen{position:absolute;inset:0;width:100%;height:100%;min-width:0;min-height:0;overflow:hidden}


.app::before,.app::after{content:'';position:absolute;inset:-20%;pointer-events:none;z-index:-1}
.app::before{
  opacity:.23;
  background-image:
    linear-gradient(#6fe7ff0b 1px,transparent 1px),
    linear-gradient(90deg,#6fe7ff0b 1px,transparent 1px);
  background-size:46px 46px;
  transform:perspective(650px) rotateX(62deg) translateY(38%);
  transform-origin:center bottom;
  animation:arenaGrid 16s linear infinite
}
.app::after{
  background:
    radial-gradient(circle at 30% 40%,#7b5cff13 0 2px,transparent 3px),
    radial-gradient(circle at 70% 65%,#57ddff13 0 2px,transparent 3px);
  background-size:120px 120px,160px 160px;
  animation:ambientDrift 18s ease-in-out infinite alternate
}
@keyframes arenaGrid{to{background-position:0 92px,92px 0}}
@keyframes ambientDrift{to{transform:translate3d(4%,-3%,0) rotate(2deg)}}
@media (prefers-reduced-motion:reduce){
  .app::before,.app::after{animation:none!important}
  .btn{transition:none!important}
}
body.render-balanced .game-hud,body.render-performance .game-hud{backdrop-filter:none}
body.render-performance .app::before,body.render-performance .app::after{animation:none!important}
body.render-performance canvas{box-shadow:0 16px 46px #000c,0 0 24px #49c7ff20,inset 0 0 22px #0008}

/* Shared controls */
.btn{position:relative;isolation:isolate;overflow:hidden;min-height:44px;padding:0 16px;border-radius:12px;color:var(--text);font-size:14px;font-weight:900;cursor:pointer;border:1px solid #ffffff26;background:linear-gradient(180deg,#1d2c48,#09111f);box-shadow:inset 0 1px #ffffff34,0 7px 18px #0008;white-space:nowrap;transition:transform .08s ease,filter .12s ease,border-color .12s ease}
.btn::before{content:'';position:absolute;inset:1px 8px auto;height:1px;background:linear-gradient(90deg,transparent,#ffffff66,transparent);pointer-events:none}
.btn:hover{filter:brightness(1.14);border-color:#ffffff38}
.btn:active{transform:translateY(1px) scale(.99)}
.btn:disabled{opacity:.52;cursor:not-allowed;filter:none}
.btn-primary{
border-color:#67e7ff80;
background:linear-gradient(135deg,#ff9c24 0%,#ff541f 55%,#b71932 100%);
box-shadow:inset 0 1px #ffffff78,0 12px 32px #22bfff55,0 0 28px #8b5cff38
}
.btn-secondary{background:linear-gradient(180deg,#203453,#08101d);border-color:#99dbff55}
.btn-danger{border-color:#ff688a72;background:linear-gradient(180deg,#7b2340,#351020)}
.btn-wide{width:100%}
.btn-menu{min-width:46px;width:46px;display:inline-flex;align-items:center;justify-content:center;gap:0;padding-inline:0}
.btn-menu .menu-icon{font-size:20px;line-height:1}

.logo{
position:relative;width:48px;height:48px;display:grid;place-items:center;overflow:hidden;border-radius:15px;
background:radial-gradient(circle at 50% 28%,#fff7c0 0 9%,#ffd25b 10%,#ff8d2a 28%,#43111f 68%,#0b1021 100%);
border:1px solid #91efff5f;box-shadow:0 0 30px #54dfff4a,0 14px 28px #0009,inset 0 1px #ffffff60,inset 0 -12px 26px #0008;
flex:0 0 auto;transform:rotate(45deg)
}
.logo::before,.logo::after{content:'';position:absolute;inset:auto}
.logo::before{
width:88%;height:88%;border-radius:13px;border:1px solid #9eeeff4a;
background:linear-gradient(145deg,#ffffff0e,#0000001a 62%,#5df0ff18);
box-shadow:inset 0 0 18px #67e8ff20;transform:rotate(0deg)
}
.logo::after{
width:54%;height:54%;border-radius:10px;border:1px solid #fff4c48c;
background:radial-gradient(circle at 50% 50%,#fff9da 0 14%,#ffd55e 16%,#ff8e1f 42%,#8a1c2a 72%,#210714 100%);
box-shadow:0 0 18px #ffca543f,inset 0 0 10px #ffffff45
}
.logo-mark{position:absolute;inset:0;display:block}
.logo-mark::before,.logo-mark::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-45deg);border-radius:999px}
.logo-mark::before{width:62%;height:8%;background:linear-gradient(90deg,#ffeb99,#ffffff,#ffae42);box-shadow:0 0 12px #ffe38c7a}
.logo-mark::after{width:8%;height:62%;background:linear-gradient(180deg,#ffeb99,#ffffff,#ffae42);box-shadow:0 0 12px #ffe38c7a}
.logo-core{position:absolute;left:50%;top:50%;width:18%;height:18%;transform:translate(-50%,-50%);border-radius:50%;background:#ffffff;box-shadow:0 0 12px #fff,0 0 24px #7defff}

/* Main menu */
.setup-screen{
overflow:hidden;padding:calc(var(--safe-top) + 10px) 10px calc(var(--safe-bottom) + 10px);
display:grid;place-items:center;min-width:0;min-height:0
}
.setup-card{
width:min(390px,100%);max-height:100%;min-width:0;min-height:0;overflow:hidden;
display:grid;gap:11px;padding:16px;border:1px solid transparent;border-radius:20px;
background:
linear-gradient(160deg,#0c172afc,#02050dfc) padding-box,
linear-gradient(135deg,#70edffbd,#8f67ff78 48%,#ff4fc86b) border-box;
box-shadow:0 30px 90px #000c,0 0 48px #406bff18,inset 0 1px #ffffff15;
backdrop-filter:blur(18px)
}
.setup-hero{display:grid;gap:14px}
.brand{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 0}
.brand .logo{width:44px;height:44px;font-size:18px}
.brand-copy{display:block}
.brand h1{
margin:0;font-size:29px;line-height:1;letter-spacing:.075em;text-transform:uppercase;
background:linear-gradient(90deg,#fff,#8beaff 48%,#c2a8ff);
-webkit-background-clip:text;background-clip:text;color:transparent;
filter:drop-shadow(0 0 14px #6ee7ff35)
}
.brand p{display:none}
.setup-actions{display:grid;gap:8px}
.setup-actions .btn-primary{min-height:48px;font-size:16px}
.difficulty-setting{display:grid;gap:7px}
.difficulty-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.difficulty-label{font-size:10px;font-weight:1000;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.difficulty-hint{display:none}
.difficulty-options{
display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px;border-radius:13px;
background:#030610b8;border:1px solid #7ddfff1e;box-shadow:inset 0 0 18px #0008
}
.difficulty-btn{
min-height:35px;padding:0 8px;border-radius:9px;background:transparent;border:1px solid transparent;
color:#b5c1d5;font-size:11px;font-weight:1000;letter-spacing:.035em;box-shadow:none;cursor:pointer
}
.difficulty-btn.active{
color:#fff;background:linear-gradient(180deg,#3ad5ff35,#725cff25);border-color:#70e7ff66;
box-shadow:inset 0 1px #ffffff28,0 0 16px #57ddff20
}
.difficulty-btn:disabled{cursor:default;opacity:.72}
.level-difficulty{padding-top:2px}
.level-setting{display:grid;gap:7px}
.level-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.level-label{font-size:11px;font-weight:1000;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.level-hint{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;font-weight:800;color:var(--muted);text-align:right}
.level-options{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.level-btn{
position:relative;min-height:39px;padding:0;border-radius:11px;background:linear-gradient(180deg,#0d1628,#050913);
border:1px solid #ffffff13;color:#8390a8;font-size:12px;font-weight:1000;cursor:pointer;
box-shadow:inset 0 1px #ffffff09,0 6px 14px #0004
}
.level-btn:hover:not(:disabled){border-color:#7edcff55;background:#ffffff0d}
.level-btn.active{
color:#fff;background:linear-gradient(150deg,#167da85f,#5f4cca52 62%,#b145a53c);
border-color:#7de9ff8c;box-shadow:inset 0 1px #ffffff2b,0 0 20px #4ccfff2c
}
.level-btn:disabled{cursor:default}
.level-btn.host-selected{border-color:#ffe36b90;box-shadow:inset 0 1px #ffffff18,0 0 12px #ffe36b20}
.level-select-card{
width:min(430px,100%);max-height:100%;min-width:0;min-height:0;overflow:hidden;
display:grid;grid-template-rows:auto auto auto auto auto;gap:11px;padding:16px;
border:1px solid transparent;border-radius:20px;
background:
linear-gradient(160deg,#0c172afc,#02050dfc) padding-box,
linear-gradient(135deg,#70edffbd,#8f67ff78 48%,#ff4fc86b) border-box;
box-shadow:0 30px 90px #000c,0 0 48px #406bff18,inset 0 1px #ffffff15;
backdrop-filter:blur(18px)
}
.level-select-header{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:10px}
.level-select-header .btn{min-height:38px;padding-inline:12px;font-size:13px}
.level-select-title{text-align:center}
.level-select-title h2{margin:0;font-size:22px;line-height:1.05;text-transform:uppercase;letter-spacing:.035em}
.level-select-title p{display:none}
.level-select-spacer{width:58px}
.level-preview{
min-width:0;min-height:0;overflow:hidden;display:grid;grid-template-rows:auto auto;align-self:center;
gap:7px;padding:8px;border-radius:14px;
background:linear-gradient(180deg,#091323,#040812);border:1px solid #6de2ff2c;text-align:center;
box-shadow:inset 0 1px #ffffff0d,inset 0 0 24px #0008
}
.level-preview-shot{
position:relative;width:100%;aspect-ratio:16/9;min-width:0;min-height:0;overflow:hidden;display:grid;place-items:center;
border-radius:11px;border:1px solid #7ceaff4c;
background:radial-gradient(circle at 50% 20%,#173463,#07101e 58%,#03060d);
box-shadow:inset 0 1px #ffffff12,0 14px 30px #0008,0 0 24px #56dfff18
}
.level-preview-shot::after{display:none}
.level-preview-shot canvas{
display:block;width:100%;height:100%;aspect-ratio:16/9;object-fit:contain;image-rendering:auto;
background:#050914;border:0;border-radius:11px;
box-shadow:0 24px 80px #000e,0 0 38px #49dfff22,inset 0 0 36px #0009;
max-width:100%;max-height:100%
}
.level-preview-kicker,.level-preview-description{display:none}
.level-preview-name{
font-size:17px;font-weight:1000;color:#f6fbff;letter-spacing:.045em;text-transform:uppercase
}
.level-play-actions{display:grid}
.level-play-actions .btn-primary{min-height:48px;font-size:16px}
.setup-footer{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:1px}
.setup-footer .btn{min-height:38px;font-size:13px;color:var(--muted);background:#ffffff08;box-shadow:none}

.setup-panel{display:grid;gap:7px;padding-top:9px;border-top:1px solid #ffffff12}
.panel-title{font-size:10px;font-weight:1000;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.pairing-body{display:grid;gap:7px}
.pair-intro{display:grid}
.button-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.session-panel{
display:grid;gap:8px;padding:10px;border-radius:13px;background:linear-gradient(180deg,#101a2b,#070b14);
border:1px solid #68deff25;box-shadow:inset 0 1px #ffffff0e
}
.session-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.session-title{font-size:14px;font-weight:1000;color:var(--text)}
.session-state{font-size:10px;font-weight:800;color:var(--muted);white-space:nowrap}
.session-players{display:flex;flex-wrap:wrap;gap:5px}
.session-player{
display:inline-flex;align-items:center;padding:5px 8px;border-radius:999px;
background:linear-gradient(180deg,#1a2840,#0c1322);border:1px solid #7ee5ff24;
font-size:10px;font-weight:1000;box-shadow:inset 0 1px #ffffff0c
}
.session-player.offline{color:var(--muted);border-style:dashed}
.session-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.session-actions.single{grid-template-columns:1fr}
.session-actions .btn{min-height:35px;padding-inline:8px;font-size:12px}
.pair-players{padding:0}
.pair-flow{display:grid;gap:7px}
.pair-head{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:8px;padding-bottom:7px;border-bottom:1px solid #ffffff10}
.pair-title{font-size:15px;font-weight:1000;color:var(--text)}
.pair-hint{display:none}
.pair-head .btn{min-height:33px;padding-inline:10px;font-size:11px}
.code-field{display:grid;gap:6px;padding:0;background:none;border:0}
.field-top{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.code-field label{font-size:0}
.code-field textarea,.menu-pair textarea{width:100%;resize:none;border:1px solid #ffffff25;border-radius:9px;background:#020711;color:#fff;padding:9px;font:750 11px/1.25 ui-monospace,Menlo,Consolas,monospace;box-shadow:inset 0 1px 4px #0008}
.code-field textarea{min-height:56px;max-height:64px}
.room-code-input{
min-height:50px!important;max-height:50px!important;resize:none!important;text-align:center;
font-size:23px!important;font-weight:1000!important;letter-spacing:.24em;line-height:30px!important;
text-transform:uppercase;overflow:hidden;color:#dffbff!important;
background:radial-gradient(circle at 50% 0%,#17335a,#040812 70%)!important;
border-color:#6ce5ff5c!important;box-shadow:inset 0 0 20px #0009,0 0 18px #54dbff12!important
}
.code-field textarea[readonly]{color:#eaf7ff;background:#06111f}
.field-actions{display:grid;grid-template-columns:1fr;gap:6px}
.field-actions.two{grid-template-columns:1fr 1fr}
.field-actions .btn{width:100%;min-height:35px;padding:0 9px;font-size:12px}
.status{min-height:0;font-size:10px;line-height:1.25;color:var(--muted);padding:0 2px;text-align:center;background:none;border:0}

/* Gameplay layout */
.play-screen{display:flex;flex-direction:column;gap:8px;padding:calc(var(--safe-top) + 8px) 8px calc(var(--safe-bottom) + 8px);overflow:hidden;min-height:0}
.game-hud{
flex:0 0 auto;min-height:0;padding:8px 10px;display:grid;
grid-template-columns:minmax(0,1fr) auto;grid-template-rows:auto auto;grid-template-areas:"score actions" "players players";
align-items:center;gap:6px 8px;
background:linear-gradient(160deg,#111d32e8,#050914f2);
border:1px solid transparent;border-radius:17px;
background:
linear-gradient(160deg,#0b172afe,#02050dfb) padding-box,
linear-gradient(100deg,#68eaff9c,#8a66ff62,#ff4fc55c) border-box;
box-shadow:0 16px 42px #000a,inset 0 1px #ffffff16;backdrop-filter:blur(16px)
}

.game-hud.has-boss{grid-template-rows:auto auto auto;grid-template-areas:"score actions" "boss boss" "players players"}
.game-hud.boss-level .stat-coins{display:none}
.boss-hud{grid-area:boss;display:grid;grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"boss-label boss-value" "boss-meter boss-meter";align-items:center;gap:3px 8px;min-width:0;padding-top:1px}
.boss-hud.hide{display:none!important}
.boss-hud-label{grid-area:boss-label;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#ffe7bc;font-size:10px;font-weight:1000;letter-spacing:.05em;text-transform:uppercase}
.boss-hud-label.vulnerable{color:#9dffbf;text-shadow:0 0 9px #62ff9b55}
.boss-hud-value{grid-area:boss-value;color:#fff4d3;font-size:9px;font-weight:1000;white-space:nowrap}
.boss-meter{grid-area:boss-meter;position:relative;height:10px;overflow:hidden;border-radius:999px;background:#250703;border:1px solid #7a1b0e;box-shadow:inset 0 2px 6px #000a}
.boss-meter-fill{display:block;width:100%;height:100%;transform-origin:left center;background:linear-gradient(90deg,#ffcf4a,#ff3518);box-shadow:0 0 14px #ff511c88;transition:transform .1s linear}
.score-card{grid-area:score;display:flex;align-items:center;gap:8px;min-width:0}
.score-card .logo{width:32px;height:32px;font-size:13px;border-radius:12px}
.score-title{display:none}
.stats-row{display:flex;flex-wrap:wrap;gap:5px;color:#eff8ff;font-size:11px;font-weight:1000}
.stats-row>span,.stat-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 7px;border-radius:999px;background:#01040ce8;border:1px solid #9bdfff32;box-shadow:inset 0 1px #ffffff0b}
.stat-icon{display:inline-grid;place-items:center;width:14px;height:14px;font-size:11px;line-height:1;color:#8eeaff;text-shadow:0 0 10px #5ce2ff55}
.power-status{display:none!important}
.player-strip{grid-area:players;min-width:0;display:flex;justify-content:flex-start;gap:6px;overflow-x:auto;scrollbar-width:none;padding:6px 1px 0;border-top:1px solid #ffffff10}
.player-strip::-webkit-scrollbar{display:none}
.badge{
flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;
background:linear-gradient(180deg,#182d4c,#050b16);border:1px solid #8de5ff35;
box-shadow:inset 0 1px #ffffff10,0 5px 14px #0004;font-size:10px;font-weight:1000;white-space:nowrap
}
.health-hearts{display:inline-flex;align-items:center;gap:1px;letter-spacing:0}
.health-heart{font-style:normal;font-size:10px;line-height:1;color:#344056;text-shadow:none}
.health-heart.full{color:#ff5a78;text-shadow:0 0 7px #ff456a88}
.health-heart.empty{color:#30394c;-webkit-text-stroke:1px #ff5a7855}
.dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 10px currentColor}
.action-row{grid-area:actions;display:flex;justify-content:flex-end;align-self:start;min-width:0}
.hud-system-group{display:flex;align-items:flex-start;justify-content:flex-end;gap:8px;min-width:0}
.power-cluster{
  display:grid;grid-template-columns:94px minmax(0,190px);grid-template-areas:'tools powers';
  align-items:center;justify-content:end;gap:8px;width:292px;min-width:292px
}
.hud-button-row{display:flex;align-items:center;gap:6px;flex:0 0 auto;min-width:auto;justify-content:flex-end}
.active-power-rack{grid-area:powers;display:flex;align-items:center;justify-content:flex-start;gap:6px;flex-wrap:wrap;min-height:30px;min-width:0}
.active-power-rack:empty{visibility:hidden;display:flex}
.hud-ability-slots{grid-area:tools;width:94px;min-width:94px;justify-content:flex-start}
.power-chip{
  --power-color:#8fe7ff;
  display:inline-flex;align-items:center;gap:4px;min-height:30px;padding:4px 7px;border-radius:999px;
  color:#eefbff;background:linear-gradient(180deg,#13233be8,#07101be8);border:1px solid color-mix(in srgb,var(--power-color) 58%,#ffffff18);
  box-shadow:inset 0 1px #ffffff12,0 8px 18px #0005,0 0 18px color-mix(in srgb,var(--power-color) 20%,transparent);
  white-space:nowrap
}
.power-chip-icon{display:grid;place-items:center;min-width:18px;height:18px;padding:0 4px;border-radius:999px;background:color-mix(in srgb,var(--power-color) 26%,#07111f);font-size:11px;font-weight:1000;line-height:1;color:#fff;text-shadow:0 0 10px color-mix(in srgb,var(--power-color) 60%,transparent)}
.power-chip-name{display:none}
.power-chip-time{font-size:10px;font-weight:1000;color:color-mix(in srgb,var(--power-color) 75%,#fff)}
.tool-power-stack{
  display:grid;grid-template-rows:48px;gap:0;justify-items:center;align-items:center;
  width:104px;min-width:104px;min-height:48px
}
.touch-ability-slots{grid-row:1;width:104px;min-width:104px;justify-content:center}

.game-stage{
position:relative;flex:1 1 auto;min-width:0;min-height:0;display:grid;place-items:center;overflow:hidden;
background:
radial-gradient(circle at 50% 15%,#244d8130,transparent 42%),
linear-gradient(180deg,#07101d,#02040a);
border:1px solid transparent;border-radius:19px;padding:4px;
background:
linear-gradient(180deg,#030914,#010207) padding-box,
linear-gradient(135deg,#6cecff9c,#8c67ff55 55%,#ff4fc54c) border-box;
box-shadow:inset 0 0 45px #000b,0 24px 70px #000b,0 0 40px #4edcff13
}
canvas{display:block;image-rendering:auto;background:#02050b;border:2px solid #8cecffb5;border-radius:14px;box-shadow:0 24px 78px #000d,0 0 42px #49c7ff2b,inset 0 0 30px #0009;max-width:100%;max-height:100%}

/* Pause / end menu — same compact system as the main menu */
.game-menu{
position:absolute;inset:0;z-index:20;display:grid;place-items:center;min-width:0;min-height:0;overflow:hidden;
padding:calc(var(--safe-top) + 10px) 10px calc(var(--safe-bottom) + 10px);
background:radial-gradient(circle at 50% 40%,#18284b9c,#02040be8 62%);
backdrop-filter:blur(12px) saturate(1.15)
}
.game-menu-card{
width:min(390px,100%);max-height:100%;min-width:0;min-height:0;
overflow:hidden;display:grid;gap:10px;padding:16px;border:1px solid transparent;border-radius:20px;
background:
linear-gradient(160deg,#0c172afe,#02050dfe) padding-box,
linear-gradient(135deg,#70edffbd,#8f67ff78 48%,#ff4fc86b) border-box;
box-shadow:0 30px 90px #000d,0 0 52px #496dff1d,inset 0 1px #ffffff15;
backdrop-filter:blur(18px);text-align:center
}
.menu-heading{display:grid;gap:2px}
.menu-kicker{display:none}
.game-menu h2{
margin:0;font-size:28px;line-height:1;letter-spacing:.07em;text-transform:uppercase;
background:linear-gradient(90deg,#fff,#8eeaff,#c8b4ff);-webkit-background-clip:text;background-clip:text;color:transparent
}
.game-menu p{margin:0;color:var(--muted);font-size:12px;font-weight:750;line-height:1.35}
.menu-buttons{display:grid;gap:8px}
.menu-buttons .btn-primary{min-height:48px;font-size:16px}
.menu-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.menu-actions.single{grid-template-columns:1fr}
.menu-pair{display:grid;gap:6px;text-align:left;padding-top:8px;border-top:1px solid #ffffff10}
.menu-pair-title{font-size:11px;font-weight:1000;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.menu-pair-hint{display:none}
.menu-pair textarea{min-height:50px;max-height:58px}
.menu-pair-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.menu-pair-actions .btn{width:100%;min-height:35px;padding:0 9px;font-size:12px}
.menu-pair-status{min-height:0;font-size:10px;line-height:1.25;color:var(--muted);padding:0 2px;background:none;border:0;text-align:center}
.menu-pair-hint{display:block;color:var(--muted);font-size:10px;font-weight:850;text-align:center}
.menu-room-players{justify-content:center;padding:1px 0 2px}
.menu-chat-dock{display:block}
.menu-chat-dock:empty{display:none}
.menu-chat-dock .chat-launcher{
  position:relative;width:100%;height:42px;display:flex;align-items:center;justify-content:center;gap:8px;
  border-radius:12px;border:1px solid #ffb14a65;background:linear-gradient(145deg,#7d2d1d,#421516 68%,#17101a);
  box-shadow:inset 0 1px #ffffff30,0 7px 18px #0007
}
.menu-chat-dock .chat-launcher-icon{font-size:17px}
.menu-chat-dock .chat-launcher-label{display:inline;font-size:13px;font-weight:1000;letter-spacing:.02em}
.menu-chat-dock .chat-unread{left:auto;right:-7px;top:-8px}
.menu-footer{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:1px}
body.menu-open #playScreen> :not(#pauseOverlay){pointer-events:none}
body.confirm-open .screen{pointer-events:none}
.menu-footer .btn{min-height:38px;font-size:13px;color:var(--muted);background:#ffffff08;box-shadow:none}
.confirm-overlay{z-index:40}

/* Multiplayer room chat */
.game-chat{
--chat-vv-top:0px;--chat-vv-height:100dvh;
position:fixed;inset:0;z-index:35;display:grid;place-items:center;
padding:max(8px,env(safe-area-inset-top,0px)) 8px max(8px,env(safe-area-inset-bottom,0px));
pointer-events:none
}
.game-chat.open{
inset:auto 0 auto 0;top:var(--chat-vv-top);height:var(--chat-vv-height);
padding:6px 8px;pointer-events:auto
}
.chat-floating-dock{
position:fixed;right:max(6px,env(safe-area-inset-right,0px));top:50%;
transform:translateY(-50%);pointer-events:none
}
.chat-hud-dock{
display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-right:6px
}
.chat-hud-dock:empty{display:none}
.chat-launcher{
pointer-events:auto;position:relative;width:48px;height:50px;padding:0;
display:grid;place-items:center;color:#fff;cursor:pointer;
border:1px solid #ffb14a80;border-radius:15px 0 0 15px;
background:linear-gradient(145deg,#ff9a24,#d73722 64%,#68101e);
box-shadow:0 12px 32px #000a,inset 0 1px #ffffff60,0 0 22px #ff5a1f38;
transition:transform .12s ease,filter .12s ease
}
.chat-launcher:hover{filter:brightness(1.13)}
.chat-launcher:active{transform:scale(.96)}
.chat-launcher-icon{font-size:21px;line-height:1;filter:drop-shadow(0 2px 3px #0008)}
.chat-unread{
position:absolute;left:-6px;top:-7px;min-width:20px;height:20px;padding:0 5px;
display:grid;place-items:center;border-radius:999px;
font-size:10px;font-weight:1000;line-height:1;color:#170603;
background:#ffd166;border:2px solid #250a05;box-shadow:0 3px 10px #0009
}
.chat-hud-dock .chat-launcher{
width:40px;height:36px;border-radius:10px;padding:0;
border:1px solid #ffb14a65;
box-shadow:0 7px 18px #0008,inset 0 1px #ffffff45,0 0 14px #ff5a1f24
}
.chat-hud-dock .chat-launcher-icon{font-size:17px}
.chat-hud-dock .chat-unread{left:auto;right:-7px;top:-8px}
.chat-panel{
pointer-events:auto;width:min(360px,calc(100vw - 16px));
height:min(470px,calc(var(--chat-vv-height) - 12px));
max-height:calc(var(--chat-vv-height) - 12px);
min-height:min(300px,calc(var(--chat-vv-height) - 12px));
display:grid;grid-template-rows:auto minmax(0,1fr) auto;overflow:hidden;
border:1px solid #ffb14a72;border-radius:18px;
background:
linear-gradient(160deg,#160b08fa,#05070dfa) padding-box,
linear-gradient(135deg,#ffb14aa0,#ff4b3470 52%,#4fdcff65) border-box;
box-shadow:0 28px 80px #000d,0 0 34px #ff541f25,inset 0 1px #ffffff18;
backdrop-filter:blur(18px)
}
.game-chat:not(.open) .chat-panel{display:none}
.chat-header{
min-height:56px;padding:9px 9px 9px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px;
border-bottom:1px solid #ffffff14;background:linear-gradient(180deg,#ffffff09,#0000)
}
.chat-heading{min-width:0;display:grid;gap:2px}
.chat-title{font-size:15px;font-weight:1000;letter-spacing:.035em;text-transform:uppercase}
.chat-room{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#ffc47a;font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.chat-state{color:#d4deeb;font-size:9px;font-weight:850;line-height:1.2}
.chat-launcher-label{display:none}
.chat-close{
width:38px;height:38px;display:grid;place-items:center;flex:0 0 auto;border-radius:11px;
color:#fff;font-size:21px;font-weight:800;cursor:pointer;
background:linear-gradient(180deg,#27364d,#101722);border:1px solid #ffffff24;
box-shadow:inset 0 1px #ffffff20
}
.chat-messages{
min-height:0;overflow:auto;display:flex;flex-direction:column;gap:9px;padding:12px;
overscroll-behavior:contain;touch-action:pan-y;scrollbar-width:thin;scrollbar-color:#ff8a2455 transparent
}
.chat-messages:empty::before{
content:'No messages yet';margin:auto;color:#8995a9;font-size:12px;font-weight:800
}
.chat-message{display:flex;flex-direction:column;align-items:flex-start;gap:3px;max-width:84%}
.chat-message.own{align-self:flex-end;align-items:flex-end}
.chat-message.system{align-self:center;align-items:center;max-width:94%}
.chat-meta{display:flex;align-items:center;gap:6px;padding-inline:4px;color:#aeb9cb;font-size:9px;font-weight:900}
.chat-author{color:var(--chat-color,#7fe8ff)}
.chat-bubble{
padding:8px 10px;border-radius:5px 14px 14px 14px;
color:#fff;font-size:13px;font-weight:750;line-height:1.3;overflow-wrap:anywhere;white-space:pre-wrap;
background:linear-gradient(145deg,#19364b,#102333);border:1px solid #6fe7ff32;
box-shadow:0 6px 16px #0006,inset 0 1px #ffffff10
}
.chat-message.own .chat-bubble{
border-radius:14px 5px 14px 14px;
background:linear-gradient(145deg,#a93620,#5f1816);border-color:#ffb14a55
}
.chat-message.system .chat-meta{display:none}
.chat-message.system .chat-bubble{
padding:5px 9px;border-radius:999px;color:#ccd4e1;font-size:10px;font-weight:850;
background:#ffffff0a;border-color:#ffffff12;box-shadow:none
}
.chat-compose{
position:relative;z-index:2;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:7px;
padding:9px 9px max(9px,env(safe-area-inset-bottom,0px));
border-top:1px solid #ffffff14;background:#020307f5
}
.chat-input{
display:block;width:100%;height:43px;min-height:43px;max-height:82px;resize:none;padding:10px 11px;
border-radius:12px;color:#fff;caret-color:#ffb14a;font-size:16px;font-weight:750;line-height:1.25;
background:#0c111b;border:1px solid #ffffff2b;box-shadow:inset 0 2px 10px #0008;
touch-action:manipulation
}
.chat-input:focus{outline:2px solid #ff9a246b;outline-offset:1px;border-color:#ffb14a80}
.chat-input::placeholder{color:#7e899a}
.chat-send{min-width:68px;min-height:43px;padding-inline:12px}
body.chat-open #playScreen .touch-deck{pointer-events:none;opacity:.4}
body.chat-open #playScreen .game-stage{pointer-events:none}
@media(max-width:600px){
  .chat-floating-dock{right:max(3px,env(safe-area-inset-right,0px))}
  .chat-panel{
    width:calc(100vw - 12px);
    height:min(430px,calc(var(--chat-vv-height) - 8px));
    max-height:calc(var(--chat-vv-height) - 8px);
    min-height:min(260px,calc(var(--chat-vv-height) - 8px));
    border-radius:16px
  }
  .chat-launcher{width:45px;height:48px}
  .chat-hud-dock .chat-launcher{width:38px;height:34px}
  .chat-messages{padding:10px}
  .chat-bubble{font-size:12px}
}
@media(max-height:500px){
  .game-chat.open{padding:4px 6px}
  .chat-panel{
    height:calc(var(--chat-vv-height) - 8px);
    max-height:calc(var(--chat-vv-height) - 8px);
    min-height:0
  }
  .chat-header{min-height:46px;padding:5px 7px 5px 11px}
  .chat-close{width:34px;height:34px}
  .chat-messages{padding:7px;gap:6px}
  .chat-compose{padding:6px}
  .chat-input,.chat-send{min-height:40px;height:40px}
}
.confirm-card{width:min(360px,100%)}

/* Touch controls */
.touch-deck{
flex:0 0 146px;display:none;align-items:end;justify-content:space-between;padding:8px 14px;gap:14px;
background:
linear-gradient(160deg,#111d32e8,#050914ef) padding-box,
linear-gradient(110deg,#63e5ff42,#735dff24,#ff5cbd22) border-box;
border:1px solid transparent;border-radius:17px;
box-shadow:0 14px 34px #0008,inset 0 1px #ffffff12
}
.touch-group{display:grid;gap:4px;place-items:center}
.control-label{display:none}
.joy{
position:relative;width:132px;height:132px;border-radius:50%;
background:
radial-gradient(circle at 50% 50%,#213655 0 15%,#0c1729 17% 48%,#050913 50%),
conic-gradient(from 45deg,#6ee8ff35,#755dff20,#ff5bc925,#6ee8ff35);
border:1px solid #7fe8ff3d;touch-action:none;user-select:none;
box-shadow:0 12px 28px #0008,inset 0 0 24px #000b,0 0 22px #57ddff12
}
.joy::before{content:'';position:absolute;inset:35%;border-radius:50%;border:1px solid #ffffff18;background:#00000012;pointer-events:none}
.joy.active{border-color:#8fe7ff70;box-shadow:0 10px 24px #0006,inset 0 1px #ffffff24,0 0 18px #55d7ff25}
.stick{
position:absolute;left:42px;top:42px;width:48px;height:48px;border-radius:50%;
background:radial-gradient(circle at 35% 28%,#fff,#8beaff 25%,#5263cf 62%,#17213b);
border:1px solid #dffcff6b;box-shadow:0 7px 18px #0008,0 0 16px #5ddfff35;
will-change:left,top;transition:left .1s ease-out,top .1s ease-out
}
.joy.active .stick{transition:none}
.action-buttons{display:flex;align-items:end;gap:12px;flex-wrap:nowrap;justify-content:center}
.ability-slots{position:relative;display:flex;align-items:center;gap:6px}
.tool-label{display:none}
.ability-slot{
  --ability-color:#8f7cff;--cooldown-fill:0%;
  position:relative;isolation:isolate;overflow:hidden;display:grid;place-items:center;align-content:center;
  width:48px;height:48px;padding:0;border-radius:6px;color:#71809b;
  clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);
  background:
    linear-gradient(135deg,#ffffff13 0 13%,#0000 13% 86%,#ffffff0b 86%),
    linear-gradient(180deg,#2d3540,#11161d 48%,#080b10);
  border:1px solid #ffffff24;
  box-shadow:inset 0 1px #ffffff20,inset 0 -8px 18px #0008,0 9px 22px #0007;
  cursor:pointer;touch-action:none;user-select:none
}
.ability-slot::before{
  content:'';position:absolute;inset:2px;z-index:-1;border-radius:12px;
  background:conic-gradient(var(--ability-color) var(--cooldown-fill),#0000 0);
  opacity:.28
}
.ability-slot::after{
content:'';position:absolute;inset:5px;z-index:-1;border-radius:3px;
background:
  radial-gradient(circle at 16% 18%,#cbd4df 0 1px,#0000 2px),
  radial-gradient(circle at 84% 82%,#cbd4df 0 1px,#0000 2px),
  linear-gradient(145deg,#303945,#0a0d12 72%)
}
.ability-slot.ready{
color:#fff;border-color:var(--ability-color);
box-shadow:0 0 22px color-mix(in srgb,var(--ability-color) 60%,transparent),inset 0 1px #ffffff2b
}
.ability-slot.ready::before{opacity:.72}
.ability-slot.cooling{color:#d3d8e4;border-color:#ffffff27}
.ability-slot.empty{border-style:dashed;color:#738096}
.ability-slot.down{transform:scale(.95);filter:brightness(1.18)}
.ability-icon{display:grid;place-items:center;font-size:12px;font-weight:1000;line-height:1}
.ability-icon svg{display:block;width:27px;height:27px;overflow:visible;filter:drop-shadow(0 2px 3px #000a)}
.ability-slot.empty .ability-icon{opacity:.78}
.ability-slot.charging .ability-icon{opacity:1;filter:drop-shadow(0 0 7px var(--ability-color))}
.ability-state{display:none}
.player-score{display:inline-flex;align-items:center;gap:3px;color:#f1f7ff}
.player-score-icon{color:#ffd166;text-shadow:0 0 7px #ffba3c88;font-size:9px}
.hud-ability-slots .ability-slot{width:40px;height:34px;border-radius:4px}
.hud-ability-slots .ability-slot::before{border-radius:3px}
.hud-ability-slots .ability-slot::after{inset:4px;border-radius:2px}
.hud-ability-slots .ability-icon svg{width:21px;height:21px}
.hud-ability-slots .ability-state{font-size:7px}
.touch-ability-slots .tool-label{position:absolute;left:50%;top:-12px;transform:translateX(-50%)}
.touch-ability-slots .ability-slot{width:48px;height:44px;border-radius:5px}
.touch-ability-slots .ability-slot::before{border-radius:3px}
.touch-ability-slots .ability-slot::after{border-radius:2px}
.dash{
width:68px;height:68px;border-radius:50%;display:grid;place-items:center;touch-action:none;
background:radial-gradient(circle at 35% 25%,#fff,#7eeaff 18%,#3e62cb 52%,#12192d 75%);
border:1px solid #d8fbff73;color:#07111f;font-weight:1000;letter-spacing:.03em;
box-shadow:0 12px 28px #0008,0 0 24px #58dcff35,inset 0 0 18px #ffffff25;
text-shadow:0 1px #ffffff55;font-size:0
}
.dash-icon{font-size:25px;line-height:1;filter:drop-shadow(0 1px 0 #ffffff55)}
.down{background:radial-gradient(circle at 35% 28%,#fff,#5df2ffaa 44%,#ffffff30)!important;box-shadow:0 0 22px #55eaff99,0 10px 24px #0008!important}

@media (hover:none),(pointer:coarse),(max-width:900px){
  .touch-deck{display:flex}
  .hud-ability-slots{display:none}
  .game-hud{grid-template-columns:minmax(0,1fr) auto;grid-template-rows:auto auto;grid-template-areas:"score actions" "players players";align-items:center}
  .game-hud.has-boss{grid-template-rows:auto auto auto;grid-template-areas:"score actions" "boss boss" "players players"}
  .action-row{justify-content:flex-end}
  .hud-system-group{width:auto;justify-content:flex-end;align-items:center}
  .power-cluster{display:none}
  .hud-button-row{min-width:auto}
  .player-strip{justify-content:flex-start}
  .setup-screen.pairing{place-items:start center}
  .setup-screen.pairing .setup-footer,.setup-screen.pairing .panel-title{display:none}
}
@media (orientation:portrait) and (max-width:900px){
  .play-screen{display:grid;grid-template-rows:auto minmax(0,1fr) auto;grid-template-columns:minmax(0,1fr)}
  .game-hud{grid-row:1}
  .game-stage{grid-row:2;flex:none;width:100%;height:100%;min-width:0;min-height:0;aspect-ratio:auto;background:transparent;border:0;box-shadow:none;padding:0;overflow:hidden}
  .touch-deck{grid-row:3;margin-top:0}
  canvas{border-radius:12px}
}
@media (max-width:520px){
  .setup-screen{padding-left:8px;padding-right:8px}
  .setup-card{padding:15px;gap:11px}
  .brand h1{font-size:25px}
  .pair-head{align-items:start}
  .play-screen{gap:6px;padding-left:6px;padding-right:6px}
  .game-hud{padding:7px}
  .score-card .logo{width:28px;height:28px;font-size:12px}
  .stats-row{font-size:10px;gap:6px}
  .stats-row>span{padding:4px 6px}
  .btn-menu{min-width:42px;width:42px;min-height:34px;font-size:12px;padding-inline:0}
  .badge{font-size:10px;padding:5px 7px}
  .power-chip{padding:2px 6px;min-height:24px}
  .power-chip-time{font-size:8px}
  .hud-button-row{min-width:auto}
  .touch-deck{flex-basis:136px;padding-inline:8px;gap:10px}
  .joy{width:122px;height:122px}
  .stick{left:38px;top:38px;width:46px;height:46px}
  .dash{width:60px;height:60px;font-size:12px}
  .tool-power-stack{width:96px;min-width:96px;grid-template-rows:43px;min-height:43px}
  .touch-ability-slots{width:96px;min-width:96px}
  .touch-ability-slots .ability-slot{width:43px;height:43px}
  .action-buttons{gap:10px}
  .game-menu-card{padding:15px;gap:11px}
  .level-select-card{padding:15px;gap:11px}
  .level-select-title h2{font-size:20px}
  .level-select-spacer{width:58px}
  .game-menu h2{font-size:24px}
  .session-actions,.menu-actions,.menu-pair-actions{grid-template-columns:1fr}
}
@media (max-height:680px){
  .setup-screen{padding-top:calc(var(--safe-top) + 6px);padding-bottom:calc(var(--safe-bottom) + 6px)}
  .setup-card,.level-select-card,.game-menu-card{padding:10px 12px;gap:7px;border-radius:15px}
  .btn{min-height:34px;font-size:12px}
  .brand{padding:1px 0;gap:8px}
  .brand .logo{width:36px;height:36px;font-size:15px}
  .brand h1{font-size:23px}
  .setup-hero{gap:8px}
  .setup-actions .btn-primary,.level-play-actions .btn-primary,.menu-buttons .btn-primary{min-height:38px;font-size:13px}
  .setup-panel{padding-top:6px;gap:5px}
  .pairing-body,.pair-flow{gap:5px}
  .session-panel{gap:5px;padding:7px}
  .session-actions .btn,.field-actions .btn{min-height:31px}
  .code-field textarea{min-height:42px;max-height:46px}
  .room-code-input{min-height:42px!important;max-height:42px!important;font-size:19px!important;line-height:24px!important}
  .setup-footer .btn,.menu-footer .btn{min-height:32px}
  .level-select-header .btn{min-height:32px;font-size:11px}

  .level-btn{min-height:31px;font-size:11px;border-radius:8px}
  .difficulty-setting{gap:4px}
  .difficulty-btn{min-height:30px;font-size:10px}
  .level-preview{padding:6px;gap:5px}
  .level-preview-name{font-size:15px}

  .game-menu h2{font-size:22px}

  .menu-buttons{gap:5px}
  .menu-actions{gap:5px}

  .menu-pair textarea{min-height:42px;max-height:42px}
  .menu-pair-actions .btn{min-height:31px}

}

@media (orientation:landscape) and (max-height:560px){
  .setup-screen{place-items:center;padding-left:6px;padding-right:6px}
  .setup-card{
    width:min(760px,100%);height:100%;max-height:100%;
    grid-template-columns:minmax(185px,.78fr) minmax(270px,1.22fr);
    grid-template-rows:minmax(0,1fr) auto;
    grid-template-areas:"hero panel" "footer panel";
    column-gap:12px;row-gap:7px
  }

  for(let i=-4;i<=4;i++){

  }
  ctx.restore();

  ctx.strokeStyle='#ffffff0f';
  ctx.lineWidth=1;
  for(let y=12;y<ch;y+=16){

        let a=angle+i*Math.PI*2/arms;

      ctx.strokeStyle=style.core;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      ctx.fillStyle=style.core;ctx.beginPath();ctx.arc(x1,y1,3,0,7);ctx.fill();
    }

  }

  for(const w of [...BORDER_WALLS,...map.walls]){

  }

  for(const [x0,y0] of map.coins){
    let px=previewScaleX(x0,cw),py=previewScaleY(y0,ch);
    ctx.save();
    ctx.shadowColor='#ffd166';ctx.shadowBlur=6;
    ctx.fillStyle='#ffd166';
    ctx.beginPath();ctx.arc(px,py,2.3,0,7);ctx.fill();
    ctx.restore();
  }

  let previewDifficulty=net.role==='client'?normalizeDifficulty(game.nextDifficulty||game.difficulty):selectedDifficulty;
  let previewCfg=difficultyConfig(previewDifficulty);
  let previewEnemyCount=Math.min((map.enemies||[]).length,previewCfg.enemyCount+map.enemyBonus);

  }

  previewRoundedRect(ctx,1,1,cw-2,ch-2,11,null,'rgba(115,233,255,0.62)');
}

function cryoShatter(p){
  let ranked=game.enemies.map(e=>({e,d:hypot(e.x-p.x,e.y-p.y)})).sort((a,b)=>a.d-b.d);
  let targets=ranked.filter(item=>item.d<=CRYO_RADIUS);
  if(!targets.length&&ranked[0]&&ranked[0].d<=CRYO_RADIUS*1.7)targets=[ranked[0]];
  for(const item of targets){
    let e=item.e,falloff=clamp(1-item.d/(CRYO_RADIUS*1.15),.45,1);
    let duration=e.type==='warden'?WARDEN_CRYO_LOCK*(.82+falloff*.18):CRYO_LOCK*(.86+falloff*.14);

    if(e.type==='brute'&&e.armor>0){e.armor=0;e.armorTimer=3.6}

function drawTimerHalo(x,y,r,color,ratio,rotation=0,width=5,icon=''){
  ratio=clamp(num(ratio),0,1);
  if(ratio<=0)return;
  let start=-Math.PI/2+rotation,end=start+Math.PI*2*ratio;
  cx.save();
  cx.lineCap='round';

  /* Black separator keeps the timer readable over every arena color. */
  cx.globalAlpha=.88;
  cx.strokeStyle='#01030a';
  cx.lineWidth=width+5;
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.stroke();

  /* Empty track. */
  cx.globalAlpha=.42;
  cx.strokeStyle=color;
  cx.lineWidth=width;
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.stroke();

  /* Remaining duration. */
  cx.globalAlpha=1;
  cx.strokeStyle=color;
  cx.shadowColor=color;
  cx.shadowBlur=18;
  cx.lineWidth=width;
  cx.beginPath();cx.arc(x,y,r,start,end,false);cx.stroke();

  /* White inner highlight and a moving endpoint make reduction obvious. */
  cx.globalAlpha=.85;
  cx.strokeStyle='#ffffff';
  cx.shadowBlur=0;
  cx.lineWidth=Math.max(1.2,width*.24);
  cx.beginPath();cx.arc(x,y,r,start,end,false);cx.stroke();

  let ex=x+Math.cos(end)*r,ey=y+Math.sin(end)*r;
  cx.globalAlpha=1;cx.fillStyle='#fff';cx.shadowColor=color;cx.shadowBlur=16;
  cx.beginPath();cx.arc(ex,ey,width*.72,0,Math.PI*2);cx.fill();

  if(icon){
    let ix=x+Math.cos(start)*(r),iy=y+Math.sin(start)*(r);
    cx.shadowBlur=12;cx.fillStyle='#02050d';cx.strokeStyle=color;cx.lineWidth=2;
    cx.beginPath();cx.arc(ix,iy,7.5,0,Math.PI*2);cx.fill();cx.stroke();
    cx.shadowBlur=0;cx.fillStyle='#fff';cx.font='1000 8px system-ui';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(icon,ix,iy+.4);
  }
  cx.restore();
}
function drawPlayerPowerTimers(p){
  if(!p||!p.alive)return;
  let effects=[];
  if(p.boost>0)effects.push({value:p.boost,max:POWER_TIMERS.boost,color:POWER_DEFS.boost.color,icon:'🔥'});
  if(p.magnet>0)effects.push({value:p.magnet,max:POWER_TIMERS.magnet,color:POWER_DEFS.magnet.color,icon:'M'});
  if(p.phase>0)effects.push({value:p.phase,max:POWER_TIMERS.phase,color:SUPER_DEFS.phase.color,icon:'◇'});
  if(p.timeStopAura>0)effects.push({value:p.timeStopAura,max:POWER_TIMERS.timestop,color:SUPER_DEFS.timestop.color,icon:'V'});
  effects.forEach((effect,index)=>{
    drawTimerHalo(p.x,p.y,30+index*9,effect.color,effect.value/effect.max,index*.16,5,effect.icon);
  });
}

    ctx.fillStyle=d.color;ctx.fillRect(-10,-4,16,3);

    ctx.fillStyle='#fff0c8';ctx.globalAlpha=.8;ctx.fillRect(-10,-5,15,1.5);
    for(let i=0;i<2;i++){ctx.fillStyle='#ffd26a';ctx.globalAlpha=.5+.4*Math.sin(phase*4+i);ctx.beginPath();ctx.arc(-11+i*17,-8-i*2,1.6,0,7);ctx.fill()}
  }else if(type==='phase'){
    ctx.fillStyle=dark;ctx.strokeStyle=metal;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(-13,-7,20,14,4);ctx.fill();ctx.stroke();
    ctx.fillStyle=d.color;ctx.beginPath();ctx.moveTo(7,-5);ctx.lineTo(15,-8);ctx.lineTo(15,8);ctx.lineTo(7,5);ctx.closePath();ctx.fill();
    ctx.fillStyle='#bdf8ff';ctx.fillRect(-10,-3,11,6);
    ctx.globalAlpha=.35+.2*Math.sin(phase*3);ctx.strokeStyle=d.color;ctx.lineWidth=2;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(18+i*4,0,4+i*2,-1.1,1.1);ctx.stroke()}
  }else{
    ctx.strokeStyle=d.color;ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(0,0,11,0,7);ctx.stroke();
    for(let i=0;i<6;i++){ctx.save();ctx.rotate(i*Math.PI/3);ctx.beginPath();ctx.moveTo(4,0);ctx.lineTo(15,0);ctx.stroke();ctx.restore()}
    ctx.fillStyle=dark;ctx.strokeStyle=metal;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,5,0,7);ctx.fill();ctx.stroke();
    ctx.strokeStyle='#d9fffb';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-18,0);ctx.lineTo(-11,0);ctx.moveTo(11,0);ctx.lineTo(18,0);ctx.stroke();
  }

}
function drawPlayer(p){
  let col=colors[p.id%colors.length],now=visualNowMs(),speed=hypot(num(p.vx),num(p.vy));

  let faceX=num(p.faceX,1),faceY=num(p.faceY,0),faceLength=hypot(faceX,faceY)||1;
  faceX/=faceLength;faceY/=faceLength;

  let bank=clamp(sideSpeed,-1,1)*(.025+.03*move),hover=Math.sin(cycle*.62)*(.28+.42*move);

  let trailStart=Math.max(0,p.trail.length-qualityCount(16,10,7));
  for(let i=trailStart;i<p.trail.length;i++)drawDashFx(p,p.trail[i],col,now);

  if(p.shield>0){
    cx.save();cx.strokeStyle=POWER_DEFS.shield.color;cx.lineWidth=4;cx.shadowColor=POWER_DEFS.shield.color;cx.shadowBlur=22;
    cx.beginPath();cx.arc(p.x,bodyY,25+Math.sin(now/150),0,7);cx.stroke();
    cx.globalAlpha=.16;cx.fillStyle=POWER_DEFS.shield.color;cx.beginPath();cx.arc(p.x,bodyY,23,0,7);cx.fill();cx.restore();
  }

  if(p.freezeAura>0){
    let ratio=clamp(p.freezeAura/POWER_TIMERS.freeze,0,1),spin=now*.008;
    cx.save();cx.translate(p.x,bodyY);cx.strokeStyle='#dfffff';cx.fillStyle=POWER_DEFS.freeze.color;cx.shadowColor=POWER_DEFS.freeze.color;cx.shadowBlur=15;
    let shardCount=qualityCount(10,8,6);

      let a=i*Math.PI*2/shardCount+spin,r=24+(1-ratio)*CRYO_RADIUS*.68,x=Math.cos(a)*r,y=Math.sin(a)*r;

    cx.globalAlpha=.24+.16*Math.sin(now/170+i);cx.strokeStyle=SUPER_DEFS[slot.type].color;cx.lineWidth=2;
    cx.beginPath();cx.arc(0,0,19,0,7);cx.stroke();cx.restore();
  });

  let boostVisualActive=num(p.boost)>0&&speed>35;

    cx.save();cx.translate(p.x,bodyY);cx.rotate(ang+bank*.35);

    if(dashVisualActive){
      drawHeatWisp(cx,-28,-4,length*.72,width,phase*.5,.12);

    }
    cx.restore();
  }

  shadow(p.x,p.y+p.r+7,25+move*3,8-move,Math.max(.28,.52-hover*.015));

  cx.beginPath();cx.moveTo(-9,8);cx.lineTo(-23+finFlex*.35,15-finFlex);cx.lineTo(-19,3);cx.closePath();cx.fill();cx.stroke();

  cx.shadowBlur=dashVisualActive?24:14;cx.fillStyle=lg(-15,-12,17,12,'#eefcff',col);cx.strokeStyle='#ffffff9e';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(18,0);cx.quadraticCurveTo(10,-15,-5,-14);cx.lineTo(-15,-8);cx.lineTo(-18,0);cx.lineTo(-15,8);cx.lineTo(-5,14);cx.quadraticCurveTo(10,15,18,0);cx.closePath();cx.fill();cx.stroke();

  cx.shadowBlur=0;cx.fillStyle='#07101d';cx.strokeStyle='#ffffff30';cx.lineWidth=1.3;
  cx.beginPath();cx.moveTo(10,0);cx.quadraticCurveTo(5,-9,-5,-8);cx.lineTo(-10,0);cx.lineTo(-5,8);cx.quadraticCurveTo(5,9,10,0);cx.closePath();cx.fill();cx.stroke();

  for(const y of [-7,7]){cx.beginPath();cx.moveTo(-13,y);cx.lineTo(-8-finFlex*.15,y);cx.stroke()}
  cx.globalAlpha=1;

  cx.fillStyle=lg(0,-8,12,8,'#eaffff','#17334d');cx.strokeStyle='#8ff2ff';cx.lineWidth=1.4;
  cx.beginPath();cx.ellipse(5,0,7,5,0,0,7);cx.fill();cx.stroke();
  cx.fillStyle='#fff';cx.shadowColor='#6ee7ff';cx.shadowBlur=10;cx.beginPath();cx.ellipse(8,-1,1.8,1.8*eyeScale,0,0,7);cx.fill();

  cx.shadowBlur=0;cx.fillStyle='#ffffffb8';rr(-8,-10,8,3,1.5,'#ffffffb8');
  cx.restore();cx.globalAlpha=1;

  cx.save();cx.font='1000 9px system-ui';cx.textAlign='center';cx.textBaseline='middle';

}

	cx.restore();cx.globalAlpha=1}

function syncActivePowerAudio(){

    stopAllPowerLoops();return;
  }
  let player=audioViewPlayer(),desired=new Set();
  if(player&&player.alive){
    if(player.shield>0)desired.add('shield');
    if(player.magnet>.02)desired.add('magnet');

async function acceptOnlineOffer(message){

async function handleSignalMessage(message){

  if(message.to&&message.to!==net.clientToken)return;

    let token=String(message.clientId||'');net.signalMembers.add(token);net.signalRetries.set(token,0);
    await ensureOnlineHostPeer(token);return;
  }
  if(message.type==='peer-left'){
    let token=String(message.clientId||'');
    if(net.role==='host'&&message.role==='player'){
      net.signalMembers.delete(token);net.signalRetries.delete(token);
      let record=net.signalPeers.get(token),id=record&&record.id||net.clientSlots.get(token)||0;
      let control=id&&net.channels.get(id),state=id&&net.stateChannels.get(id),transportAlive=!!((control&&control.readyState==='open')||(state&&state.readyState==='open')||(record&&record.pc&&record.pc.connectionState==='connected'));

        if(id)markRemoteDisconnected(id);

      setSessionStatus('Host disconnected.');syncSetupUI();ui(true);
    }

  }
  if(message.type==='room-error'){
    setSetupStatus(String(message.error||'Room error.'));return;
  }
  if(message.type!=='signal')return;
  let from=String(message.from||'');
  if(net.role==='client'&&message.fromRole==='host'&&message.description){await acceptOnlineOffer(message);return}
  let record=net.signalPeers.get(from);
  if(!record)return;
  if(message.description&&net.role==='host'&&message.description.type==='answer'){
    await record.pc.setRemoteDescription(message.description);await flushSignalCandidates(record);
  }
  if(message.candidate)await addSignalCandidate(record,message.candidate);
}
function openRoomSocket(role,code,reconnecting=false){
  return new Promise((resolve,reject)=>{

    net.signal=ws;

    ws.onmessage=e=>{

els.full.onclick=toggleFull;
els.fullGame.onclick=toggleFull;
document.addEventListener('fullscreenchange',updateFullscreenLabels);
els.invite.onclick=()=>invite();
els.join.onclick=()=>join();
els.use.onclick=()=>useInvite();
els.code.addEventListener('input',()=>{if(!els.code.readOnly)els.code.value=normalizeRoomCode(els.code.value)});
els.menuCopyInvite.onclick=()=>copyTextFrom(els.code,'Room code','menu');
els.copyInvite.onclick=()=>copyTextFrom(els.code,'Room code');
els.cancelPair.onclick=closePairing;


function fitCanvas(){
  let style=getComputedStyle(els.stage);
  let padX=num(parseFloat(style.paddingLeft))+num(parseFloat(style.paddingRight));
  let padY=num(parseFloat(style.paddingTop))+num(parseFloat(style.paddingBottom));
  let availW=Math.max(1,els.stage.clientWidth-padX);
  let availH=Math.max(1,els.stage.clientHeight-padY);
  if(availW<=1||availH<=1)return;
  let scale=Math.max(.05,Math.min(availW/W,availH/H));
  let cssW=Math.max(1,Math.floor(W*scale));
  let cssH=Math.max(1,Math.floor(H*scale));
  configureCanvasResolution(scale);
  cv.style.width=cssW+'px';
  cv.style.height=cssH+'px';
  cv.style.transform='none';
}
if('ResizeObserver'in window){
  new ResizeObserver(fitCanvas).observe(els.stage);
  new ResizeObserver(()=>{if(!touch.on)centerStick()}).observe(els.joy);
}
function refreshLayout(){fitCanvas();if(!touch.on)centerStick()}
window.addEventListener('resize',refreshLayout);
window.visualViewport?.addEventListener('resize',refreshLayout);
window.addEventListener('orientationchange',()=>setTimeout(refreshLayout,250));

resetChatSession();
updateSoundButtons();
updateFullscreenLabels();
syncSetupUI();
ui(true);
applyRenderQuality(true);
centerStick();
requestAnimationFrame(loop);

})();


</script>
</body>
</html>
