<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Coin Dash</title>
<meta name="application-version" content="1.0.18">
<style>
:root{
  --bg:#070b14;--surface:#0d1729;--surface-2:#111e34;--surface-3:#07101f;
  --line:#7edcff2e;--line-strong:#7edcff55;--text:#f8fbff;--muted:#aebbd2;
  --primary:#48b8ff;--danger:#ff5a73;--ok:#80ff72;
  --radius-sm:10px;--radius:16px;--radius-lg:22px;
  --shadow:0 18px 54px #0009,inset 0 1px #ffffff12;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none;overscroll-behavior:none;-webkit-text-size-adjust:100%}
button,textarea{font:inherit}
button{appearance:none;border:0}
button:focus-visible,textarea:focus-visible,summary:focus-visible{outline:3px solid #7edcffaa;outline-offset:2px}
.hide{display:none!important}

.app{position:fixed;inset:0;height:100dvh;background:radial-gradient(circle at 50% -10%,#2553a33d,#070b14 48%,#03050b 100%)}
.screen{position:absolute;inset:0;width:100%;height:100%}

/* Shared controls */
.btn{min-height:44px;padding:0 16px;border-radius:12px;color:var(--text);font-size:14px;font-weight:900;cursor:pointer;border:1px solid #ffffff26;background:linear-gradient(180deg,#ffffff1d,#ffffff0c);box-shadow:inset 0 1px #ffffff20,0 5px 14px #0004;white-space:nowrap;transition:transform .08s ease,filter .12s ease,border-color .12s ease}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.52;cursor:not-allowed;filter:none}
.btn-primary{border-color:#72d3ff78;background:linear-gradient(180deg,#4fc2ff77,#1475c555)}
.btn-secondary{background:linear-gradient(180deg,#ffffff1a,#ffffff09)}
.btn-danger{border-color:#ff8da066;background:linear-gradient(180deg,#ff5a7355,#c5163638)}
.btn-wide{width:100%}
.btn-menu{min-width:88px;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding-inline:13px}
.btn-menu .menu-icon{font-size:17px;line-height:1}

.logo{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(180deg,#48b8ff80,#1475c555);box-shadow:inset 0 1px #fff4,0 0 24px #48b8ff42;font-weight:1000;font-size:21px;flex:0 0 auto}

/* Main menu */
.setup-screen{overflow:auto;padding:calc(var(--safe-top) + 14px) 12px calc(var(--safe-bottom) + 14px);display:grid;place-items:center}
.setup-card{width:min(420px,100%);display:grid;gap:13px;padding:18px;border:1px solid var(--line-strong);border-radius:18px;background:linear-gradient(180deg,#101b30f7,#060a14f8);box-shadow:var(--shadow);backdrop-filter:blur(12px)}
.setup-hero{display:grid;gap:14px}
.brand{display:flex;align-items:center;justify-content:center;gap:10px}
.brand .logo{width:40px;height:40px;border-radius:12px;font-size:18px}
.brand-copy{display:block}
.brand h1{margin:0;font-size:27px;line-height:1;letter-spacing:.035em;text-transform:uppercase}
.brand p{display:none}
.setup-actions{display:grid;gap:8px}
.setup-actions .btn-primary{min-height:48px;font-size:16px}
.setup-actions.has-run{grid-template-columns:1fr 1fr}
.setup-actions.has-run .btn{min-height:44px;font-size:14px}
.setup-footer{display:grid;padding-top:1px}
.setup-footer .btn{min-height:38px;font-size:13px;color:var(--muted);background:#ffffff08;box-shadow:none}

.setup-panel{display:grid;gap:9px;padding-top:12px;border-top:1px solid #ffffff12}
.panel-title{font-size:12px;font-weight:1000;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.pairing-body{display:grid;gap:10px}
.pair-intro{display:grid}
.button-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.session-panel{display:grid;gap:10px;padding:12px;border-radius:14px;background:#ffffff08;border:1px solid #ffffff14}
.session-head{display:grid;gap:3px}
.session-title{font-size:16px;font-weight:1000;color:var(--text)}
.session-state{font-size:12px;font-weight:750;line-height:1.35;color:var(--muted)}
.session-players{display:flex;flex-wrap:wrap;gap:6px}
.session-player{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;background:#ffffff10;border:1px solid #ffffff16;font-size:11px;font-weight:900}
.session-player.offline{color:var(--muted);border-style:dashed}
.session-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.session-actions.single{grid-template-columns:1fr}
.session-actions .btn{min-height:39px;padding-inline:10px;font-size:13px}
.pair-players{padding-bottom:2px}
.pair-flow{display:grid;gap:11px}
.pair-head{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:12px;padding-bottom:11px;border-bottom:1px solid #ffffff12}
.pair-title{font-size:16px;font-weight:1000;color:var(--text)}
.pair-hint{margin-top:3px;color:var(--muted);font-size:12px;font-weight:750;line-height:1.35}
.pair-head .btn{min-height:36px;padding-inline:12px;font-size:12px}
.code-field{display:grid;gap:8px;padding:12px;border-radius:14px;background:#ffffff08;border:1px solid #ffffff14}
.field-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.code-field label{font-size:11px;color:var(--muted);font-weight:1000;text-transform:uppercase;letter-spacing:.07em}
.code-field textarea,.menu-pair textarea{width:100%;resize:vertical;border:1px solid #ffffff2b;border-radius:11px;background:#020711;color:#fff;padding:10px;font:750 12px/1.3 ui-monospace,Menlo,Consolas,monospace;box-shadow:inset 0 1px 4px #0008}
.code-field textarea{min-height:82px}
.code-field textarea[readonly]{color:#eaf7ff;background:#06111f}
.field-actions{display:grid;grid-template-columns:1fr;gap:8px}
.field-actions.two{grid-template-columns:1fr 1fr}
.field-actions .btn{width:100%;min-height:39px;padding:0 11px;font-size:13px}
.status{min-height:38px;display:flex;align-items:center;font-size:12px;line-height:1.35;color:var(--muted);background:#ffffff07;border:1px solid #ffffff12;border-radius:11px;padding:9px 11px}

/* Gameplay layout */
.play-screen{display:flex;flex-direction:column;gap:8px;padding:calc(var(--safe-top) + 8px) 8px calc(var(--safe-bottom) + 8px);overflow:hidden;min-height:0}
.game-hud{flex:0 0 auto;min-height:58px;padding:8px 9px;display:grid;grid-template-columns:auto minmax(0,1fr) auto;grid-template-areas:"score players actions";align-items:center;gap:9px;background:linear-gradient(180deg,#101a2ef2,#060914f2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 28px #0007,inset 0 1px #ffffff12;backdrop-filter:blur(10px)}
.score-card{grid-area:score;display:flex;align-items:center;gap:9px;min-width:0}
.score-card .logo{width:36px;height:36px;border-radius:11px;font-size:15px}
.score-title{font-weight:1000;text-transform:uppercase;letter-spacing:.055em;font-size:12px}
.stats-row{display:flex;gap:9px;color:#e9f5ff;font-size:12px;font-weight:900;white-space:nowrap}
.player-strip{grid-area:players;min-width:0;display:flex;justify-content:center;gap:6px;overflow-x:auto;scrollbar-width:none;padding:1px}
.player-strip::-webkit-scrollbar{display:none}
.badge{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;background:#ffffff11;border:1px solid #ffffff17;font-size:11px;font-weight:900;white-space:nowrap}
.dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 10px currentColor}
.action-row{grid-area:actions;display:flex;justify-content:flex-end;min-width:0}

.game-stage{flex:1 1 auto;min-height:0;display:grid;place-items:center;overflow:hidden;background:linear-gradient(180deg,#0b1222,#060913);border:1px solid #ffffff12;border-radius:var(--radius);padding:3px;box-shadow:inset 0 0 22px #0005}
canvas{display:block;image-rendering:auto;background:#10192f;border:1px solid #67d7ff45;border-radius:14px;box-shadow:0 18px 62px #000b,0 0 32px #49c7ff1c;max-width:100%;max-height:100%}

/* Pause / end menu — same compact system as the main menu */
.game-menu{position:absolute;inset:0;z-index:20;display:grid;place-items:center;padding:calc(var(--safe-top) + 14px) 12px calc(var(--safe-bottom) + 14px);background:#020713d5;backdrop-filter:blur(8px)}
.game-menu-card{width:min(420px,100%);max-height:calc(100dvh - var(--safe-top) - var(--safe-bottom) - 28px);overflow:auto;display:grid;gap:13px;padding:18px;border:1px solid var(--line-strong);border-radius:18px;background:linear-gradient(180deg,#101b30f7,#060a14f8);box-shadow:var(--shadow);backdrop-filter:blur(12px);text-align:center}
.menu-heading{display:grid;gap:4px}
.menu-kicker{display:none}
.game-menu h2{margin:0;font-size:27px;line-height:1;letter-spacing:.035em;text-transform:uppercase}
.game-menu p{margin:0;color:var(--muted);font-size:12px;font-weight:750;line-height:1.35}
.menu-buttons{display:grid;gap:8px}
.menu-buttons .btn-primary{min-height:48px;font-size:16px}
.menu-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.menu-actions.single{grid-template-columns:1fr}
.menu-pair{display:grid;gap:9px;text-align:left;padding-top:12px;border-top:1px solid #ffffff12}
.menu-pair-title{font-size:12px;font-weight:1000;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
.menu-pair-hint{font-size:12px;font-weight:750;line-height:1.35;color:var(--muted)}
.menu-pair textarea{min-height:66px;max-height:120px}
.menu-pair-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.menu-pair-actions .btn{width:100%;min-height:39px;padding:0 11px;font-size:13px}
.menu-pair-status{min-height:38px;display:flex;align-items:center;font-size:12px;line-height:1.35;color:var(--muted);background:#ffffff07;border:1px solid #ffffff12;border-radius:11px;padding:9px 11px}
.menu-footer{display:grid;padding-top:1px}
.menu-footer .btn{min-height:38px;font-size:13px;color:var(--muted);background:#ffffff08;box-shadow:none}
.confirm-overlay{z-index:40}
.confirm-card{width:min(360px,100%)}

/* Touch controls */
.touch-deck{flex:0 0 112px;display:none;align-items:center;justify-content:space-between;padding:8px 18px;gap:16px;background:linear-gradient(180deg,#101a2ef0,#060914f0);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 28px #0007,inset 0 1px #ffffff12}
.touch-group{display:grid;gap:5px;place-items:center}
.control-label{color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;text-align:center}
.joy{position:relative;width:86px;height:86px;border-radius:50%;background:#ffffff14;border:1px solid #ffffff28;touch-action:none;box-shadow:0 10px 24px #0006,inset 0 1px #ffffff1c}
.stick{position:absolute;left:26px;top:26px;width:34px;height:34px;border-radius:50%;background:#ffffff59;border:1px solid #ffffff47}
.dash{width:68px;height:68px;border-radius:50%;display:grid;place-items:center;touch-action:none;background:radial-gradient(circle at 35% 28%,#fff9,#55d7ff55 38%,#ffffff18 70%);border:1px solid #9eeaff66;font-weight:1000;box-shadow:0 10px 24px #0006,inset 0 0 18px #ffffff1c;text-shadow:0 2px 0 #0008}
.down{background:radial-gradient(circle at 35% 28%,#fff,#5df2ffaa 44%,#ffffff30)!important;box-shadow:0 0 22px #55eaff99,0 10px 24px #0008!important}

@media (hover:none),(pointer:coarse),(max-width:900px){
  .touch-deck{display:flex}
  .game-hud{grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"score actions" "players players";align-items:center}
  .player-strip{justify-content:flex-start}
  .setup-screen.pairing{place-items:start center}
}
@media (orientation:portrait) and (max-width:900px){
  .game-stage{flex:0 0 auto;width:100%;aspect-ratio:16/9;background:transparent;border:0;box-shadow:none;padding:0;overflow:visible}
  .touch-deck{margin-top:auto}
  canvas{border-radius:12px}
}
@media (max-width:520px){
  .setup-screen{padding-left:8px;padding-right:8px}
  .setup-card{padding:15px;gap:11px}
  .brand h1{font-size:25px}
  .pair-head{align-items:start}
  .play-screen{gap:6px;padding-left:6px;padding-right:6px}
  .game-hud{padding:7px}
  .score-title{display:none}
  .score-card .logo{width:32px;height:32px}
  .stats-row{font-size:11px;gap:7px}
  .btn-menu{min-width:74px;min-height:36px;font-size:12px}
  .badge{font-size:10px;padding:5px 7px}
  .touch-deck{flex-basis:104px;padding-inline:14px}
  .joy{width:78px;height:78px}
  .stick{width:32px;height:32px}
  .dash{width:62px;height:62px;font-size:12px}
  .game-menu-card{padding:15px;gap:11px}
  .game-menu h2{font-size:24px}
  .setup-actions.has-run,.session-actions,.menu-actions,.menu-pair-actions{grid-template-columns:1fr}
}
@media (orientation:landscape) and (max-height:560px){
  .setup-screen{place-items:start center;padding-top:calc(var(--safe-top) + 6px);padding-bottom:calc(var(--safe-bottom) + 6px)}
  .setup-card{width:min(620px,100%);padding:12px 14px;gap:9px;border-radius:15px}
  .setup-hero{grid-template-columns:auto minmax(210px,1fr);align-items:center;gap:14px}
  .brand{justify-content:flex-start}
  .setup-panel{padding-top:9px;gap:7px}
  .pairing-body,.pair-flow{gap:7px}
  .pair-head{padding-bottom:6px}
  .code-field{padding:8px;gap:5px}
  .brand h1{font-size:24px}
  .setup-actions .btn-primary{min-height:40px}
  .setup-footer .btn{min-height:32px}
  .btn{min-height:36px}
  .code-field textarea{min-height:40px;max-height:46px}
  .status{min-height:26px;padding-block:5px;font-size:11px}

  .play-screen{display:grid;grid-template-rows:42px minmax(0,1fr);grid-template-columns:92px minmax(0,1fr) 92px;grid-template-areas:"hud hud hud" "move stage action";gap:5px;padding:4px}
  .game-hud{grid-area:hud;min-height:0;padding:5px 6px;grid-template-columns:auto minmax(0,1fr) auto;grid-template-areas:"score players actions";align-items:center;border-radius:13px}
  .score-card{gap:7px}
  .score-card .logo{width:28px;height:28px;border-radius:9px;font-size:13px}
  .score-title{font-size:11px;line-height:1}
  .stats-row{font-size:10px;line-height:1.1;gap:6px}
  .player-strip{align-items:center;justify-content:center}
  .badge{font-size:10px;padding:4px 7px;gap:5px}
  .dot{width:8px;height:8px}
  .btn-menu{min-width:72px;min-height:30px;padding-inline:8px;font-size:11px}
  .game-stage{grid-area:stage;border-radius:13px;padding:2px}
  canvas{border-radius:11px}
  .touch-deck{display:contents}
  .touch-group{background:linear-gradient(180deg,#101a2ef0,#060914f0);border:1px solid var(--line);border-radius:13px;box-shadow:0 8px 22px #0007,inset 0 1px #ffffff12;min-height:0;align-content:center;justify-content:center;padding:6px;gap:4px}
  .touch-group:first-child{grid-area:move}
  .touch-group:last-child{grid-area:action}
  .joy{width:72px;height:72px}
  .stick{width:28px;height:28px}
  .dash{width:62px;height:62px;font-size:12px}
  .control-label{display:none}
  .game-menu{position:fixed;inset:0;padding:calc(var(--safe-top) + 6px) 8px calc(var(--safe-bottom) + 6px)}
  .game-menu-card{width:min(420px,94vw);padding:12px 14px;gap:9px;border-radius:15px}
  .game-menu h2{font-size:24px}
  .game-menu p{font-size:11px}
  .menu-buttons .btn,.menu-buttons .btn-primary{min-height:36px;font-size:12px}
  .menu-actions{grid-template-columns:1fr 1fr}
  .menu-pair{padding-top:9px;gap:7px}
  .menu-pair textarea{min-height:42px;max-height:50px}
  .menu-pair-actions .btn{min-height:32px;font-size:11px}
  .menu-pair-status{min-height:26px;padding-block:5px;font-size:11px}
  .menu-footer .btn{min-height:32px}
}
</style>
</head>
<body>
<main class="app">
  <section id="setupScreen" class="screen setup-screen" aria-label="Main menu">
    <div class="setup-card">
      <section class="setup-hero" aria-labelledby="gameTitle">
        <div class="brand">
          <span class="logo" aria-hidden="true">◆</span>
          <div class="brand-copy"><h1 id="gameTitle">Coin Dash</h1></div>
        </div>
        <div id="setupActions" class="setup-actions">
          <button type="button" id="continueBtn" class="btn btn-primary btn-wide hide">Continue Game</button>
          <button type="button" id="startBtn" class="btn btn-primary btn-wide">Start Game</button>
        </div>
      </section>

      <section id="net" class="setup-panel" aria-label="Multiplayer setup">
        <div class="panel-title">Multiplayer</div>
        <div class="pairing-body">
          <div id="sessionPanel" class="session-panel hide" aria-live="polite">
            <div class="session-head">
              <div id="sessionTitle" class="session-title">Multiplayer</div>
              <div id="sessionState" class="session-state">Not connected.</div>
            </div>
            <div id="sessionPlayers" class="session-players" aria-label="Players"></div>
            <div id="sessionActions" class="session-actions">
              <button type="button" id="manageSessionBtn" class="btn btn-secondary">Manage Players</button>
              <button type="button" id="endSessionBtn" class="btn btn-danger">Leave Game</button>
            </div>
          </div>

          <div id="pairIntro" class="pair-intro">
            <div class="button-grid pair-choices">
              <button type="button" id="inviteBtn" class="btn btn-secondary">Create Game</button>
              <button type="button" id="joinBtn" class="btn btn-secondary">Join Game</button>
            </div>
          </div>

          <div id="pairFlow" class="pair-flow hide">
            <div class="pair-head">
              <div>
                <div id="pairTitle" class="pair-title">Multiplayer</div>
                <div id="pairHint" class="pair-hint">Setup</div>
              </div>
              <button type="button" id="cancelPairBtn" class="btn btn-secondary">Cancel</button>
            </div>

            <div id="pairPlayers" class="session-players pair-players hide" aria-label="Current players"></div>

            <div id="inviteField" class="code-field">
              <div class="field-top">
                <label id="codeLabel" for="code">Game code</label>
              </div>
              <textarea id="code" placeholder="Code goes here." spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
              <div class="field-actions" id="inviteActions">
                <button type="button" id="useBtn" class="btn btn-primary hide">Continue</button>
                <button type="button" id="copyInviteBtn" class="btn btn-secondary hide">Copy Game Code</button>
              </div>
            </div>

            <div id="answerField" class="code-field hide">
              <div class="field-top">
                <label id="answerLabel" for="answerCode">Player code</label>
              </div>
              <textarea id="answerCode" placeholder="Player code goes here." spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
              <div class="field-actions" id="answerActions">
                <button type="button" id="answerBtn" class="btn btn-primary hide">Add Player</button>
                <button type="button" id="copyAnswerBtn" class="btn btn-secondary hide">Copy Player Code</button>
              </div>
            </div>
            <div id="status" class="status" role="status" aria-live="polite">Ready.</div>
          </div>
        </div>
      </section>

      <div class="setup-footer">
        <button type="button" id="fullBtn" class="btn btn-secondary btn-wide">Fullscreen</button>
      </div>
    </div>
  </section>

  <section id="playScreen" class="screen play-screen hide" aria-label="Gameplay">
    <header class="game-hud" aria-label="Game status">
      <section class="score-card">
        <span class="logo" aria-hidden="true">◆</span>
        <div>
          <div class="score-title">Coin Dash</div>
          <div class="stats-row">
            <span><span id="coins">0</span>/<span id="coinMax">0</span> coins</span>
            <span id="clock">0:00</span>
          </div>
        </div>
      </section>
      <section id="players" class="player-strip" aria-label="Players"></section>
      <nav class="action-row" aria-label="Game actions">
        <button type="button" id="pauseBtn" class="btn btn-secondary btn-menu" aria-label="Open game menu" title="Game menu"><span class="menu-icon" aria-hidden="true">☰</span><span>Menu</span></button>
      </nav>
    </header>

    <section id="stage" class="game-stage" aria-label="Game area"><canvas id="game" width="960" height="540"></canvas></section>

    <section class="touch-deck" aria-label="Touch controls">
      <div class="touch-group"><div id="joy" class="joy"><div id="stick" class="stick"></div></div><div class="control-label">Move</div></div>
      <div class="touch-group"><div id="dash" class="dash">Dash</div><div class="control-label">Dash</div></div>
    </section>

    <section id="pauseOverlay" class="game-menu hide" role="dialog" aria-modal="true" aria-label="Game menu">
      <div class="game-menu-card">
        <div class="menu-heading">
          <div class="menu-kicker" id="menuKicker">Game Menu</div>
          <h2 id="menuTitle">Paused</h2>
          <p id="menuSubtitle">Game paused.</p>
        </div>

        <div class="menu-buttons">
          <button type="button" id="resumeBtn" class="btn btn-primary btn-wide">Resume Game</button>
          <div id="menuActions" class="menu-actions">
            <button type="button" id="restartBtn" class="btn btn-secondary">Restart Run</button>
            <button type="button" id="setupBtn" class="btn btn-secondary">Main Menu</button>
          </div>
        </div>

        <div id="menuPair" class="menu-pair hide" aria-label="Add a player">
          <div id="menuPairTitle" class="menu-pair-title">Add Player</div>
          <div id="menuPairHint" class="menu-pair-hint">Paste a player code to add another player.</div>

function syncGameMenu(){

      els.resume.classList.remove('hide');els.resume.textContent='View Results';
      els.restart.classList.add('hide');
      els.setupBack.textContent='Leave Game';

      els.restart.classList.remove('hide');
      els.setupBack.textContent='Main Menu';
      els.pauseOverlay.classList.remove('hide');

    els.restart.classList.add('hide');
    els.setupBack.textContent='Leave Game';
    els.menuActions.classList.add('single');

  setTimeout(()=>{
    if(!sameSession(session))return;
    if(client){let c=net.dc,s=net.stateDc;if((!c||c.readyState==='closed')&&(!s||s.readyState==='closed'))setSessionStatus('Connection lost. Ask the Host for the game code again.');syncSetupUI();return}
    let c=net.channels.get(id),s=net.stateChannels.get(id);if((!c||c.readyState==='closed')&&(!s||s.readyState==='closed'))markRemoteDisconnected(id);
  },700);
}
function watchPeer(peer,id,slot=null,client=false){
  let session=net.session,check=()=>{
    if(!sameSession(session)||slot&&slot.retired)return;
    let st=peer.connectionState;
    if(st==='failed'||st==='closed'){if(client)maybeTransportClosed(0,session,true);else markRemoteDisconnected(id)}
    else if(st==='disconnected')setTimeout(()=>{if(sameSession(session)&&peer.connectionState==='disconnected'){if(client)maybeTransportClosed(0,session,true);else markRemoteDisconnected(id)}},3500);
  };
  peer.addEventListener('connectionstatechange',check);
}
function openControlChannel(ch,id,peer=null){let session=net.session,opened=false,handleOpen=()=>{
  if(opened||!sameSession(session))return;opened=true;
  if(net.role==='host'){
    let slot=net.pendingSlots.get(id);if(slot&&slot.ch!==ch)return;
    net.channels.set(id,ch);if(slot){slot.done=true;slot.accepted=true;slot.connected=true}
    setRosterConnected(id,true,slot&&slot.clientToken||'');
    if(!remoteInputs.has(id))neutralizeRemoteInput(id);
    ensureHostPlayers(game.phase==='menu'||game.over);
    setSessionStatus('P'+(id+1)+' joined.');setMenuStatus('P'+(id+1)+' joined.');
    pulseHostSync(ch,id);broadcastGameEvent('roster');broadcastPulse();ui(true);
  }else{
    if(peer){net.pc=peer;closeUnusedJoinPeers(peer)}net.dc=ch;
    setSetupStatus('Connected to Host. Waiting for a player spot...');sendWhenOpen(ch,{t:'join',client:net.clientToken});
  }};
  ch.onopen=handleOpen;ch.onmessage=e=>{if(!sameSession(session))return;try{msgNet(unpack(e.data),ch,id,'control')}catch(err){console.warn('Bad control packet',err)}};
  ch.onerror=e=>console.warn('Coin Dash control channel error',{id,state:ch.readyState,error:e});
  ch.onclose=()=>{if(sameSession(session))maybeTransportClosed(id,session,net.role==='client')};
  if(ch.readyState==='open')setTimeout(handleOpen,0);else{let tries=80,poll=()=>{if(!sameSession(session))return;if(ch.readyState==='open')handleOpen();else if(--tries>0&&ch.readyState!=='closed')setTimeout(poll,125)};setTimeout(poll,125)}
}
function openStateChannel(ch,id,peer=null){let session=net.session,opened=false,handleOpen=()=>{
  if(opened||!sameSession(session))return;opened=true;
  ch.bufferedAmountLowThreshold=MAX_CHANNEL_BUFFER/4;
  if(net.role==='host'){
    let slot=net.pendingSlots.get(id);if(slot&&slot.stateCh!==ch)return;
    net.stateChannels.set(id,ch);if(slot)slot.stateConnected=true;
    setRosterConnected(id,true,slot&&slot.clientToken||'');ensureHostPlayers(false);broadcastNow();
  }else{if(peer){net.pc=peer;closeUnusedJoinPeers(peer)}net.stateDc=ch}
};
  ch.onopen=handleOpen;ch.onmessage=e=>{if(!sameSession(session))return;try{msgNet(unpack(e.data),ch,id,'state')}catch(err){console.warn('Bad realtime packet',err)}};
  ch.onerror=e=>console.warn('Coin Dash state channel error',{id,state:ch.readyState,bufferedAmount:ch.bufferedAmount,error:e});
  ch.onclose=()=>{if(sameSession(session))maybeTransportClosed(id,session,net.role==='client')};
  if(ch.readyState==='open')setTimeout(handleOpen,0);else{let tries=80,poll=()=>{if(!sameSession(session))return;if(ch.readyState==='open')handleOpen();else if(--tries>0&&ch.readyState!=='closed')setTimeout(poll,125)};setTimeout(poll,125)}
}
function open(ch,id,peer=null){if(ch.label==='state')openStateChannel(ch,id,peer);else openControlChannel(ch,id,peer)}
async function safePair(btn,working,fn,target='setup'){
  if(btn){btn.disabled=true;btn.dataset.oldText=btn.textContent;btn.textContent=working}
  try{await fn()}
  catch(e){
    let msg='Connection failed. Create new codes on both updated devices.';
    if(e&&e.message==='Missing code')msg='Enter the code first.';
    else if(e&&e.message==='Old code rejected')msg='That older code format failed. Make a new code with this updated file.';
    else if(e&&e.message==='Wrong code type')msg='That code is not for this step.';
    else if(e&&e.message==='No open player spot')msg='No open player spot is available.';
    else if(e&&e.message==='Answer already used')msg='That player is already connected.';
    else if(e&&e.message&&e.message.startsWith('No local Wi-Fi'))msg=e.message;
    (target==='menu'?setMenuStatus:setSetupStatus)(msg);console.error(e)
  }
  finally{if(btn){btn.disabled=false;btn.textContent=btn.dataset.oldText||btn.textContent}}
}
async function makeHostSlot(id){
  let peer=pc(),control=peer.createDataChannel('control'),state=peer.createDataChannel('state',{ordered:false,maxRetransmits:0}),slot={id,pc:peer,ch:control,stateCh:state,code:'',done:false,accepted:false,connected:false,stateConnected:false,retired:false,rebuilding:false,clientToken:''};
  net.pendingSlots.set(id,slot);watchPeer(peer,id,slot,false);open(control,id);open(state,id);
  let offer=await peer.createOffer();await peer.setLocalDescription(offer);await iceDone(peer);
  let cand=bestCandidate(peer);if(!cand)throw Error('No local Wi-Fi address found. Both devices must be on the same Wi-Fi.');
  slot.code=await encodeDesc(peer.localDescription,cand);return{id,code:slot.code};
}
async function refreshHostInvite(){
  if(net.role!=='host')return;
  let slots=[...net.pendingSlots.values()].filter(s=>s.code&&!s.retired).sort((a,b)=>a.id-b.id).map(s=>({id:s.id,code:s.code}));
  if(!slots.length)return;
  els.code.value=await encodeRoomInvite(slots);showPairButtons(['copyInvite','answer']);syncMenuPair();
}
async function rebuildHostSlot(id){
  if(net.role!=='host')return;
  let old=net.pendingSlots.get(id);if(old){old.retired=true;old.rebuilding=true;try{old.ch&&old.ch.close();old.stateCh&&old.stateCh.close();old.pc&&old.pc.close()}catch(e){}}
  net.pendingSlots.delete(id);net.channels.delete(id);net.stateChannels.delete(id);
  await makeHostSlot(id);await refreshHostInvite();setSessionStatus('P'+(id+1)+' can reconnect using the refreshed game code.');setMenuStatus('Player spot ready.');
}
function scheduleHostSlotRebuild(id,delay=250){
  if(net.role!=='host')return;let slot=net.pendingSlots.get(id);if(!slot||slot.rebuilding||slot.retired)return;slot.rebuilding=true;let session=net.session;
  setTimeout(async()=>{if(!sameSession(session)||net.role!=='host')return;try{await rebuildHostSlot(id)}catch(e){console.error(e);setSessionStatus('Could not prepare P'+(id+1)+' for reconnection.');setMenuStatus('Could not prepare the player spot.')}} ,delay);
}
async function invite(){return safePair(els.invite,'Creating...',async()=>{
  resetNetwork('host');pairMode('host');setSetupStatus('Creating game code...');
  let ids=Array.from({length:ROOM_JOINERS},(_,i)=>i+1),slots=await Promise.all(ids.map(id=>makeHostSlot(id)));
  els.code.value=await encodeRoomInvite(slots);showPairButtons(['copyInvite','answer']);setSetupStatus('Game code ready. Share it with each player.');syncSetupUI();
})}
async function join(){resetNetwork('client');pairMode('join');showPairButtons(['use']);setSetupStatus("Paste the host's game code.")}
async function makeJoinAnswerForSlot(slot){
  let peer=pc();net.joinPeers.set(slot.id,peer);watchPeer(peer,0,null,true);peer.ondatachannel=e=>open(e.channel,0,peer);
  let offer=slot.desc||await decodeDesc(slot.code);if(offer.type!=='offer')throw Error('Wrong code type');
  await peer.setRemoteDescription(rtcDesc(offer));await addDecodedIce(offer);
  let ans=await peer.createAnswer();await peer.setLocalDescription(ans);await iceDone(peer);
  let cand=bestCandidate(peer);if(!cand)throw Error('No local Wi-Fi address found. Both devices must be on the same Wi-Fi.');
  return{slot:slot.id,desc:await encodeDesc(peer.localDescription,cand)};
}
async function useInvite(){return safePair(els.use,'Creating...',async()=>{
  setSetupStatus('Creating player code...');
  try{net.dc&&net.dc.close();net.stateDc&&net.stateDc.close();net.pc&&net.pc.close();if(net.joinPeers)for(const p of net.joinPeers.values())p.close()}catch(e){}
  net.joinPeers=new Map();let decoded=await decodeInviteCode(els.code.value);
  if(decoded.kind==='room'){
    let answers=[];for(const slot of decoded.room.slots)answers.push(await makeJoinAnswerForSlot(slot));
    els.answerField.classList.remove('hide');els.answerLabel.textContent='Player code';els.answerCode.value=await encodeRoomAnswers(answers,net.clientToken||getClientToken());
    showPairButtons(['copyAnswer']);els.inviteField.classList.add('hide');els.pairHint.textContent='Give this player code to the Host. This screen will update automatically.';
    setSetupStatus('Player code ready. Give it to the Host.');return;
  }
  net.pc=pc();watchPeer(net.pc,0,null,true);net.pc.ondatachannel=e=>open(e.channel,0,net.pc);
  let offer=decoded.offer;if(offer.type!=='offer')throw Error('Wrong code type');await net.pc.setRemoteDescription(rtcDesc(offer));await addDecodedIce(offer);
  let ans=await net.pc.createAnswer();await net.pc.setLocalDescription(ans);await iceDone(net.pc);
  els.answerField.classList.remove('hide');els.answerLabel.textContent='Player code';let cand=bestCandidate(net.pc);
  if(!cand){setSetupStatus('No local Wi-Fi address found. Both devices must be on the same Wi-Fi.');return}
  els.answerCode.value=await encodeDesc(net.pc.localDescription,cand);showPairButtons(['copyAnswer']);els.inviteField.classList.add('hide');els.pairHint.textContent='Give this player code to the Host.';setSetupStatus('Player code ready. Give it to the Host.');
})}
async function acceptAnswerCode(raw){
  if(!String(raw||'').trim())throw Error('Missing code');let ans=await decodeAnswerCode(raw);
  if(ans.kind==='room'){
    if(!net.pendingSlots)throw Error('Wrong code type');
    let preferred=ans.client&&net.clientSlots.get(ans.client),member=preferred&&net.roster.get(preferred);
    if(member&&member.connected)throw Error('Answer already used');
    let bySlot=new Map(ans.answers.map(a=>[a.slot,a])),ids=[...net.pendingSlots.keys()].sort((a,b)=>a-b);
    if(preferred&&ids.includes(preferred))ids=[preferred,...ids.filter(x=>x!==preferred)];
    for(const slotId of ids){
      let slot=net.pendingSlots.get(slotId),picked=bySlot.get(slotId);if(!slotIsOpen(slot)||!picked)continue;if(picked.desc.type!=='answer')throw Error('Wrong code type');
      slot.accepted=true;slot.clientToken=ans.client||'';
      try{await slot.pc.setRemoteDescription(rtcDesc(picked.desc));await addIceToPeer(slot.pc,picked.desc)}
      catch(e){slot.accepted=false;scheduleHostSlotRebuild(slotId,50);throw e}
      if(ans.client)net.clientSlots.set(ans.client,slotId);pulseHostSync(slot.ch,slotId);
      return{room:true,msg:'Player code accepted for P'+(slotId+1)+'. Connecting...'};
    }
    throw Error('No open player spot');
  }
  let desc=ans.desc;if(desc.type!=='answer')throw Error('Wrong code type');if(!net.pc)throw Error('Wrong code type');await net.pc.setRemoteDescription(rtcDesc(desc));await addDecodedIce(desc);broadcastNow();return{room:false,msg:'Player code accepted. Waiting for player...'};
}
async function useAnswer(){return safePair(els.answer,'Adding...',async()=>{setSetupStatus('Adding player...');let res=await acceptAnswerCode(els.answerCode.value);els.answerCode.value='';showPairButtons(res.room?['copyInvite','answer']:[]);setSetupStatus(res.msg);syncSetupUI()})}
async function menuAcceptAnswer(){return safePair(els.menuAcceptAnswer,'Adding...',async()=>{setMenuStatus('Adding player...');let res=await acceptAnswerCode(els.menuAnswerCode.value);els.menuAnswerCode.value='';syncMenuPair();setMenuStatus(res.msg);syncSetupUI()},'menu')}
function closeNet(){try{
  if(net.dc)try{net.dc.close()}catch(e){}if(net.stateDc)try{net.stateDc.close()}catch(e){}if(net.pc)try{net.pc.close()}catch(e){}
  if(net.channels)for(const c of net.channels.values())try{c.close()}catch(e){}
  if(net.stateChannels)for(const c of net.stateChannels.values())try{c.close()}catch(e){}
  if(net.pendingSlots)for(const s of net.pendingSlots.values()){s.retired=true;try{s.ch&&s.ch.close();s.stateCh&&s.stateCh.close();s.pc&&s.pc.close()}catch(e){}}
  if(net.joinPeers)for(const p of net.joinPeers.values())try{p.close()}catch(e){}
}catch(e){}
  remoteInputs.clear();if(net.channels)net.channels.clear();if(net.stateChannels)net.stateChannels.clear();if(net.roster)net.roster.clear();if(net.pendingSlots)net.pendingSlots.clear();if(net.joinPeers)net.joinPeers.clear();if(net.clientSlots)net.clientSlots.clear();
  net.dc=null;net.stateDc=null;net.pc=null;net.localId=0;net.timer=0;net.clientTarget=null;
}
function send(o){sendWhenOpen(net.dc,o)}
function msgNet(o,ch,id,kind='control'){if(!o||typeof o!=='object')return;
  if(o.t==='input'&&net.role==='host'){
    let active=net.stateChannels.get(id)||net.channels.get(id);if(active!==ch)return;
    let seq=Math.max(0,Math.round(num(o.seq,0))),old=remoteInputs.get(id);if(old&&seq&&seq<=old.seq)return;
    remoteInputs.set(id,{value:inputSafe(o.v),seq,at:performance.now()});setRosterConnected(id,true);
  }
  if(o.t==='snap'&&net.role==='client')applyClientSnapshot(o.g,false,o.seq);
  if(o.t==='welcome'&&net.role==='client'){net.lastEventSeq=Math.max(net.lastEventSeq,Math.round(num(o.eventSeq,0)));markClientJoined(o.id,o.g)}
  if(o.t==='event'&&net.role==='client'){
    let seq=Math.max(0,Math.round(num(o.seq,0)));if(seq&&seq<=net.lastEventSeq)return;net.lastEventSeq=seq;
    if(o.kind==='run'||o.kind==='resume'||o.kind==='go'){menuOpen=false;endMenuDismissed=false}
    else if(o.kind==='pause'||o.kind==='setup'){menuOpen=true}
    else if(o.kind==='end'){menuOpen=true;endMenuDismissed=false}
    applyClientSnapshot(o.g,true);
    if(o.kind==='run')beep('start');else if(o.kind==='go')beep('go');else if(o.kind==='end')beep(o.g&&o.g.won?'win':'lose');
  }
  if(o.t==='join'&&net.role==='host'){
    let active=net.channels.get(id);if(active&&active!==ch)return;let slot=net.pendingSlots.get(id);if(slot&&slot.ch!==ch)return;
    net.channels.set(id,ch);if(slot){slot.done=true;slot.accepted=true;slot.connected=true;if(o.client)slot.clientToken=o.client}
    if(o.client)net.clientSlots.set(o.client,id);setRosterConnected(id,true,o.client||'');ensureHostPlayers(game.phase==='menu'||game.over);pulseHostSync(ch,id);broadcastGameEvent('roster');broadcastPulse();ui(true);
  }
}
function networkGameState(){
  return{...game,players:game.players.map(p=>({...p,connected:p.id===0?true:(net.roster.get(p.id)?.connected!==false),trail:[]})),enemies:game.enemies.map(e=>({...e})),coins:game.coins.map(c=>({...c})),exit:{...game.exit}};
}
function broadcastGameEvent(kind){if(net.role!=='host')return;ensureHostPlayers(false);repairGameState();let event={t:'event',seq:++net.eventSeq,kind,g:networkGameState()};for(const c of net.channels.values())sendWhenOpen(c,event)}
function broadcastNow(){if(net.role!=='host')return;net.timer=0;ensureHostPlayers(false);repairGameState();let snap={t:'snap',seq:++net.stateSeq,g:networkGameState()};for(const c of net.stateChannels.values())sendState(c,snap)}
function broadcastPulse(){broadcastNow();let session=net.session;[120,420,900,1600,2600].forEach(ms=>setTimeout(()=>{if(sameSession(session))broadcastNow()},ms))}
function broadcast(dt=1){if(net.role!=='host')return;net.timer+=dt;if(dt&&net.timer<.033)return;broadcastNow()}
function sendInput(dt){
  net.timer+=dt;if(net.timer<.033)return;net.timer=0;
  let v=control({control:'local'}),l=hypot(v.x,v.y);if(l>.001)inputAim={x:v.x/l,y:v.y/l};
  if(v.dash&&!inputDashDown){
    inputSeq++;v.dashSeq=inputSeq;v.dashX=inputAim.x;v.dashY=inputAim.y;net.clientDashTime=.2;net.clientDashDir={...inputAim};
    let p=game.players.find(x=>x.id===net.localId);if(p){p.dt=.2;p.dx=inputAim.x;p.dy=inputAim.y;p.trail.push({x:p.x,y:p.y,dx:p.dx,dy:p.dy,at:performance.now(),life:420,ring:true})}beep('dash');
  }else v.dashSeq=inputSeq;
  inputDashDown=v.dash;v.dash=false;let ch=net.stateDc&&net.stateDc.readyState==='open'?net.stateDc:net.dc;sendRealtime(ch,{t:'input',seq:++inputPacketSeq,v},MAX_INPUT_BUFFER);
}

function loop(now){let dt=Math.min(.033,(now-last)/1000||0);
last=now;
update(dt);
draw()}
function centerStick(){let jb=els.joy.getBoundingClientRect(),sw=els.stick.offsetWidth,sh=els.stick.offsetHeight;els.stick.style.left=(jb.width-sw)/2+'px';els.stick.style.top=(jb.height-sh)/2+'px'}
function pointer(e){let b=els.joy.getBoundingClientRect(),sw=els.stick.offsetWidth,sh=els.stick.offsetHeight,x=e.clientX-(b.left+b.width/2),y=e.clientY-(b.top+b.height/2),l=hypot(x,y),m=Math.min((b.width-sw)/2,l);
touch.x=l?x/l:0;
touch.y=l?y/l:0;
els.stick.style.left=(b.width-sw)/2+touch.x*m+'px';
els.stick.style.top=(b.height-sh)/2+touch.y*m+'px'}
window.addEventListener('keydown',e=>{
if(e.code==='Escape'){
  if(!els.confirmOverlay.classList.contains('hide')){closeConfirm();e.preventDefault();return}
  if(game.paused&&!game.over)resumeGame();
  else openGameMenu();
  e.preventDefault();
  return;
}
keys.add(e.code);
if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()});
window.addEventListener('keyup',e=>keys.delete(e.code));

els.joy.addEventListener('pointerdown',e=>{touch.on=true;
touch.id=e.pointerId;
els.joy.setPointerCapture(e.pointerId);
pointer(e)});
els.joy.addEventListener('pointermove',e=>{if(touch.on&&e.pointerId===touch.id)pointer(e)});
function joyEnd(){touch.on=false;
touch.x=touch.y=0;
centerStick()}
els.joy.addEventListener('pointerup',joyEnd);
els.joy.addEventListener('pointercancel',joyEnd);

els.dash.addEventListener('pointerdown',()=>{touch.dash=true;
els.dash.classList.add('down')});
['pointerup','pointercancel','pointerleave'].forEach(ev=>els.dash.addEventListener(ev,()=>{touch.dash=false;
els.dash.classList.remove('down')}));

function fitCanvas(){
  let b=els.stage.getBoundingClientRect();
  let availW=Math.max(160,b.width-4), availH=Math.max(120,b.height-4);
  let scale=Math.max(.1,Math.min(availW/W,availH/H));
  cv.style.width=Math.floor(W*scale)+'px';
  cv.style.height=Math.floor(H*scale)+'px';
  cv.style.transform='none';
}
if('ResizeObserver'in window)new ResizeObserver(fitCanvas).observe(els.stage);
window.addEventListener('resize',fitCanvas);
window.addEventListener('orientationchange',()=>setTimeout(fitCanvas,250));

updateFullscreenLabels();
syncSetupUI();
ui(true);
fitCanvas();
centerStick();
requestAnimationFrame(loop);

})();
