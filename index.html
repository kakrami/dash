<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Coin Dash</title>
<style>
:root{
  --bg:#070b14;--panel:#101a2e;--panel2:#08101e;--line:#7edcff33;--text:#f8fbff;--muted:#aebbd2;
  --primary:#48b8ff;--danger:#ff5a73;--ok:#80ff72;--radius:18px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none;overscroll-behavior:none;-webkit-text-size-adjust:100%}
button,textarea{font:inherit}
button{appearance:none;border:0}
.hide{display:none!important}
.version-tag{position:fixed;right:8px;bottom:calc(var(--safe-bottom) + 4px);z-index:9;color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.04em;opacity:.36;pointer-events:none;user-select:none}

.app{position:fixed;inset:0;height:100dvh;background:radial-gradient(circle at 50% -8%,#2553a333,#070b14 46%,#03050b 100%)}
.screen{position:absolute;inset:0;width:100%;height:100%}

/* SETUP: one normal menu page, no game controls mixed into the field */
.setup-screen{overflow:auto;padding:calc(var(--safe-top) + 20px) 16px calc(var(--safe-bottom) + 20px);display:grid;place-items:center}
.setup-card{width:min(720px,100%);display:grid;gap:14px}
.setup-hero,.setup-panel,.game-hud,.touch-deck{background:linear-gradient(180deg,#101a2eee,#060914ee);border:1px solid var(--line);box-shadow:0 12px 34px #0008,inset 0 1px #ffffff16;border-radius:var(--radius);backdrop-filter:blur(10px)}
.setup-hero{padding:18px;display:grid;gap:16px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(180deg,#48b8ff77,#1475c555);box-shadow:inset 0 1px #fff4,0 0 22px #48b8ff44;font-weight:1000;font-size:20px;flex:0 0 auto}
.brand h1{margin:0;font-size:28px;letter-spacing:.03em;text-transform:uppercase}
.brand p{margin:3px 0 0;color:var(--muted);font-weight:800}
.setup-actions{display:grid;grid-template-columns:1fr auto;gap:10px}
.setup-panel{padding:14px;display:grid;gap:12px}
.optional-panel{padding:0;overflow:hidden}
.optional-panel details{display:grid}
.optional-panel summary{list-style:none;cursor:pointer;padding:14px 16px;display:grid;grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"title icon" "hint icon";align-items:center;column-gap:12px;row-gap:2px;font-weight:1000;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:var(--text)}
.optional-panel summary::-webkit-details-marker{display:none}
.optional-panel summary span{grid-area:title}
.optional-panel summary small{grid-area:hint;text-transform:none;letter-spacing:0;font-size:12px;font-weight:800;color:var(--muted)}
.optional-panel summary::after{grid-area:icon;content:'+';width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:#ffffff12;border:1px solid #ffffff1f;color:var(--text);font-size:16px}
.optional-panel details[open] summary::after{content:'–'}
.pairing-body{padding:0 14px 14px;display:grid;gap:12px}
.pair-intro{display:grid;gap:10px}
.pair-intro p{margin:0;color:var(--muted);font-size:13px;font-weight:900;line-height:1.35}
.pair-flow{display:grid;gap:10px}
.pair-head{display:flex;align-items:start;justify-content:space-between;gap:10px;padding:10px;border-radius:14px;background:#ffffff0b;border:1px solid #ffffff12}
.pair-title{font-size:15px;font-weight:1000;color:var(--text)}
.pair-hint{margin-top:2px;color:var(--muted);font-size:12px;font-weight:900;line-height:1.3}
.code-field textarea[readonly]{color:#eaf7ff;background:#06111f}
.section-title{font-size:12px;color:var(--muted);font-weight:1000;text-transform:uppercase;letter-spacing:.08em}
.button-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.code-field{display:grid;gap:7px;padding:10px;border-radius:14px;background:#ffffff09;border:1px solid #ffffff12}
.field-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.code-field label{font-size:12px;color:var(--muted);font-weight:1000;text-transform:uppercase;letter-spacing:.04em}
.field-actions{display:grid;grid-template-columns:1fr;gap:7px}
.field-actions.two{grid-template-columns:1fr 1fr}
.field-actions .btn{width:100%;min-height:36px;padding:0 10px;border-radius:10px;font-size:13px}
.code-field textarea{width:100%;min-height:78px;resize:vertical;border:1px solid #ffffff2d;border-radius:12px;background:#0008;color:#fff;padding:9px;font:800 12px/1.25 ui-monospace,Menlo,Consolas,monospace}
.status{font-size:12px;line-height:1.35;color:var(--muted);background:#ffffff0b;border:1px solid #ffffff12;border-radius:12px;padding:9px}

/* GAME: header, field, controls. Nothing overlays the play area. */
.play-screen{display:flex;flex-direction:column;gap:8px;padding:calc(var(--safe-top) + 8px) 8px calc(var(--safe-bottom) + 8px);overflow:hidden;min-height:0}
.game-hud{flex:0 0 auto;min-height:54px;padding:8px;display:grid;grid-template-columns:auto minmax(0,1fr) auto;grid-template-areas:"score players actions";align-items:center;gap:8px}
.score-card{grid-area:score;display:flex;align-items:center;gap:10px;min-width:0}
.score-card .logo{width:32px;height:32px;border-radius:10px;font-size:15px}
.score-title{font-weight:1000;text-transform:uppercase;letter-spacing:.06em;font-size:13px}
.stats-row{display:flex;gap:8px;color:#e9f5ff;font-size:12px;font-weight:900;white-space:nowrap}
.player-strip{grid-area:players;min-width:0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.player-strip::-webkit-scrollbar,.action-row::-webkit-scrollbar{display:none}
.badge{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:999px;background:#ffffff14;border:1px solid #ffffff18;font-size:12px;font-weight:900;white-space:nowrap}
.dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 10px currentColor}
.action-row{grid-area:actions;display:flex;justify-content:flex-end;gap:6px;overflow-x:auto;scrollbar-width:none;min-width:0}

.btn{min-height:38px;padding:0 14px;border-radius:12px;color:var(--text);font-size:14px;font-weight:1000;cursor:pointer;border:1px solid #ffffff2e;background:linear-gradient(180deg,#ffffff22,#ffffff10);box-shadow:inset 0 1px #ffffff24,0 4px 12px #0005;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn-primary{border-color:#72d3ff70;background:linear-gradient(180deg,#48b8ff66,#1475c546)}
.btn-secondary{background:linear-gradient(180deg,#ffffff1e,#ffffff0c)}
.btn-danger{border-color:#ff8da066;background:linear-gradient(180deg,#ff5a7355,#c5163638)}
.btn-icon{width:42px;padding:0;font-size:18px}
.btn-wide{width:100%}

.game-stage{flex:1 1 auto;min-height:0;display:grid;place-items:center;overflow:hidden;background:linear-gradient(180deg,#0b1222,#060913);border:1px solid #ffffff10;border-radius:18px;padding:3px}
canvas{display:block;image-rendering:auto;background:#10192f;border:1px solid #67d7ff45;border-radius:16px;box-shadow:0 20px 70px #000b,0 0 34px #49c7ff1c;max-width:100%;max-height:100%}
.game-menu{position:absolute;inset:0;z-index:10;display:grid;place-items:center;padding:calc(var(--safe-top) + 14px) 14px calc(var(--safe-bottom) + 14px);background:#020713bf;backdrop-filter:blur(6px)}
.game-menu-card{width:min(420px,92vw);max-height:calc(100dvh - var(--safe-top) - var(--safe-bottom) - 28px);overflow:auto;display:grid;gap:10px;padding:16px;border-radius:20px;background:linear-gradient(180deg,#101a2ef5,#060914f5);border:1px solid #7edcff55;box-shadow:0 22px 70px #000b,inset 0 1px #ffffff18;text-align:center}
.menu-kicker{font-size:11px;font-weight:1000;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.game-menu h2{margin:0;font-size:30px;line-height:1;text-transform:uppercase;letter-spacing:.03em}
.game-menu p{margin:0 0 4px;color:var(--muted);font-size:13px;font-weight:800}
.menu-buttons{display:grid;gap:8px}
.menu-pair{display:grid;gap:8px;text-align:left;padding:10px;border-radius:14px;background:#ffffff0b;border:1px solid #ffffff14}
.menu-pair-title{font-size:12px;font-weight:1000;text-transform:uppercase;letter-spacing:.08em;color:var(--text)}
.menu-pair-hint{font-size:12px;font-weight:800;line-height:1.3;color:var(--muted)}
.menu-pair textarea{width:100%;min-height:62px;max-height:120px;resize:vertical;border:1px solid #ffffff2d;border-radius:12px;background:#0008;color:#fff;padding:9px;font:800 12px/1.25 ui-monospace,Menlo,Consolas,monospace}
.menu-pair-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.menu-pair-actions .btn{width:100%;min-height:34px;padding:0 9px;font-size:12px}
.menu-pair-status{font-size:12px;line-height:1.3;color:var(--muted);min-height:16px}

/* Touch controls live in their own dock, never on the field. */
.touch-deck{flex:0 0 112px;display:none;align-items:center;justify-content:space-between;padding:8px 18px;gap:16px}
.touch-group{display:grid;gap:5px;place-items:center}
.control-label{color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;text-align:center}
.joy{position:relative;width:86px;height:86px;border-radius:50%;background:#ffffff17;border:1px solid #ffffff2e;touch-action:none;box-shadow:0 10px 24px #0006,inset 0 1px #ffffff20}
.stick{position:absolute;left:26px;top:26px;width:34px;height:34px;border-radius:50%;background:#ffffff59;border:1px solid #ffffff47}
.dash{width:68px;height:68px;border-radius:50%;display:grid;place-items:center;touch-action:none;background:radial-gradient(circle at 35% 28%,#fff9,#55d7ff55 38%,#ffffff18 70%);border:1px solid #9eeaff66;font-weight:1000;box-shadow:0 10px 24px #0006,inset 0 0 18px #ffffff1c;text-shadow:0 2px 0 #0008}
.down{background:radial-gradient(circle at 35% 28%,#fff,#5df2ffaa 44%,#ffffff30)!important;box-shadow:0 0 22px #55eaff99,0 10px 24px #0008!important}

@media (hover:none),(pointer:coarse),(max-width:900px){
  .touch-deck{display:flex}
  .game-hud{grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"score actions" "players players";align-items:start}
  .score-card{min-width:0}
  .action-row{max-width:52vw}
  .btn{min-height:36px;padding-inline:10px}
  .brand h1{font-size:24px}
  .setup-actions{grid-template-columns:1fr}
  .setup-screen{place-items:start center}
}
@media (max-width:520px){
  .play-screen{gap:6px;padding-left:6px;padding-right:6px}
  .game-hud{padding:7px}
  .score-title{display:none}
  .stats-row{font-size:12px}
  .badge{font-size:11px;padding:5px 7px}
  .button-grid{grid-template-columns:1fr}
  .field-top{display:grid;grid-template-columns:1fr;align-items:start}
  .field-actions{justify-content:stretch;display:grid;grid-template-columns:1fr 1fr}
  .field-actions .btn{width:100%}
  .brand h1{font-size:22px}
  .touch-deck{flex-basis:104px;padding-inline:14px}
  .joy{width:78px;height:78px}
  .stick{width:32px;height:32px}
  .dash{width:62px;height:62px;font-size:12px}
}
@media (orientation:landscape) and (max-height:560px){
  .play-screen{
    display:grid;
    grid-template-rows:42px minmax(0,1fr);
    grid-template-columns:92px minmax(0,1fr) 92px;
    grid-template-areas:"hud hud hud" "move stage action";
    gap:5px;
    padding:4px;
  }
  .game-hud{
    grid-area:hud;
    min-height:0;
    padding:5px 6px;
    grid-template-columns:auto minmax(0,1fr) auto;
    grid-template-areas:"score players actions";
    align-items:center;
    border-radius:14px;
  }
  .score-card{gap:8px}
  .score-card .logo{width:28px;height:28px;border-radius:9px;font-size:13px}
  .score-title{font-size:12px;line-height:1}
  .stats-row{font-size:11px;line-height:1.1;gap:6px}
  .player-strip{align-items:center;max-width:none}
  .badge{font-size:11px;padding:4px 7px;gap:5px}
  .dot{width:8px;height:8px}
  .action-row{max-width:none;gap:5px}
  .btn{min-height:30px;padding-inline:9px;border-radius:10px;font-size:12px}
  .game-stage{grid-area:stage;border-radius:14px;padding:2px}
  canvas{border-radius:12px}
  .touch-deck{display:contents}
  .touch-group{background:linear-gradient(180deg,#101a2eee,#060914ee);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 22px #0007,inset 0 1px #ffffff16;min-height:0;align-content:center;justify-content:center;padding:6px;gap:4px}
  .touch-group:first-child{grid-area:move}
  .touch-group:last-child{grid-area:action}
  .joy{width:72px;height:72px}
  .stick{width:28px;height:28px}
  .dash{width:62px;height:62px;font-size:12px}
  .control-label{display:none}
  .game-menu{grid-area:stage;padding:8px;background:#020713cc}
  .game-menu-card{width:min(320px,90%);padding:12px;border-radius:16px;gap:8px}
  .game-menu h2{font-size:24px}
  .game-menu p{font-size:12px}
  .menu-buttons{gap:6px}
}
</style>
</head>
<body>
<main class="app">
  <section id="setupScreen" class="screen setup-screen" aria-label="Game setup">
    <div class="setup-card">
      <section class="setup-hero">
        <div class="brand">
          <span class="logo">◆</span>
          <div><h1>Coin Dash</h1><p>Start solo or add a player.</p></div>
        </div>
        <div class="setup-actions">
          <button type="button" id="startBtn" class="btn btn-primary">Start Game</button>
          <button type="button" id="fullBtn" class="btn btn-secondary">Fullscreen</button>
        </div>
      </section>

      <section id="net" class="setup-panel optional-panel" aria-label="Player setup">
        <details>
          <summary>
            <span>Multiplayer</span>
            <small>Host or Join</small>
          </summary>
          <div class="pairing-body">
            <div id="pairIntro" class="pair-intro">
              <p>Simple setup</p>
              <div class="button-grid pair-choices">
                <button type="button" id="inviteBtn" class="btn btn-primary">Host</button>
                <button type="button" id="joinBtn" class="btn btn-secondary">Join</button>
              </div>
            </div>

            <div id="pairFlow" class="pair-flow hide">
              <div class="pair-head">
                <div>
                  <div id="pairTitle" class="pair-title">Multiplayer</div>
                  <div id="pairHint" class="pair-hint">Setup</div>
                </div>
                <button type="button" id="cancelPairBtn" class="btn btn-secondary">Back</button>
              </div>

              <div id="inviteField" class="code-field">
                <div class="field-top">
                  <label id="codeLabel" for="code">Invite code</label>
                </div>
                <textarea id="code" placeholder="Code goes here." spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
                <div class="field-actions" id="inviteActions">
                  <button type="button" id="useBtn" class="btn btn-primary hide">Make Answer</button>
                  <button type="button" id="copyInviteBtn" class="btn btn-secondary hide">Copy Invite</button>
                </div>
              </div>

              <div id="answerField" class="code-field hide">
                <div class="field-top">
                  <label id="answerLabel" for="answerCode">Answer code</label>
                </div>
                <textarea id="answerCode" placeholder="Answer code goes here." spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
                <div class="field-actions" id="answerActions">
                  <button type="button" id="answerBtn" class="btn btn-primary hide">Connect</button>
                  <button type="button" id="copyAnswerBtn" class="btn btn-secondary hide">Copy Answer</button>
                </div>
              </div>
            </div>

            <div id="status" class="status">Ready.</div>
          </div>
        </details>
      </section>
    </div>
  </section>

  <section id="playScreen" class="screen play-screen hide" aria-label="Gameplay">
    <header class="game-hud" aria-label="Game status">
      <section class="score-card">
        <span class="logo">◆</span>
        <div>
          <div class="score-title">Coin Dash</div>
          <div class="stats-row"><span><span id="coins">0</span>/<span id="coinMax">0</span> coins</span><span id="clock">0:00</span></div>
        </div>
      </section>
      <section id="players" class="player-strip" aria-label="Players"></section>
      <nav class="action-row" aria-label="Game actions">
        <button type="button" id="pauseBtn" class="btn btn-secondary btn-icon" aria-label="Pause menu" title="Pause menu">☰</button>
      </nav>
    </header>

    <section id="stage" class="game-stage" aria-label="Game area"><canvas id="game" width="960" height="540"></canvas></section>

    <section class="touch-deck" aria-label="Touch controls">
      <div class="touch-group"><div id="joy" class="joy"><div id="stick" class="stick"></div></div><div class="control-label">Move</div></div>
      <div class="touch-group"><div id="dash" class="dash">Dash</div><div class="control-label">Dash</div></div>
    </section>

    <section id="pauseOverlay" class="game-menu hide" role="dialog" aria-modal="true" aria-label="Game menu">
      <div class="game-menu-card">
        <div class="menu-kicker" id="menuKicker">Game Menu</div>
        <h2 id="menuTitle">Paused</h2>
        <p id="menuSubtitle">Game paused.</p>
        <div id="menuPair" class="menu-pair hide" aria-label="Accept player answer">
          <div class="menu-pair-title">Add Player</div>
          <div class="menu-pair-hint">Paste each player's answer code here. The host invite stays the same.</div>
          <textarea id="menuAnswerCode" placeholder="Paste answer code" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
          <div class="menu-pair-actions">
            <button type="button" id="menuAcceptAnswerBtn" class="btn btn-primary">Accept Answer</button>
            <button type="button" id="menuCopyInviteBtn" class="btn btn-secondary">Copy Invite</button>
          </div>
          <div id="menuPairStatus" class="menu-pair-status">Ready for answers.</div>
        </div>
        <div class="menu-buttons">
          <button type="button" id="resumeBtn" class="btn btn-primary btn-wide">Resume</button>
          <button type="button" id="restartBtn" class="btn btn-secondary btn-wide">Restart Run</button>
          <button type="button" id="setupBtn" class="btn btn-secondary btn-wide">Players / Setup</button>
          <button type="button" id="fullGameBtn" class="btn btn-secondary btn-wide">Fullscreen</button>
        </div>
      </div>
    </section>
  </section>
  <div class="version-tag">v1.0.12</div>
</main>
<script>


(()=>{'use strict';

const $=id=>document.getElementById(id),cv=$('game'),cx=cv.getContext('2d');
cx.imageSmoothingEnabled=true;
cx.lineJoin='round';
cx.lineCap='round';

const W=cv.width,H=cv.height,colors=['#46d0ff','#ff595e','#8ac926','#ffca3a','#c77dff','#ff9f1c'];
const ROOM_JOINERS=4;

const els={setup:$('setupScreen'),play:$('playScreen'),stage:$('stage'),coins:$('coins'),coinMax:$('coinMax'),clock:$('clock'),players:$('players'),net:$('net'),start:$('startBtn'),pause:$('pauseBtn'),full:$('fullBtn'),pauseOverlay:$('pauseOverlay'),menuKicker:$('menuKicker'),menuTitle:$('menuTitle'),menuSubtitle:$('menuSubtitle'),resume:$('resumeBtn'),restart:$('restartBtn'),setupBack:$('setupBtn'),fullGame:$('fullGameBtn'),pairIntro:$('pairIntro'),pairFlow:$('pairFlow'),pairTitle:$('pairTitle'),pairHint:$('pairHint'),inviteField:$('inviteField'),answerField:$('answerField'),answerCode:$('answerCode'),codeLabel:$('codeLabel'),answerLabel:$('answerLabel'),copyInvite:$('copyInviteBtn'),copyAnswer:$('copyAnswerBtn'),cancelPair:$('cancelPairBtn'),invite:$('inviteBtn'),join:$('joinBtn'),answer:$('answerBtn'),use:$('useBtn'),code:$('code'),menuPair:$('menuPair'),menuAnswerCode:$('menuAnswerCode'),menuAcceptAnswer:$('menuAcceptAnswerBtn'),menuCopyInvite:$('menuCopyInviteBtn'),menuPairStatus:$('menuPairStatus'),status:$('status'),joy:$('joy'),stick:$('stick'),dash:$('dash')};

const walls=[r(0,0,W,24),r(0,H-24,W,24),r(0,0,24,H),r(W-24,0,24,H),r(170,118,110,36),r(380,90,42,120),r(610,124,150,32),r(145,345,150,36),r(470,330,40,120),r(675,340,105,36)];

const coinPos=[[145,90],[335,78],[550,85],[815,86],[90,210],[300,220],[660,225],[875,240],[108,330],[320,315],[615,315],[860,340],[230,455],[430,455],[635,455],[805,455]];

const G={floorA:'#13203b',floorB:'#1c315a',grid:'#79d8ff14',wall:'#2c3f6f',wallTop:'#536ba7',wallEdge:'#111a31',coin:'#ffd166',coinHot:'#fff0a3',enemy:'#ef476f',enemyDark:'#35091a',exit:'#80ff72'};
function rr(x,y,w,h,r,fill,stroke){cx.beginPath();cx.roundRect(x,y,w,h,r);if(fill){cx.fillStyle=fill;cx.fill()}if(stroke){cx.strokeStyle=stroke;cx.stroke()}}
function lg(x0,y0,x1,y1,a,b){let g=cx.createLinearGradient(x0,y0,x1,y1);g.addColorStop(0,a);g.addColorStop(1,b);return g}
function rg(x,y,r,a,b){let g=cx.createRadialGradient(x,y,1,x,y,r);g.addColorStop(0,a);g.addColorStop(1,b);return g}
function shadow(x,y,w,h,a=.35){cx.fillStyle=`rgba(0,0,0,${a})`;cx.beginPath();cx.ellipse(x,y,w,h,0,0,7);cx.fill()}


const keys=new Set(),touch={x:0,y:0,dash:false,on:false,id:null},remoteInputs=new Map();

let game=makeGame(),last=performance.now(),net=netState(),audio=null;
let inputSeq=0,inputDashDown=false,inputAim={x:1,y:0};

function r(x,y,w,h){return{x,y,w,h}}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function hypot(x,y){return Math.hypot(x,y)}
function num(v,d=0){v=Number(v);return Number.isFinite(v)?v:d}
function inputSafe(v){let x=num(v&&v.x),y=num(v&&v.y),l=hypot(x,y);if(l>1){x/=l;y/=l}
  let dashX=num(v&&v.dashX,x),dashY=num(v&&v.dashY,y),dl=hypot(dashX,dashY);
  if(dl>.001){dashX/=dl;dashY/=dl}else{dashX=x;dashY=y}
  return{x,y,dash:!!(v&&v.dash),dashSeq:Math.max(0,Math.round(num(v&&v.dashSeq,0))),dashX,dashY}}
function isGoodNum(v){return typeof v==='number'&&Number.isFinite(v)}
function repairGameState(){
  if(!game||!Array.isArray(game.players))return;
  for(const p of game.players){
    p.id=Math.max(0,Math.round(num(p.id,0)));
    p.r=clamp(num(p.r,15),6,30);
    p.x=clamp(num(p.x,spawnPoint(p.id).x),p.r+24,W-p.r-24);
    p.y=clamp(num(p.y,spawnPoint(p.id).y),p.r+24,H-p.r-24);
    p.vx=num(p.vx);p.vy=num(p.vy);
    p.dx=num(p.dx,1);p.dy=num(p.dy,0);
    let dl=hypot(p.dx,p.dy);if(dl>.001){p.dx/=dl;p.dy/=dl}else{p.dx=1;p.dy=0}
    p.faceX=num(p.faceX,p.dx);p.faceY=num(p.faceY,p.dy);
    p.dt=clamp(num(p.dt),0,.25);p.cd=clamp(num(p.cd),0,1);
    p.dashHit=clamp(num(p.dashHit),0,.25);p.inv=clamp(num(p.inv),0,2);
    p.lastDashSeq=Math.max(0,Math.round(num(p.lastDashSeq,0)));
    p.hp=clamp(Math.round(num(p.hp,5)),0,5);p.score=Math.max(0,Math.round(num(p.score,0)));
    p.alive=p.alive!==false&&p.hp>0;
    if(p.control!=='remote')p.control='local';
    if(!Array.isArray(p.trail))p.trail=[];
    p.trail=p.trail.filter(t=>isGoodNum(t.x)&&isGoodNum(t.y)).slice(-12);
  }
}
function spawnPoint(id){let spots=[[92,92],[122,112],[92,148],[150,92],[150,148],[116,188]];let s=spots[id%spots.length],row=Math.floor(id/spots.length);return{x:s[0]+row*18,y:s[1]+row*14}}
function resetPlayerState(p,id,control){let s=spawnPoint(id);Object.assign(p,{id,x:s.x,y:s.y,vx:0,vy:0,r:15,hp:5,score:0,alive:true,control,cd:0,dt:0,dx:1,dy:0,faceX:1,faceY:0,inv:0,bob:Math.random()*9,trail:[],dashHit:0,lastDashSeq:0});return p}
function player(id,x,y,control='local'){return{id,x,y,vx:0,vy:0,r:15,hp:5,score:0,alive:true,control,cd:0,dt:0,dx:1,dy:0,faceX:1,faceY:0,inv:0,bob:Math.random()*9,trail:[],dashHit:0,lastDashSeq:0}}
function enemy(x,y){let a=Math.random()*6.28;
return{x,y,vx:Math.cos(a)*70,vy:Math.sin(a)*70,r:14,stun:0}}
function makeGame(){let coins=coinPos.map((p,i)=>({x:p[0],y:p[1],r:9,taken:false,pulse:i*.3})),s=spawnPoint(0);
return{players:[player(0,s.x,s.y)],coins,enemies:[enemy(520,86),enemy(760,275),enemy(535,470)],phase:'menu',count:0,time:0,over:false,won:false,paused:false,exit:{x:W-68,y:H/2,r:28},shake:0,total:coins.length}}
function netState(){return{session:Math.random().toString(36).slice(2),role:'solo',pc:null,dc:null,channels:new Map(),knownIds:new Set(),joinedIds:new Set(),pendingSlots:new Map(),joinPeers:new Map(),acceptedClients:new Set(),localId:0,nextId:1,timer:0,roomSlots:ROOM_JOINERS}}
function control(p){if(p.control==='remote')return inputSafe(remoteInputs.get(p.id));
let x=0,y=0;
if(keys.has('KeyA')||keys.has('ArrowLeft'))x--;
if(keys.has('KeyD')||keys.has('ArrowRight'))x++;
if(keys.has('KeyW')||keys.has('ArrowUp'))y--;
if(keys.has('KeyS')||keys.has('ArrowDown'))y++;
if(touch.on){x+=touch.x;
y+=touch.y}
let l=hypot(x,y);
if(l>1){x/=l;
y/=l}return inputSafe({x,y,dash:keys.has('Space')||touch.dash})}
function circleRect(o,b){let cx0=clamp(o.x,b.x,b.x+b.w),cy0=clamp(o.y,b.y,b.y+b.h),dx=o.x-cx0,dy=o.y-cy0,d=hypot(dx,dy);
if(d>=o.r)return false;
if(d<.001){let a=[Math.abs(o.x-b.x),Math.abs(o.x-b.x-b.w),Math.abs(o.y-b.y),Math.abs(o.y-b.y-b.h)],m=Math.min(...a);
dx=m===a[0]?-1:m===a[1]?1:0;
dy=m===a[2]?-1:m===a[3]?1:0;
d=1}
let push=o.r-d;
o.x+=dx/d*push;
o.y+=dy/d*push;
if(Math.abs(dx)>Math.abs(dy))o.vx*=-.25;
else o.vy*=-.25;
return true}
function collideWorld(o){for(const w of walls)circleRect(o,w);
o.x=clamp(o.x,o.r+24,W-o.r-24);
o.y=clamp(o.y,o.r+24,H-o.r-24)}
function hideGameMenu(){els.pauseOverlay.classList.add('hide')}
function showSetup(){game.paused=true;hideGameMenu();els.play.classList.add('hide');els.setup.classList.remove('hide');ui()}
function showPlay(){els.setup.classList.add('hide');els.play.classList.remove('hide');setTimeout(()=>{fitCanvas();centerStick()},0)}
function beginRun(){game=makeGame();restoreRemotes();game.phase='count';game.count=3;game.paused=false;hideGameMenu();showPlay();beep('start');broadcastPulse();ui()}
function startGame(){if(net.role==='client'){setStatus('Waiting for Host to start.');return}beginRun()}
function openGameMenu(){if(game.phase==='menu')return;if(!game.over)game.paused=true;syncGameMenu();broadcastNow();ui()}
function resumeGame(){if(game.over)return;game.paused=false;hideGameMenu();broadcastPulse();ui()}
function restartRun(){if(net.role==='client'){setStatus('Only Host can restart the run.');return}beginRun()}
function restoreRemotes(){ensureHostPlayers(true)}
function ensureHostPlayers(reset=false){if(net.role!=='host'||!game||!Array.isArray(game.players))return;
  // joinedIds is the durable host roster; channels/knownIds are only live connection state.
  let ids=new Set([...(net.joinedIds||new Set()),...(net.knownIds||new Set()),...net.channels.keys()]);
  for(const id of ids){
    if(id===0)continue;
    let p=game.players.find(x=>x.id===id);
    if(!p){let s=spawnPoint(id);game.players.push(player(id,s.x,s.y,'remote'))}
    else{p.control='remote';if(reset)resetPlayerState(p,id,'remote')}
  }
  repairGameState();
}
function ensureClientPlayer(){if(net.role!=='client'||!net.localId||!game||!Array.isArray(game.players))return;
  if(!game.players.some(p=>p.id===net.localId)){let s=spawnPoint(net.localId);game.players.push(player(net.localId,s.x,s.y,'local'))}
  repairGameState();
}

function startDash(p,c){c=inputSafe(c);let l=hypot(c.x,c.y);if(l<.001)return;c.x/=l;c.y/=l;p.dt=.2;
	p.cd=.45;
	p.dx=c.x;
	p.dy=c.y;
	p.dashHit=.2;
	game.shake=Math.max(game.shake,.06);
	p.trail.push({x:p.x,y:p.y,dx:p.dx,dy:p.dy,at:performance.now(),life:420,ring:true});
	beep('dash')}
function dashSmash(p,e){if(e.stun>.35)return;
	e.stun=.75;
	e.vx=p.dx*270;
	e.vy=p.dy*270;
	p.dashHit=.16;
	game.shake=.14;
	p.trail.push({x:e.x,y:e.y,dx:p.dx,dy:p.dy,at:performance.now(),life:360,hit:true});
	beep('hit')}
function update(dt){if(game.over)return;
if(net.role==='client'){sendInput(dt);
return ui()}
if(game.phase==='menu'||game.paused){broadcast(dt);
return ui()}
if(game.phase==='count'){game.count=Math.max(0,game.count-dt);
if(!game.count){game.phase='play';
beep('go')}broadcast(dt);
return ui()}
game.time+=dt;
for(const p of game.players){p.bob+=dt*7;
p.inv=Math.max(0,p.inv-dt);
p.cd=Math.max(0,p.cd-dt);
p.dt=Math.max(0,p.dt-dt);
p.trail=p.trail.filter(t=>performance.now()-t.at<(t.life||280));
	p.dashHit=Math.max(0,p.dashHit-dt);
if(!p.alive)continue;
let c=control(p),sp=178;
if(c.x||c.y){p.faceX=c.x;
p.faceY=c.y}
if(p.control==='remote'){
  if(c.dashSeq&&c.dashSeq!==p.lastDashSeq){
    p.lastDashSeq=c.dashSeq;
    let dc={x:c.dashX||c.x,y:c.dashY||c.y};
    if(p.cd<=0&&(dc.x||dc.y))startDash(p,dc);
  }
}else if(c.dash&&p.cd<=0&&(c.x||c.y))startDash(p,c);
	if(p.dt>0){p.vx=p.dx*520;
	p.vy=p.dy*520;
	p.trail.push({x:p.x,y:p.y,dx:p.dx,dy:p.dy,at:performance.now(),life:280})}
	else{p.vx=c.x*sp;
	p.vy=c.y*sp}
	p.x+=p.vx*dt;
	p.y+=p.vy*dt;
collideWorld(p);
for(const coin of game.coins)if(!coin.taken&&hypot(p.x-coin.x,p.y-coin.y)<p.r+coin.r){coin.taken=true;
p.score++;
beep('coin')}
for(const e of game.enemies){let d=hypot(p.x-e.x,p.y-e.y);
	if(d<p.r+e.r){if(p.dt>0)dashSmash(p,e);else if(p.inv<=0){p.hp--;
	p.inv=1.45;
	game.shake=.18;
	beep('hit');
	let nx=(p.x-e.x)/(d||1),ny=(p.y-e.y)/(d||1);
	p.x+=nx*28;
	p.y+=ny*28;
	if(p.hp<=0)p.alive=false}}}}

for(const e of game.enemies){if(e.stun>0){e.stun-=dt;
continue}
let target=nearestAlive(e),speed=58;
if(target){let dx=target.x-e.x,dy=target.y-e.y,l=hypot(dx,dy)||1;
e.vx+=dx/l*34*dt;
e.vy+=dy/l*34*dt}
let l=hypot(e.vx,e.vy);
if(l>speed){e.vx=e.vx/l*speed;
e.vy=e.vy/l*speed}
e.x+=e.vx*dt;
e.y+=e.vy*dt;
collideWorld(e)}
let taken=game.coins.filter(c=>c.taken).length;
if(!game.players.some(p=>p.alive)){end(false)}
else if(taken===game.total&&game.players.some(p=>p.alive&&hypot(p.x-game.exit.x,p.y-game.exit.y)<p.r+game.exit.r)){end(true)}
game.shake=Math.max(0,game.shake-dt);
broadcast(dt);
ui()}
function nearestAlive(e){let best=null,bd=1e9;
for(const p of game.players)if(p.alive){let d=hypot(p.x-e.x,p.y-e.y);
if(d<bd){bd=d;
best=p}}return best}
function end(won){game.over=true;
game.won=won;
game.phase='over';
game.paused=true;
beep(won?'win':'lose');
syncGameMenu();
broadcast()}

function syncGameMenu(){
  syncMenuPair();
  if(game.over){
    els.menuKicker.textContent=game.won?'Run Complete':'Run Ended';
    els.menuTitle.textContent=game.won?'You Win':'Game Over';
    els.menuSubtitle.textContent=game.won?'Restart for a new run or return to setup.':'Restart and try again, or return to setup.';
    els.resume.classList.add('hide');
    els.setupBack.textContent='Main Menu';
    els.pauseOverlay.classList.remove('hide');
    return;
  }
  els.resume.classList.remove('hide');
  els.setupBack.textContent='Players / Setup';
  if(game.paused&&game.phase!=='menu'){
    els.menuKicker.textContent='Game Menu';
    els.menuTitle.textContent='Paused';
    els.menuSubtitle.textContent='Resume, restart, or adjust players.';
    els.pauseOverlay.classList.remove('hide');
  }else hideGameMenu();
}
function beep(type){try{audio=audio||new (window.AudioContext||window.webkitAudioContext)();
let o=audio.createOscillator(),g=audio.createGain(),f={coin:880,dash:180,hit:110,start:440,go:660,win:990,lose:90}[type]||440,t=audio.currentTime;
	o.frequency.value=f;
	if(type==='dash')o.frequency.exponentialRampToValueAtTime(720,t+.12);
	o.type=type==='hit'||type==='lose'?'sawtooth':'square';
	g.gain.setValueAtTime(type==='dash'?.075:.05,t);
	g.gain.exponentialRampToValueAtTime(.001,t+(type==='dash'?.18:.13));
o.connect(g);
g.connect(audio.destination);
o.start();
o.stop(audio.currentTime+(type==='dash'?.19:.14))}catch(e){}}
function pack(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o))))}
function unpack(s){return JSON.parse(decodeURIComponent(escape(atob(s.trim()))))}

function putVar(a,n){while(n>127){a.push(n&127|128);n>>=7}a.push(n)}
function getVar(r){let n=0,s=0,b;do{b=r.a[r.i++];n|=(b&127)<<s;s+=7}while(b&128);return n}
function putStr(a,s){let b=te.encode(s);putVar(a,b.length);for(const x of b)a.push(x)}

function markRemoteDisconnected(id,ch=null){
  if(!id)return;
  let active=net.channels&&net.channels.get(id),slot=net.pendingSlots&&net.pendingSlots.get(id);
  if(ch&&active&&active!==ch)return;
  if(ch&&slot&&slot.ch!==ch&&!active)return;
  let wasConnected=!!active||!!(slot&&slot.connected);
  if(ch&&slot&&slot.ch===ch&&!slot.connected&&!active){
    slot.accepted=false;
    slot.done=false;
    return;
  }
  if(!wasConnected)return;
  if(net.channels)net.channels.delete(id);
  if(net.knownIds)net.knownIds.delete(id);
  // Do not remove id from joinedIds: a dropped channel must not erase an accepted player.
  if(net.joinedIds)net.joinedIds.add(id);
  if(slot&&(!ch||slot.ch===ch)){slot.done=false;slot.accepted=false;slot.connected=false}
  remoteInputs.delete(id);
  if(game&&Array.isArray(game.players)){let p=game.players.find(x=>x.id===id);if(!p){ensureHostPlayers(false);p=game.players.find(x=>x.id===id)}if(p){p.control='remote';p.alive=false;p.hp=0}}
  setStatus('P'+(id+1)+' disconnected.');
  broadcastPulse();
  ui();
}
function sendWhenOpen(ch,o,tries=80){
  if(!ch)return;
  if(sendTo(ch,o))return;
  if(tries<=0)return;
  setTimeout(()=>sendWhenOpen(ch,o,tries-1),125);
}
function closeUnusedJoinPeers(active){if(net.role!=='client'||!net.joinPeers)return;for(const [slot,peer] of net.joinPeers){if(peer!==active){try{peer.close()}catch(e){}net.joinPeers.delete(slot)}}}
function hostSyncTo(ch,id,session=net.session){
  if(net.role!=='host'||!sameSession(session)||!ch)return;
  ensureHostPlayers(false);
  repairGameState();
  sendWhenOpen(ch,{t:'welcome',id,g:game});
  sendWhenOpen(ch,{t:'snap',g:game});
}
function pulseHostSync(ch,id){let session=net.session;[0,120,420,900,1600,2600,4200].forEach(ms=>setTimeout(()=>hostSyncTo(ch,id,session),ms))}
function applyClientSnapshot(g){
  if(!g||typeof g!=='object')return;
  game=g;
  repairGameState();
  if(game.phase!=='menu')showPlay();
  syncGameMenu();
  ui();
}
function markClientJoined(id,g){
  net.localId=id;
  let label='P'+(id+1);
  setStatus('Joined as '+label+'. '+(g&&g.phase!=='menu'?'Game starting.':'Waiting for Host.'));
  if(els.pairHint)els.pairHint.textContent='Joined as '+label+'. Waiting for Host.';
  if(g)applyClientSnapshot(g);
  else ui();
}
function open(ch,id,peer=null){let session=net.session,opened=false,handleOpen=()=>{
if(opened||!sameSession(session))return;opened=true;
if(net.role==='host'){
let slot=net.pendingSlots&&net.pendingSlots.get(id);
if(slot&&slot.ch!==ch)return;
net.channels.set(id,ch);
net.knownIds.add(id);
net.joinedIds.add(id);
if(slot){slot.done=true;slot.accepted=true;slot.connected=true}
remoteInputs.set(id,inputSafe(remoteInputs.get(id)));
ensureHostPlayers(game.phase==='menu'||game.over);
setStatus('Player P'+(id+1)+' joined.');
pulseHostSync(ch,id);
broadcastPulse();}
else{if(peer){net.pc=peer;closeUnusedJoinPeers(peer)}net.dc=ch;setStatus('Connected to Host. Waiting for player spot...');sendWhenOpen(ch,{t:'join'})}};
ch.onopen=handleOpen;
ch.onmessage=e=>{if(sameSession(session))msgNet(unpack(e.data),ch,id)};
ch.onclose=()=>{if(!sameSession(session))return;if(net.role==='host')markRemoteDisconnected(id,ch);else if(net.role==='client'&&net.dc===ch){setStatus('Disconnected from Host. Return to setup and join again.')}};
if(ch.readyState==='open')setTimeout(handleOpen,0);
else{
  let tries=80,poll=()=>{if(!sameSession(session))return;if(ch.readyState==='open')handleOpen();else if(--tries>0&&ch.readyState!=='closed')setTimeout(poll,125)};
  setTimeout(poll,125);
}}
async function safePair(btn,working,fn){
  if(btn){btn.disabled=true;btn.dataset.oldText=btn.textContent;btn.textContent=working}
  try{await fn()}
  catch(e){
    let msg='Pairing failed. Make a fresh code on both updated devices.';
    if(e&&e.message==='Missing code')msg='Enter the code first.';
    else if(e&&e.message==='Old code rejected')msg='That older code format failed. Make a new code with this updated file.';
    else if(e&&e.message==='Wrong code type')msg='That code is not for this step.';
    else if(e&&e.message==='No open player spot')msg='No open player spot is available. Host needs to make a fresh invite.';
    else if(e&&e.message==='Answer already used')msg='That answer was already used. Make a fresh answer from the invite.';
    else if(e&&e.message&&e.message.startsWith('No local Wi-Fi'))msg=e.message;
    setStatus(msg);
    console.error(e)
  }
  finally{if(btn){btn.disabled=false;btn.textContent=btn.dataset.oldText||btn.textContent}}
}
async function makeHostSlot(id){
  let peer=pc(),ch=peer.createDataChannel('game'),slot={id,pc:peer,ch,code:'',done:false,accepted:false,connected:false};
  net.pendingSlots.set(id,slot);
  open(ch,id);
  let offer=await peer.createOffer();
  await peer.setLocalDescription(offer);
  await iceDone(peer);
  let cand=bestCandidate(peer);
  if(!cand)throw Error('No local Wi-Fi address found. Both devices must be on the same Wi-Fi.');
  slot.code=await encodeDesc(peer.localDescription,cand);
  return{id,code:slot.code};
}
async function invite(){return safePair(els.invite,'Making invite...',async()=>{
resetNetwork('host');
pairMode('host');
setStatus('Making reusable invite...');
let ids=Array.from({length:ROOM_JOINERS},(_,i)=>i+1);
let slots=await Promise.all(ids.map(id=>makeHostSlot(id)));
els.code.value=await encodeRoomInvite(slots);
showPairButtons(['copyInvite','answer']);
setStatus('Reusable invite ready. Share the same invite with each player.');
})}
async function join(){
resetNetwork('client');
pairMode('join');
showPairButtons(['use']);
setStatus('Enter invite.')}
async function makeJoinAnswerForSlot(slot){
  let peer=pc();
  net.joinPeers.set(slot.id,peer);
  peer.ondatachannel=e=>open(e.channel,0,peer);
  let offer=slot.desc||await decodeDesc(slot.code);
  if(offer.type!=='offer')throw Error('Wrong code type');
  await peer.setRemoteDescription(rtcDesc(offer));
  await addDecodedIce(offer);
  let ans=await peer.createAnswer();
  await peer.setLocalDescription(ans);
  await iceDone(peer);
  let cand=bestCandidate(peer);
  if(!cand)throw Error('No local Wi-Fi address found. Both devices must be on the same Wi-Fi.');
  return{slot:slot.id,desc:await encodeDesc(peer.localDescription,cand)};
}
async function useInvite(){return safePair(els.use,'Making...',async()=>{
setStatus('Making answer...');
try{net.dc&&net.dc.close();net.pc&&net.pc.close();if(net.joinPeers)for(const p of net.joinPeers.values())p.close()}catch(e){}
net.joinPeers=new Map();
let decoded=await decodeInviteCode(els.code.value);
if(decoded.kind==='room'){
  let answers=[],clientToken=newClientToken();
  for(const slot of decoded.room.slots)answers.push(await makeJoinAnswerForSlot(slot));
  els.answerField.classList.remove('hide');
  els.answerLabel.textContent='Your answer';
  els.answerCode.value=await encodeRoomAnswers(answers,clientToken);
  showPairButtons(['copyAnswer']);
  els.inviteField.classList.add('hide');
  els.pairHint.textContent='Give this answer to Host. This device will update automatically after Host accepts it.';
  setStatus('Answer ready. Give it to Host. This screen will update when you are joined.');
  return;
}
net.pc=pc();
net.pc.ondatachannel=e=>{net.dc=e.channel;open(net.dc,0,net.pc)};
let offer=decoded.offer;
if(offer.type!=='offer')throw Error('Wrong code type');
await net.pc.setRemoteDescription(rtcDesc(offer));
await addDecodedIce(offer);
let ans=await net.pc.createAnswer();
await net.pc.setLocalDescription(ans);
await iceDone(net.pc);
els.answerField.classList.remove('hide');
els.answerLabel.textContent='Your answer';
let cand=bestCandidate(net.pc);
if(!cand){setStatus('No local Wi-Fi address found. Both devices must be on the same Wi-Fi.');return}
els.answerCode.value=await encodeDesc(net.pc.localDescription,cand);
showPairButtons(['copyAnswer']);
els.inviteField.classList.add('hide');
els.pairHint.textContent='Give this answer to Host.';
setStatus('Answer ready.');
})}
async function acceptAnswerCode(raw){
  if(!String(raw||'').trim())throw Error('Missing code');
  let ans=await decodeAnswerCode(raw);
  if(ans.kind==='room'){
    if(!net.pendingSlots)throw Error('Wrong code type');
    if(ans.client&&net.acceptedClients&&net.acceptedClients.has(ans.client))throw Error('Answer already used');
    let bySlot=new Map(ans.answers.map(a=>[a.slot,a]));
    for(const [slotId,slot] of net.pendingSlots){
      if(slot.done||slot.pc.currentRemoteDescription)continue;
      let picked=bySlot.get(slotId);
      if(!picked)continue;
      if(picked.desc.type!=='answer')throw Error('Wrong code type');
      await slot.pc.setRemoteDescription(rtcDesc(picked.desc));
      await addIceToPeer(slot.pc,picked.desc);
      slot.accepted=true;
      if(ans.client&&net.acceptedClients)net.acceptedClients.add(ans.client);
      pulseHostSync(slot.ch,slotId);
      return{room:true,msg:'P'+(slotId+1)+' answer accepted. It will join automatically.'};
    }
    throw Error('No open player spot');
  }
  let desc=ans.desc;
  if(desc.type!=='answer')throw Error('Wrong code type');
  if(!net.pc)throw Error('Wrong code type');
  try{await net.pc.setRemoteDescription(rtcDesc(desc))}
  catch(e){throw e}
  await addDecodedIce(desc);
  broadcastNow();
  return{room:false,msg:'Answer accepted. Waiting for player...'};
}
async function useAnswer(){return safePair(els.answer,'Connecting...',async()=>{
  setStatus('Connecting...');
  let res=await acceptAnswerCode(els.answerCode.value);
  els.answerCode.value='';
  showPairButtons(res.room?['copyInvite','answer']:[]);
  setStatus(res.msg);
})}
async function menuAcceptAnswer(){return safePair(els.menuAcceptAnswer,'Accepting...',async()=>{
  setStatus('Accepting answer...');
  let res=await acceptAnswerCode(els.menuAnswerCode.value);
  els.menuAnswerCode.value='';
  syncMenuPair();
  setStatus(res.msg);
})}
function closeNet(){try{
if(net.dc){try{net.dc.close()}catch(e){}}
if(net.pc){try{net.pc.close()}catch(e){}}
if(net.channels)for(const c of net.channels.values())try{c.close()}catch(e){}
if(net.pendingSlots)for(const s of net.pendingSlots.values()){try{s.ch&&s.ch.close();s.pc&&s.pc.close()}catch(e){}}
if(net.joinPeers)for(const p of net.joinPeers.values()){try{p.close()}catch(e){}}
}catch(e){}
remoteInputs.clear();
if(net.channels)net.channels.clear();
if(net.knownIds)net.knownIds.clear();
if(net.joinedIds)net.joinedIds.clear();
if(net.pendingSlots)net.pendingSlots.clear();
if(net.joinPeers)net.joinPeers.clear();
net.dc=null;net.pc=null;net.localId=0;net.timer=0}
function send(o){sendWhenOpen(net.dc,o)}
function msgNet(o,ch,id){if(!o||typeof o!=='object')return;
if(o.t==='input'&&net.role==='host'){let active=net.channels&&net.channels.get(id);if(active!==ch)return;remoteInputs.set(id,inputSafe(o.v));}
if(o.t==='snap'&&net.role==='client')applyClientSnapshot(o.g);
if(o.t==='welcome'&&net.role==='client')markClientJoined(o.id,o.g);
if(o.t==='join'&&net.role==='host'){let active=net.channels&&net.channels.get(id);if(active&&active!==ch)return;let slot=net.pendingSlots&&net.pendingSlots.get(id);if(slot&&slot.ch!==ch)return;net.channels.set(id,ch);net.knownIds.add(id);net.joinedIds.add(id);if(slot){slot.done=true;slot.accepted=true;slot.connected=true}ensureHostPlayers(game.phase==='menu'||game.over);pulseHostSync(ch,id);broadcastPulse()}}
function broadcastNow(){if(net.role!=='host')return;
net.timer=0;
ensureHostPlayers(false);
repairGameState();
let snap={t:'snap',g:game};
for(const c of net.channels.values())sendWhenOpen(c,snap,20)}
function broadcastPulse(){broadcastNow();[120,420,900,1600,2600].forEach(ms=>setTimeout(broadcastNow,ms))}
function broadcast(dt=1){if(net.role!=='host')return;
net.timer+=dt;
if(dt&&net.timer<.05)return;
broadcastNow()}
function sendInput(dt){net.timer+=dt;
if(net.timer<.033)return;
net.timer=0;
let v=control({control:'local'}),l=hypot(v.x,v.y);
if(l>.001)inputAim={x:v.x/l,y:v.y/l};
if(v.dash&&!inputDashDown){inputSeq++;v.dashSeq=inputSeq;v.dashX=inputAim.x;v.dashY=inputAim.y}
inputDashDown=v.dash;
v.dash=false;
send({t:'input',v})}
function loop(now){let dt=Math.min(.033,(now-last)/1000||0);
last=now;
update(dt);
draw()}
function centerStick(){let jb=els.joy.getBoundingClientRect(),sw=els.stick.offsetWidth,sh=els.stick.offsetHeight;els.stick.style.left=(jb.width-sw)/2+'px';els.stick.style.top=(jb.height-sh)/2+'px'}
function pointer(e){let b=els.joy.getBoundingClientRect(),sw=els.stick.offsetWidth,sh=els.stick.offsetHeight,x=e.clientX-(b.left+b.width/2),y=e.clientY-(b.top+b.height/2),l=hypot(x,y),m=Math.min((b.width-sw)/2,l);
touch.x=l?x/l:0;
touch.y=l?y/l:0;
els.stick.style.left=(b.width-sw)/2+touch.x*m+'px';
els.stick.style.top=(b.height-sh)/2+touch.y*m+'px'}
window.addEventListener('keydown',e=>{
if(e.code==='Escape'){
  if(game.paused&&!game.over)resumeGame();
  else openGameMenu();
  e.preventDefault();
  return;
}
keys.add(e.code);
if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()});
window.addEventListener('keyup',e=>keys.delete(e.code));

els.joy.addEventListener('pointerdown',e=>{touch.on=true;
touch.id=e.pointerId;
els.joy.setPointerCapture(e.pointerId);
pointer(e)});
els.joy.addEventListener('pointermove',e=>{if(touch.on&&e.pointerId===touch.id)pointer(e)});
function joyEnd(){touch.on=false;
touch.x=touch.y=0;
centerStick()}
els.joy.addEventListener('pointerup',joyEnd);
els.joy.addEventListener('pointercancel',joyEnd);

els.dash.addEventListener('pointerdown',()=>{touch.dash=true;
els.dash.classList.add('down')});
['pointerup','pointercancel','pointerleave'].forEach(ev=>els.dash.addEventListener(ev,()=>{touch.dash=false;
els.dash.classList.remove('down')}));

els.start.onclick=startGame;
els.pause.onclick=openGameMenu;
els.resume.onclick=resumeGame;
els.restart.onclick=restartRun;
els.setupBack.onclick=showSetup;
function toggleFull(){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.()}
els.full.onclick=toggleFull;
els.fullGame.onclick=toggleFull;
els.invite.onclick=()=>invite();
els.join.onclick=()=>join();
els.use.onclick=()=>useInvite();
els.answer.onclick=()=>useAnswer();
els.menuAcceptAnswer.onclick=()=>menuAcceptAnswer();
els.menuCopyInvite.onclick=()=>copyTextFrom(els.code,'Invite code');
els.copyInvite.onclick=()=>copyTextFrom(els.code,'Invite code');
els.copyAnswer.onclick=()=>copyTextFrom(els.answerCode,'Answer code');
els.cancelPair.onclick=pairReset;


function fitCanvas(){
  let b=els.stage.getBoundingClientRect();
  let availW=Math.max(160,b.width-4), availH=Math.max(120,b.height-4);
  let scale=Math.max(.1,Math.min(availW/W,availH/H));
  cv.style.width=Math.floor(W*scale)+'px';
  cv.style.height=Math.floor(H*scale)+'px';
  cv.style.transform='none';
}
if('ResizeObserver'in window)new ResizeObserver(fitCanvas).observe(els.stage);
window.addEventListener('resize',fitCanvas);
window.addEventListener('orientationchange',()=>setTimeout(fitCanvas,250));

ui();
fitCanvas();
centerStick();
requestAnimationFrame(loop);

})();


</script>
