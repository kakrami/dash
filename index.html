<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Coin Dash</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #10141f;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
    touch-action: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at top, rgba(60, 120, 255, .18), transparent 35%),
      linear-gradient(180deg, #0c1020, #10141f 55%, #090b10);
  }
  canvas {
    width: min(100vw, 177.777vh);
    height: min(56.25vw, 100vh);
    max-width: 100vw;
    max-height: 100vh;
    image-rendering: pixelated;
    background: #18213a;
    border: 2px solid rgba(255,255,255,.16);
    box-shadow: 0 20px 90px rgba(0,0,0,.45);
  }
  #hud {
    position: fixed;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    pointer-events: none;
    font-weight: 800;
    text-shadow: 0 2px 2px rgba(0,0,0,.6);
  }
  .panel {
    background: rgba(7, 10, 18, .70);
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 8px;
    padding: 6px 8px;
    backdrop-filter: blur(7px);
  }
  #scorePanel {
    min-width: 186px;
  }
  .scoreLine {
    display: flex;
    gap: 10px;
    align-items: center;
    white-space: nowrap;
  }
  .scoreLine strong {
    font-size: 13px;
    letter-spacing: .02em;
  }
  .scoreMeta {
    font-size: 12px;
    opacity: .86;
  }
  #players {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    max-width: 420px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 7px;
    border-radius: 999px;
    background: rgba(255,255,255,.10);
    font-size: 13px;
    white-space: nowrap;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  #touchControls {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .touchBtn {
    pointer-events: auto;
    position: absolute;
    border: 1px solid rgba(255,255,255,.20);
    background: rgba(255,255,255,.10);
    color: #fff;
    border-radius: 999px;
    font-weight: 900;
    user-select: none;
    touch-action: none;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 20px rgba(255,255,255,.04), 0 6px 18px rgba(0,0,0,.25);
  }
  .touchBtn.down { background: rgba(255,255,255,.28); }
  #joyBase {
    pointer-events: auto;
    position: absolute;
    left: 24px;
    bottom: 34px;
    width: 112px;
    height: 112px;
    border-radius: 50%;
    background: rgba(255,255,255,.09);
    border: 1px solid rgba(255,255,255,.18);
    touch-action: none;
  }
  #joyStick {
    position: absolute;
    left: 34px;
    top: 34px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,.35);
    border: 1px solid rgba(255,255,255,.28);
  }
  #dashBtn {
    right: 28px;
    bottom: 78px;
    width: 66px;
    height: 66px;
    font-size: 12px;
  }
  #pauseBtn,
  #fullBtn,
  #resetBtn,
  #startBtn,
  #scanCodeBtn,
  #useCodeBtn,
  #cancelNetBtn,
  #cancelManualBtn {
    pointer-events: auto;
    cursor: pointer;
    color: #fff;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 10px;
    padding: 6px 9px;
    font-weight: 800;
  }
  #netBtn {
    pointer-events: auto;
    cursor: pointer;
    color: #fff;
    background: rgba(72, 184, 255, .16);
    border: 1px solid rgba(114, 211, 255, .32);
    border-radius: 10px;
    padding: 6px 9px;
    font-weight: 800;
  }
  #hudActions {
    display: flex;
    gap: 8px;
    pointer-events: auto;
  }
  #netPanel {
    position: fixed;
    right: 8px;
    top: 48px;
    width: min(340px, calc(100vw - 16px));
    display: none;
    z-index: 3;
  }
  #netPanel.show { display: block; }
  .netTitle {
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 900;
  }
  #netStatus {
    min-height: 18px;
    margin-top: 6px;
    color: rgba(255,255,255,.86);
    font-size: 11px;
    line-height: 1.25;
  }
  .netBtns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  #netOutgoingActions,
  #netIncomingActions {
    margin-top: 8px;
  }
  .netBtns.hidden,
  .netField.hidden,
  .hidden { display: none !important; }
  .netHoldBtn {
    border: 1px solid rgba(255,255,255,.20);
    background: rgba(255,255,255,.10);
    color: #fff;
    border-radius: 8px;
    padding: 9px 8px;
    font-weight: 900;
    user-select: none;
    touch-action: none;
  }
  .netHoldBtn.down {
    background: rgba(72,184,255,.28);
    border-color: rgba(114,211,255,.62);
  }
  #qrCanvas {
    width: min(250px, calc(100vw - 56px));
    height: min(250px, calc(100vw - 56px));
    margin: 8px auto;
    background: #fff;
    border-radius: 8px;
    image-rendering: pixelated;
    cursor: pointer;
  }
  #outCode,
  #inCode {
    width: 100%;
    min-height: 58px;
    margin-top: 8px;
    resize: vertical;
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 8px;
    background: rgba(0,0,0,.28);
    color: #fff;
    padding: 7px;
    font: 700 11px/1.25 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  #scanBox {
    margin-top: 8px;
    overflow: hidden;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,.18);
    background: #000;
  }
  #scanVideo {
    display: block;
    width: 100%;
    max-height: 260px;
    object-fit: contain;
    touch-action: manipulation;
    cursor: pointer;
  }
  @media (hover: hover) and (pointer: fine) {
    #touchControls { display: none; }
  }
  @media (max-width: 760px) {
    #wrap {
      align-items: flex-start;
      padding-top: 78px;
    }
    canvas {
      width: 100vw;
      height: auto;
      border-left: 0;
      border-right: 0;
      box-shadow: none;
    }
    #hud {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 4px 6px;
      font-size: 12px;
    }
    #scorePanel {
      grid-column: 1;
      grid-row: 1;
      min-width: 0;
      padding: 5px 7px;
    }
    #players {
      grid-column: 1 / -1;
      grid-row: 2;
      max-width: 100%;
      overflow: hidden;
    }
    #hudActions {
      grid-column: 2;
      grid-row: 1;
      justify-content: flex-end;
      gap: 4px;
    }
    #hudActions button {
      border-radius: 8px;
      padding: 5px 7px;
      font-size: 12px;
    }
    .badge {
      max-width: 100%;
      overflow: hidden;
      font-size: 11px;
      padding: 4px 6px;
    }
    .scoreMeta { font-size: 12px; }
    .scoreLine strong { display: none; }
    #netPanel {
      top: 78px;
      width: min(330px, calc(100vw - 16px));
    }
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>

<div id="hud">
  <div class="panel" id="scorePanel">
    <div class="scoreLine">
      <strong>COIN DASH</strong>
      <span class="scoreMeta"><span id="coinHud">0</span>/<span id="coinMaxHud">0</span> · <span id="timeHud">0:00</span></span>
    </div>
  </div>
  <div id="players"></div>
  <div id="hudActions">
    <button id="netBtn">Players</button>
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="fullBtn">Full</button>
    <button id="resetBtn">Reset</button>
  </div>
</div>

<div id="touchControls">
  <div id="joyBase"><div id="joyStick"></div></div>
  <div id="dashBtn" class="touchBtn">DASH</div>
</div>

<div id="netPanel" class="panel">
  <div class="netTitle">Players</div>
  <div id="netStartActions" class="netBtns">
    <button id="inviteBtn" class="netHoldBtn">Invite</button>
    <button id="joinBtn" class="netHoldBtn">Join</button>
  </div>
  <canvas id="qrCanvas" class="hidden" width="620" height="620"></canvas>
  <textarea id="outCode" class="netField hidden" readonly aria-label="connection code"></textarea>
  <div id="netOutgoingActions" class="netBtns hidden">
    <button id="scanCodeBtn">Scan Answer</button>
    <button id="cancelNetBtn">Cancel</button>
  </div>
  <textarea id="inCode" class="netField hidden" aria-label="paste connection code" placeholder="Paste code here"></textarea>
  <div id="netIncomingActions" class="netBtns hidden">
    <button id="useCodeBtn">Use Code</button>
    <button id="cancelManualBtn">Cancel</button>
  </div>
  <div id="scanBox" class="hidden"><video id="scanVideo" playsinline muted></video></div>
  <div id="netStatus">Ready.</div>
</div>

  const inCode = document.getElementById("inCode");
  const scanCodeBtn = document.getElementById("scanCodeBtn");
  const useCodeBtn = document.getElementById("useCodeBtn");
  const cancelNetBtn = document.getElementById("cancelNetBtn");
  const cancelManualBtn = document.getElementById("cancelManualBtn");
  const scanBox = document.getElementById("scanBox");
  const scanVideo = document.getElementById("scanVideo");
  const netStatus = document.getElementById("netStatus");
  const startBtn = document.getElementById("startBtn");
  const pauseBtn = document.getElementById("pauseBtn");
  const fullBtn = document.getElementById("fullBtn");
  const resetBtn = document.getElementById("resetBtn");
  const joyBase = document.getElementById("joyBase");
  const joyStick = document.getElementById("joyStick");
  const dashBtn = document.getElementById("dashBtn");

  const W = canvas.width;
  const H = canvas.height;

  const colors = ["#46d0ff", "#ff595e", "#8ac926", "#ffca3a"];
  const keyMap = { up: "KeyW", down: "KeyS", left: "KeyA", right: "KeyD", dash: "Space" };

  const keys = new Set();
  const touch = { x: 0, y: 0, active: false, dash: false, joyPointerId: null };
  const remoteInputs = new Map();

  let last = performance.now();
  let game;
  let net = makeNetState();

  const walls = [
    { x: 0, y: 0, w: W, h: 24 },
    { x: 0, y: H - 24, w: W, h: 24 },
    { x: 0, y: 0, w: 24, h: H },
    { x: W - 24, y: 0, w: 24, h: H },
    { x: 170, y: 118, w: 110, h: 36 },
    { x: 380, y: 90, w: 42, h: 120 },
    { x: 610, y: 124, w: 150, h: 32 },
    { x: 145, y: 345, w: 150, h: 36 },
    { x: 470, y: 330, w: 40, h: 120 },
    { x: 675, y: 340, w: 105, h: 36 }
  ];

  function makeGame() {
    const players = [
      makePlayer(0, 92, 92, "local")
    ];

    const coins = [
      [145, 90], [335, 78], [550, 85], [815, 86],
      [90, 210], [300, 220], [660, 225], [875, 240],
      [108, 330], [320, 315], [615, 315], [860, 340],
      [230, 455], [430, 455], [635, 455], [805, 455]
    ].map((p, i) => ({ x: p[0], y: p[1], r: 9, taken: false, pulse: i * .3 }));

    const enemies = [
      makeEnemy(500, 72),
      makeEnemy(170, 250),
      makeEnemy(770, 275),
      makeEnemy(535, 470)
    ];

    return {
      players,
      coins,
      enemies,
      phase: "menu",
      countdown: 0,
      activeTime: 0,
      over: false,
      won: false,
      paused: false,
      exit: { x: W - 68, y: H / 2, r: 28 },
      shake: 0,
      totalCoins: coins.length
    };
  }

  function makePlayer(id, x, y, control) {
    return {
      id,
      x,
      y,
      vx: 0,
      vy: 0,
      r: 15,
      alive: true,
      hp: 3,
      score: 0,
      speed: 155,
      control,
      dashCooldown: 0,
      dashTime: 0,
      dashX: 1,
      dashY: 0,
      dashTrail: [],
      invuln: 0,
      facingX: 1,
      facingY: 0,
      bob: Math.random() * 10
    };
  }

  function makeEnemy(x, y) {
    const a = Math.random() * Math.PI * 2;
    return { x, y, vx: Math.cos(a) * 70, vy: Math.sin(a) * 70, r: 14, stun: 0 };
  }

  function makeNetState() {
    return {
      mode: "solo",
      peer: null,
      channel: null,
      peers: new Map(),
      channels: new Map(),
      pairingPeer: null,
      pairingChannel: null,
      remotePlayerId: null,
      localPlayerId: 0,
      nextRemoteId: 1,
      sendTimer: 0,
      audio: null,
      scanStream: null,
      scanRun: 0,
      waitingFor: "none"
    };
  }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
  function len(x, y) { return Math.hypot(x, y); }

  function circleRectResolve(obj, rect) {
    const cx = clamp(obj.x, rect.x, rect.x + rect.w);
    const cy = clamp(obj.y, rect.y, rect.y + rect.h);
    let dx = obj.x - cx;
    let dy = obj.y - cy;
    let d = Math.hypot(dx, dy);

    if (d < obj.r) {
      if (d < 0.001) {
        const left = Math.abs(obj.x - rect.x);
        const right = Math.abs(obj.x - (rect.x + rect.w));
        const top = Math.abs(obj.y - rect.y);
        const bottom = Math.abs(obj.y - (rect.y + rect.h));
        const m = Math.min(left, right, top, bottom);
        if (m === left) { dx = -1; dy = 0; d = 1; }
        else if (m === right) { dx = 1; dy = 0; d = 1; }
        else if (m === top) { dx = 0; dy = -1; d = 1; }
        else { dx = 0; dy = 1; d = 1; }
      }
      const push = obj.r - d;
      obj.x += dx / d * push;
      obj.y += dy / d * push;
      if (Math.abs(dx) > Math.abs(dy)) obj.vx *= -0.25;
      else obj.vy *= -0.25;
      return true;
    }
    return false;
  }

  function solidWalls() {
    return walls;
  }

  function resolveWorld(obj) {
    for (const wall of solidWalls()) circleRectResolve(obj, wall);
    obj.x = clamp(obj.x, obj.r + 24, W - obj.r - 24);
    obj.y = clamp(obj.y, obj.r + 24, H - obj.r - 24);
  }

  function controlsFor(player) {
    if (player.control === "remote") {
      return remoteInputs.get(player.id) || { x: 0, y: 0, dash: false };
    }

    let x = 0;
    let y = 0;
    if (keys.has(keyMap.left)) x -= 1;
    if (keys.has(keyMap.right)) x += 1;
    if (keys.has(keyMap.up)) y -= 1;
    if (keys.has(keyMap.down)) y += 1;

    if (touch.active) {
      x += touch.x;
      y += touch.y;
    }

    const l = Math.hypot(x, y);
    if (l > 1) { x /= l; y /= l; }
    return { x, y, dash: keys.has(keyMap.dash) || touch.dash };
  }

  function update(dt) {
    if (game.over) return;

    if (net.mode === "client" && isChannelOpen()) {
      sendLocalInput(dt);
      updateHud();
      return;
    }

    if (game.phase === "menu") {
      sendSnapshot(dt);
      updateHud();
      return;
    }

    if (game.paused) {
      sendSnapshot(dt);
      updateHud();
      return;
    }

    if (game.phase === "countdown") {
      game.countdown = Math.max(0, game.countdown - dt);
      if (game.countdown <= 0) {
        game.phase = "playing";
        playSfx("start");
      }
      sendSnapshot(dt);
      updateHud();
      return;
    }

    game.activeTime += dt;

    for (const p of game.players) {
      p.bob += dt * 7;
      p.invuln = Math.max(0, p.invuln - dt);
      p.dashCooldown = Math.max(0, p.dashCooldown - dt);
      p.dashTime = Math.max(0, p.dashTime - dt);
      p.dashTrail = p.dashTrail.filter(t => performance.now() - t.at < 190);

      if (!p.alive) continue;

      const c = controlsFor(p);
      if (c.x || c.y) {
        p.facingX = c.x;
        p.facingY = c.y;
      }

      if (c.dash && p.dashCooldown <= 0) {
        const l = Math.hypot(c.x, c.y);
        p.dashX = l ? c.x / l : p.facingX;
        p.dashY = l ? c.y / l : p.facingY;
        p.dashTime = 0.18;
        p.dashCooldown = 0.72;
        p.invuln = Math.max(p.invuln, 0.18);
        game.shake = Math.max(game.shake, 0.05);
        playSfx("dash");
      }

      if (p.dashTime > 0) {
        p.vx = p.dashX * 500;
        p.vy = p.dashY * 500;
        p.dashTrail.push({ x: p.x, y: p.y, at: performance.now() });
      } else {
        p.vx = c.x * p.speed;
        p.vy = c.y * p.speed;
      }

      p.x += p.vx * dt;
      p.y += p.vy * dt;
      resolveWorld(p);
    }

    updateCoins();
    updateEnemies(dt);
    updateWinLose();
    sendSnapshot(dt);
    updateHud();
  }

  function updateCoins() {
    for (const coin of game.coins) {
      if (coin.taken) continue;
      for (const p of game.players) {
        if (!p.alive) continue;
        if (Math.hypot(p.x - coin.x, p.y - coin.y) < p.r + coin.r) {
          coin.taken = true;
          p.score++;
          playSfx("coin");
          break;
        }
      }
    }
  }

  function updateEnemies(dt) {
    const active = game.players.filter(p => p.alive);
    for (const e of game.enemies) {
      e.stun = Math.max(0, e.stun - dt);

      let tx = 0;
      let ty = 0;
      if (active.length && e.stun <= 0) {
        let target = active[0];
        let best = dist(e, target);
        for (const p of active) {
          const d = dist(e, p);
          if (d < best) { best = d; target = p; }
        }
        if (best < 240) {
          tx = (target.x - e.x) / best;
          ty = (target.y - e.y) / best;
        }
      }

      e.vx += tx * 90 * dt;
      e.vy += ty * 90 * dt;
      const s = Math.hypot(e.vx, e.vy);
      const max = e.stun > 0 ? 45 : 92;
      if (s > max) { e.vx = e.vx / s * max; e.vy = e.vy / s * max; }

      e.x += e.vx * dt;
      e.y += e.vy * dt;
      for (const wall of solidWalls()) {
        if (circleRectResolve(e, wall)) {
          e.vx += (Math.random() - .5) * 40;
          e.vy += (Math.random() - .5) * 40;
        }
      }
      resolveWorld(e);

      for (const player of active) {
        const d = Math.hypot(player.x - e.x, player.y - e.y);
        if (d < player.r + e.r && player.invuln <= 0) {
          if (player.dashTime > 0) {
            const nx = (e.x - player.x) / Math.max(d, .001);
            const ny = (e.y - player.y) / Math.max(d, .001);
            e.vx = nx * 190;
            e.vy = ny * 190;
            e.stun = .7;
            playSfx("bump");
          } else {
            player.hp--;
            player.invuln = 1.1;
            game.shake = 0.18;
            const nx = (player.x - e.x) / Math.max(d, .001);
            const ny = (player.y - e.y) / Math.max(d, .001);
            player.x += nx * 20;
            player.y += ny * 20;
            resolveWorld(player);
            if (player.hp <= 0) {
              player.alive = false;
              playSfx("out");
            } else {
              playSfx("hit");
            }
          }
        }
      }
    }
  }

  function updateWinLose() {
    const active = game.players.filter(p => p.alive);
    if (!active.length) {
      game.over = true;
      game.won = false;
      playSfx("lose");
      return;
    }

    const collected = game.coins.filter(c => c.taken).length;
    if (collected === game.totalCoins) {
      for (const player of active) {
        if (Math.hypot(player.x - game.exit.x, player.y - game.exit.y) < player.r + game.exit.r) {
          game.over = true;
          game.won = true;
          playSfx("win");
          break;
        }
      }
    }
  }

  function draw() {
    const shake = game.shake > 0 ? game.shake : 0;
    game.shake = Math.max(0, game.shake - 0.016);
    const ox = shake ? (Math.random() - .5) * 8 : 0;
    const oy = shake ? (Math.random() - .5) * 8 : 0;

    ctx.save();
    ctx.translate(ox, oy);
    ctx.clearRect(-10, -10, W + 20, H + 20);
    drawFloor();
    drawExit();
    drawWalls();
    drawCoins();
    drawPlayers();
    drawEnemies();
    drawOverlay();
    ctx.restore();
  }

  function drawFloor() {
    ctx.fillStyle = "#18213a";
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = "rgba(255,255,255,.045)";
    ctx.lineWidth = 1;
    for (let x = 24; x < W; x += 32) {
      ctx.beginPath(); ctx.moveTo(x, 24); ctx.lineTo(x, H - 24); ctx.stroke();
    }
    for (let y = 24; y < H; y += 32) {
      ctx.beginPath(); ctx.moveTo(24, y); ctx.lineTo(W - 24, y); ctx.stroke();
    }

    ctx.strokeStyle = "rgba(255,255,255,.18)";
    ctx.lineWidth = 2;
    ctx.strokeRect(24, 24, W - 48, H - 48);
  }

  function drawWalls() {
    for (const wall of walls) {
      const grd = ctx.createLinearGradient(wall.x, wall.y, wall.x, wall.y + wall.h);
      grd.addColorStop(0, "#59627a");
      grd.addColorStop(1, "#2d3549");
      ctx.fillStyle = grd;
      roundRect(wall.x, wall.y, wall.w, wall.h, 8, true, false);
      ctx.strokeStyle = "rgba(255,255,255,.16)";
      ctx.lineWidth = 2;
      roundRect(wall.x + 1, wall.y + 1, wall.w - 2, wall.h - 2, 8, false, true);
    }
  }

  function drawExit() {
    const collected = game.coins.filter(c => c.taken).length;
    const open = collected === game.totalCoins;
    ctx.save();
    ctx.translate(game.exit.x, game.exit.y);
    ctx.fillStyle = open ? "rgba(77,255,136,.20)" : "rgba(255,255,255,.08)";
    ctx.beginPath(); ctx.arc(0, 0, game.exit.r + 10, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = open ? "#67ff98" : "rgba(255,255,255,.22)";
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(0, 0, game.exit.r, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = open ? "#d8ffe3" : "rgba(255,255,255,.45)";
    ctx.font = "900 13px system-ui";
    ctx.textAlign = "center";
    ctx.fillText(open ? "EXIT" : "LOCKED", 0, 5);
    ctx.restore();
  }

  function drawCoins() {
    const now = performance.now() / 1000;
    for (const coin of game.coins) {
      if (coin.taken) continue;
      const pulse = Math.sin(now * 5 + coin.pulse) * 2;
      ctx.fillStyle = "rgba(0,0,0,.25)";
      ctx.beginPath(); ctx.ellipse(coin.x, coin.y + 11, 10, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ffd166";
      ctx.beginPath(); ctx.arc(coin.x, coin.y + pulse, coin.r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff3b0";
      ctx.beginPath(); ctx.arc(coin.x - 3, coin.y - 3 + pulse, 3, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawPlayers() {
    for (const p of game.players) {
      const yBob = Math.sin(p.bob) * 2;

      ctx.fillStyle = "rgba(0,0,0,.28)";
      ctx.beginPath(); ctx.ellipse(p.x, p.y + 17, 17, 6, 0, 0, Math.PI * 2); ctx.fill();

      if (p.dashTrail.length) {
        for (const t of p.dashTrail) {
          const age = (performance.now() - t.at) / 190;
          ctx.globalAlpha = Math.max(0, 0.38 * (1 - age));
          ctx.fillStyle = colors[p.id % colors.length];
          ctx.beginPath(); ctx.arc(t.x, t.y, p.r * (1 - age * 0.25), 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      if (!p.alive) ctx.globalAlpha = .35;
      if (p.invuln > 0 && Math.floor(p.invuln * 12) % 2 === 0) ctx.globalAlpha = .45;

      ctx.fillStyle = colors[p.id % colors.length];
      ctx.beginPath(); ctx.arc(p.x, p.y + yBob, p.r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.85)";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "rgba(0,0,0,.38)";
      ctx.beginPath(); ctx.arc(p.x + p.facingX * 5, p.y - 2 + p.facingY * 5 + yBob, 4, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.font = "900 11px system-ui";
      ctx.textAlign = "center";
      ctx.fillText(`P${p.id + 1}`, p.x, p.y + 4 + yBob);

      ctx.globalAlpha = 1;
      drawHearts(p.x - 16, p.y - 27 + yBob, p.hp);
    }
  }

  function drawHearts(x, y, hp) {
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = i < hp ? "#ff4d6d" : "rgba(255,255,255,.18)";
      ctx.fillRect(x + i * 11, y, 8, 8);
    }
  }

  function drawEnemies() {
    for (const e of game.enemies) {
      ctx.fillStyle = "rgba(0,0,0,.28)";
      ctx.beginPath(); ctx.ellipse(e.x, e.y + 15, 16, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = e.stun > 0 ? "#a0a7ff" : "#c77dff";
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(0,0,0,.65)";
      ctx.beginPath(); ctx.arc(e.x - 5, e.y - 3, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e.x + 5, e.y - 3, 3, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,.55)";
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(e.x, e.y + 4, 6, 0, Math.PI); ctx.stroke();
    }
  }

  function drawOverlay() {
    if (!game.over && !game.paused && game.phase !== "menu" && game.phase !== "countdown") return;
    ctx.fillStyle = "rgba(0,0,0,.55)";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    if (game.phase === "menu") {
      ctx.font = "900 48px system-ui";
      ctx.fillText("COIN DASH", W / 2, H / 2 - 48);
      ctx.font = "800 18px system-ui";
      ctx.fillText(net.mode === "client" && isChannelOpen() ? "Waiting for host to start" : "Press Start", W / 2, H / 2 - 6);
      ctx.font = "700 14px system-ui";
      ctx.fillStyle = "rgba(255,255,255,.82)";
      ctx.fillText("Collect every coin, dodge enemies, then reach the exit.", W / 2, H / 2 + 28);
      return;
    }
    if (game.phase === "countdown") {
      ctx.font = "900 74px system-ui";
      ctx.fillText(game.countdown > .7 ? Math.ceil(game.countdown) : "GO", W / 2, H / 2 + 24);
      return;
    }
    ctx.font = "900 44px system-ui";
    ctx.fillText(game.paused ? "PAUSED" : (game.won ? "YOU WIN" : "GAME OVER"), W / 2, H / 2 - 20);
    ctx.font = "800 18px system-ui";
    ctx.fillText(game.paused ? "Press Resume to continue" : "Press Start to play again", W / 2, H / 2 + 22);
  }

  function roundRect(x, y, w, h, r, fill, stroke) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function setNetStatus(text) {
    netStatus.textContent = text;
  }

  async function playSfx(name) {
    try {
      const ctxAudio = await getAudio();
      const now = ctxAudio.currentTime;
      const patterns = {
        coin: [[880, .045], [1320, .055], [1760, .07]],
        dash: [[180, .035], [360, .04]],
        bump: [[420, .04], [260, .07]],
        hit: [[160, .06], [120, .08]],
        out: [[320, .08], [220, .1], [120, .16]],
        win: [[660, .08], [880, .08], [1320, .12], [1760, .18]],
        lose: [[240, .12], [180, .12], [120, .2]],
        join: [[520, .06], [780, .09], [1040, .12]],
        pause: [[440, .08], [330, .09]],
        resume: [[330, .06], [440, .08]],
        start: [[523, .06], [784, .08]]
      };
      let t = now;
      for (const [freq, dur] of patterns[name] || patterns.coin) {
        const osc = ctxAudio.createOscillator();
        const gain = ctxAudio.createGain();
        osc.type = name === "dash" ? "sawtooth" : "square";
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.06, t + 0.006);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.connect(gain).connect(ctxAudio.destination);
        osc.start(t);
        osc.stop(t + dur + 0.01);
        t += dur * 0.82;
      }
    } catch {}
  }

  function primeAudio() {
    getAudio().catch(() => {});
  }

  function isChannelOpen() {
    if (net.mode === "host") {
      for (const channel of net.channels.values()) {
        if (channel.readyState === "open") return true;
      }
      return false;
    }
    return net.channel && net.channel.readyState === "open";
  }

  function closePairingAttempt() {
    stopScan();
    clearCodes(false);
    if (net.pairingChannel && net.pairingChannel.readyState !== "open") {
      try { net.pairingChannel.close(); } catch {}
    }
    if (net.pairingPeer && !["connected", "completed"].includes(net.pairingPeer.connectionState)) {
      try { net.pairingPeer.close(); } catch {}
    }
    if (net.peer && !net.channel && !["connected", "completed"].includes(net.peer.connectionState)) {
      try { net.peer.close(); } catch {}
      net.peer = null;
    }
    net.pairingPeer = null;
    net.pairingChannel = null;
    net.waitingFor = "none";
    setNetPanelMode("ready");
    if (net.channel && net.channel.readyState !== "open") {
      try { net.channel.close(); } catch {}
      net.channel = null;
      net.peer = null;
    }
    net.mode = isChannelOpen() ? net.mode : "solo";
    if (!isChannelOpen()) {
      net.remotePlayerId = null;
      net.localPlayerId = 0;
      net.nextRemoteId = 1;
      remoteInputs.clear();
      game.players = game.players.filter(p => p.id === 0);
      updateHud();
    }
  }

  async function getAudio() {
    if (!net.audio) {
      net.audio = { ctx: new (window.AudioContext || window.webkitAudioContext)() };
    }
    if (net.audio.ctx.state === "suspended") await net.audio.ctx.resume();
    return net.audio.ctx;
  }

  function setHidden(el, hidden) {
    el.classList.toggle("hidden", hidden);
  }

  function setNetPanelMode(mode) {
    const ready = mode === "ready";
    const invite = mode === "invite";
    const join = mode === "join";
    const answer = mode === "answer";
    const manual = mode === "manual";
    const scanning = mode === "scanning";

    setHidden(netStartActions, !ready);
    setHidden(netOutgoingActions, ready || manual);
    setHidden(netIncomingActions, !manual);
    setHidden(scanCodeBtn, answer || scanning);
    setHidden(useCodeBtn, !manual);
    setHidden(inCode, !manual);

    scanCodeBtn.textContent = invite ? "Scan Answer" : "Scan Invite";
  }

  function clearCodes(clearInput = true) {
    setHidden(qrCanvas, true);
    setHidden(outCode, true);
    outCode.value = "";
    if (clearInput) inCode.value = "";
  }

  function showOutgoingCode(code, status) {
    outCode.value = code;
    const drewQr = drawQr(code);
    setHidden(outCode, drewQr);
    setNetStatus(drewQr ? status : "QR did not fit. Copy this code instead.");
  }

  function drawQr(text) {
    if (!window.QRCodeLite || !window.QRErrorCorrectLevelLite) return false;
    try {
      const qr = new window.QRCodeLite(0, window.QRErrorCorrectLevelLite.L);
      qr.addData(text);
      qr.make();
      const qctx = qrCanvas.getContext("2d");
      const count = qr.getModuleCount();
      const quiet = 4;
      const scale = Math.max(1, Math.floor(qrCanvas.width / (count + quiet * 2)));
      const size = scale * (count + quiet * 2);
      const offset = Math.floor((qrCanvas.width - size) / 2);
      qctx.fillStyle = "#fff";
      qctx.fillRect(0, 0, qrCanvas.width, qrCanvas.height);
      qctx.fillStyle = "#000";
      for (let row = 0; row < count; row++) {
        for (let col = 0; col < count; col++) {
          if (qr.isDark(row, col)) {
            qctx.fillRect(offset + (col + quiet) * scale, offset + (row + quiet) * scale, scale, scale);
          }
        }
      }
      setHidden(qrCanvas, false);
      return true;
    } catch {
      setHidden(qrCanvas, true);
      return false;
    }
  }

  function bytesToBase64Url(bytes) {
    let binary = "";
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
    }
    return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  function base64UrlToBytes(text) {
    const b64 = text.replace(/-/g, "+").replace(/_/g, "/").padEnd(Math.ceil(text.length / 4) * 4, "=");
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  async function packText(text) {
    const raw = new TextEncoder().encode(text);
    if ("CompressionStream" in window) {
      try {
        const stream = new Blob([raw]).stream().pipeThrough(new CompressionStream("gzip"));
        const zipped = new Uint8Array(await new Response(stream).arrayBuffer());
        return `gz.${bytesToBase64Url(zipped)}`;
      } catch {}
    }
    return `raw.${bytesToBase64Url(raw)}`;
  }

  async function unpackText(payload) {
    const dot = payload.indexOf(".");
    if (dot < 0) throw new Error("Bad code");
    const kind = payload.slice(0, dot);
    const bytes = base64UrlToBytes(payload.slice(dot + 1));
    if (kind === "gz") {
      if (!("DecompressionStream" in window)) throw new Error("This browser cannot read compressed codes. Use Chrome or paste raw code.");
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
      return new TextDecoder().decode(await new Response(stream).arrayBuffer());
    }
    if (kind === "raw") return new TextDecoder().decode(bytes);
    throw new Error("Bad code");
  }

  const sdpTokens = [
    ["a=candidate:", "~A"],
    [" UDP ", "~B"],
    [" TCP ", "~C"],
    [" typ host", "~D"],
    [" typ srflx", "~E"],
    [" typ relay", "~F"],
    [" generation 0", "~G"],
    [" network-id ", "~H"],
    [" network-cost ", "~I"],
    ["a=ice-ufrag:", "~J"],
    ["a=ice-pwd:", "~K"],
    ["a=fingerprint:sha-256 ", "~L"],
    ["a=setup:", "~M"],
    ["a=mid:", "~N"],
    ["a=sctp-port:", "~O"],
    ["a=max-message-size:", "~P"],
    ["a=ice-options:trickle", "~Q"],
    ["a=end-of-candidates", "~R"],
    ["m=application 9 UDP/DTLS/SCTP webrtc-datachannel", "~S"],
    ["c=IN IP4 0.0.0.0", "~T"],
    ["a=group:BUNDLE ", "~U"]
  ];

  function compactSdp(sdp) {
    let compact = sdp.replace(/\r\n/g, "\n").split("\n").filter(Boolean).join("\n");
    for (const [from, to] of sdpTokens) compact = compact.split(from).join(to);
    return compact;
  }

  function expandSdp(compact) {
    let sdp = compact;
    for (let i = sdpTokens.length - 1; i >= 0; i--) {
      const [from, to] = sdpTokens[i];
      sdp = sdp.split(to).join(from);
    }
    return `${sdp.replace(/\n/g, "\r\n")}\r\n`;
  }

  function makeCompactSignal(packet) {
    return {
      t: packet.type === "offer" ? "o" : "a",
      s: compactSdp(packet.sdp)
    };
  }

  function readCompactSignal(packet) {
    if (Array.isArray(packet)) {
      return { type: packet[0] === "o" ? "offer" : "answer", sdp: expandSdp(packet[1]) };
    }
    return {
      type: packet.t === "o" ? "offer" : "answer",
      sdp: expandSdp(packet.s)
    };
  }

  async function encodeSignal(packet) {
    const compact = makeCompactSignal(packet);
    return `K2.${await packText(JSON.stringify([compact.t, compact.s]))}`;
  }

  async function decodeSignal(code) {
    const clean = code.trim().replace(/\s+/g, "");
    if (!clean) throw new Error("Paste or scan a code first.");
    if (clean.startsWith("{")) return JSON.parse(code);
    if (clean.startsWith("K2.")) return readCompactSignal(JSON.parse(await unpackText(clean.slice(3))));
    if (!clean.startsWith("KICKLAN1.")) throw new Error("That is not a game invite code.");
    return JSON.parse(await unpackText(clean.slice("KICKLAN1.".length)));
  }

  function localInputPayload() {
    const player = game.players.find(p => p.id === net.localPlayerId) || game.players[0];
    const c = controlsFor(player);
    return { x: c.x, y: c.y, dash: c.dash };
  }

  function sendLocalInput(dt) {
    net.sendTimer -= dt;
    if (net.sendTimer > 0 || !isChannelOpen()) return;
    net.sendTimer = 1 / 30;
    net.channel.send(JSON.stringify({ type: "input", input: localInputPayload() }));
  }

  function sendSnapshot(dt) {
    net.sendTimer -= dt;
    if (net.sendTimer > 0 || !isChannelOpen() || net.mode !== "host") return;
    net.sendTimer = 1 / 20;
    const payload = JSON.stringify({
      type: "state",
      players: game.players.map(p => ({
        id: p.id, x: p.x, y: p.y, vx: p.vx, vy: p.vy, hp: p.hp, score: p.score,
        alive: p.alive, dashCooldown: p.dashCooldown, dashTime: p.dashTime,
        facingX: p.facingX, facingY: p.facingY
      })),
      coins: game.coins.map(c => c.taken),
      enemies: game.enemies.map(e => ({ x: e.x, y: e.y, vx: e.vx, vy: e.vy, stun: e.stun })),
      phase: game.phase,
      countdown: game.countdown,
      activeTime: game.activeTime,
      over: game.over,
      won: game.won,
      paused: game.paused
    });
    for (const channel of net.channels.values()) {
      if (channel.readyState === "open") channel.send(payload);
    }
  }

  function applySnapshot(msg) {
    for (const src of msg.players || []) {
      let p = game.players.find(player => player.id === src.id);
      if (!p) {
        p = makePlayer(src.id, src.x, src.y, src.id === net.localPlayerId ? "local" : "remote");
        game.players.push(p);
      }
      Object.assign(p, src);
      p.control = src.id === net.localPlayerId ? "local" : "remote";
    }
    game.players = game.players.filter(p => (msg.players || []).some(src => src.id === p.id));
    if (msg.coins) game.coins.forEach((c, i) => { c.taken = !!msg.coins[i]; });
    if (msg.enemies) game.enemies.forEach((e, i) => { if (msg.enemies[i]) Object.assign(e, msg.enemies[i]); });
    game.phase = msg.phase || "playing";
    game.countdown = Number.isFinite(msg.countdown) ? msg.countdown : 0;
    game.activeTime = Number.isFinite(msg.activeTime) ? msg.activeTime : game.activeTime;
    game.over = !!msg.over;
    game.won = !!msg.won;
    game.paused = !!msg.paused;
  }

  function handleChannelMessage(event, channelPlayerId = null) {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }

    if (msg.type === "input" && net.mode === "host" && channelPlayerId != null) {
      remoteInputs.set(channelPlayerId, msg.input);
    } else if (msg.type === "welcome" && net.mode === "client") {
      net.localPlayerId = msg.playerId;
      setNetStatus(`Connected as P${msg.playerId + 1}.`);
      playSfx("join");
    } else if (msg.type === "state" && net.mode === "client") {
      applySnapshot(msg);
      updateHud();
    }
  }

  function setupChannel(channel) {
    let channelPlayerId = null;
    channel.onmessage = event => handleChannelMessage(event, channelPlayerId);
    channel.onopen = () => {
      if (net.mode === "host") {
        const id = addRemotePlayer();
        if (id == null) {
          channel.close();
          setNetStatus("Full");
          return;
        }
        channelPlayerId = id;
        net.remotePlayerId = id;
        net.channels.set(id, channel);
        if (net.pairingPeer) net.peers.set(id, net.pairingPeer);
        channel.send(JSON.stringify({ type: "welcome", playerId: id }));
        setNetStatus(`Connected: P${id + 1}`);
        playSfx("join");
        net.sendTimer = 0;
        sendSnapshot(1);
        net.pairingPeer = null;
        net.pairingChannel = null;
        net.waitingFor = "none";
        stopScan();
        clearCodes();
        setNetPanelMode("ready");
      } else {
        net.channel = channel;
        setNetStatus("Connected");
        stopScan();
        clearCodes();
        setNetPanelMode("ready");
      }
    };
    channel.onclose = () => {
      if (net.mode === "host" && channelPlayerId != null) {
        net.channels.delete(channelPlayerId);
        const peer = net.peers.get(channelPlayerId);
        if (peer) {
          try { peer.close(); } catch {}
          net.peers.delete(channelPlayerId);
        }
        remoteInputs.delete(channelPlayerId);
        game.players = game.players.filter(p => p.id !== channelPlayerId);
        updateHud();
        setNetStatus(net.channels.size ? `${net.channels.size + 1} players` : "Disconnected");
      } else {
        setNetStatus("Disconnected");
      }
    };
  }

  function addRemotePlayer() {
    if (game.players.length >= colors.length) return null;
    let id = 1;
    while (game.players.some(p => p.id === id) && id < colors.length) id++;
    if (id >= colors.length) return null;
    net.nextRemoteId = Math.max(net.nextRemoteId, id + 1);
    const spots = [{ x: 130, y: 92 }, { x: 92, y: 132 }, { x: 130, y: 132 }];
    const spot = spots[(id - 1) % spots.length];
    game.players.push(makePlayer(id, spot.x, spot.y, "remote"));
    return id;
  }

  function createPeer() {
    if (!("RTCPeerConnection" in window)) {
      throw new Error("Pairing is not supported here.");
    }
    const peer = new RTCPeerConnection({ iceServers: [] });
    peer.onconnectionstatechange = () => {
      if (peer.connectionState === "connected") setNetStatus("Connected");
      else if (peer.connectionState === "failed") setNetStatus("Could not connect");
    };
    return peer;
  }

  function waitIceComplete(peer) {
    if (peer.iceGatheringState === "complete") return Promise.resolve();
    return new Promise(resolve => {
      const done = () => {
        if (peer.iceGatheringState === "complete") {
          peer.removeEventListener("icegatheringstatechange", done);
          resolve();
        }
      };
      peer.addEventListener("icegatheringstatechange", done);
      setTimeout(resolve, 1800);
    });
  }

  async function beginInvite() {
    try {
      if (game.players.length >= colors.length) {
        setNetStatus("Full");
        return;
      }
      closePairingAttempt();
      netPanel.classList.add("show");
      setNetPanelMode("invite");
      net.mode = "host";
      const peer = createPeer();
      net.pairingPeer = peer;
      const channel = peer.createDataChannel("coin-dash");
      net.pairingChannel = channel;
      setupChannel(channel);
      const offer = await peer.createOffer();
      await peer.setLocalDescription(offer);
      await waitIceComplete(peer);
      net.waitingFor = "answer";
      const code = await encodeSignal({ type: "offer", sdp: peer.localDescription.sdp });
      showOutgoingCode(code, "Show this QR. Then scan their answer.");
    } catch (err) {
      setNetStatus(err.message);
      closePairingAttempt();
    }
  }

  async function beginJoin() {
    try {
      if (isChannelOpen()) return;
      closePairingAttempt();
      netPanel.classList.add("show");
      setNetPanelMode("scanning");
      net.mode = "client";
      net.waitingFor = "offer";
      clearCodes();
      setNetStatus("Scan host QR.");
      scanIncomingCode();
    } catch (err) {
      setNetStatus(err.message);
      closePairingAttempt();
    }
  }

  async function handleSignalPacket(packet) {
    if (packet.type === "offer" && net.mode === "client" && !net.peer) {
      setNetStatus("Answering...");
      const peer = createPeer();
      net.peer = peer;
      peer.ondatachannel = event => setupChannel(event.channel);
      await peer.setRemoteDescription({ type: "offer", sdp: packet.sdp });
      const answer = await peer.createAnswer();
      await peer.setLocalDescription(answer);
      await waitIceComplete(peer);
      const code = await encodeSignal({ type: "answer", sdp: peer.localDescription.sdp });
      net.waitingFor = "connected";
      setNetPanelMode("answer");
      showOutgoingCode(code, "Show this answer QR to the host.");
    } else if (packet.type === "answer" && net.mode === "host" && net.pairingPeer && !net.pairingPeer.currentRemoteDescription) {
      setNetStatus("Connecting...");
      const peer = net.pairingPeer;
      await peer.setRemoteDescription({ type: "answer", sdp: packet.sdp });
      clearCodes();
      setNetPanelMode("ready");
      setNetStatus("Connecting...");
    } else {
      throw new Error("This code is for the other step.");
    }
  }

  async function useIncomingCode() {
    try {
      const packet = await decodeSignal(inCode.value);
      await handleSignalPacket(packet);
    } catch (err) {
      setNetStatus(err.message);
    }
  }

  function stopScan() {
    net.scanRun++;
    setHidden(scanBox, true);
    if (scanVideo.srcObject) scanVideo.srcObject = null;
    if (net.scanStream) {
      for (const track of net.scanStream.getTracks()) track.stop();
      net.scanStream = null;
    }
  }

  async function applyCameraFocus(track, mode = "continuous") {
    if (!track || !track.applyConstraints) return false;
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    const advanced = [];
    if (Array.isArray(caps.focusMode)) {
      if (caps.focusMode.includes(mode)) advanced.push({ focusMode: mode });
      else if (caps.focusMode.includes("continuous")) advanced.push({ focusMode: "continuous" });
      else if (caps.focusMode.includes("single-shot")) advanced.push({ focusMode: "single-shot" });
    }
    if (Array.isArray(caps.exposureMode) && caps.exposureMode.includes("continuous")) {
      advanced.push({ exposureMode: "continuous" });
    }
    if (Array.isArray(caps.whiteBalanceMode) && caps.whiteBalanceMode.includes("continuous")) {
      advanced.push({ whiteBalanceMode: "continuous" });
    }
    if (!advanced.length) return false;
    try {
      await track.applyConstraints({ advanced });
      return true;
    } catch {
      return false;
    }
  }

  async function refocusScanner() {
    const track = net.scanStream && net.scanStream.getVideoTracks()[0];
    if (!track) return;
    const focused = await applyCameraFocus(track, "single-shot");
    if (focused) {
      setNetStatus("Refocusing...");
      setTimeout(() => {
        applyCameraFocus(track, "continuous");
        setNetStatus(net.mode === "host" ? "Scan answer QR. Tap video to refocus." : "Scan host QR. Tap video to refocus.");
      }, 700);
    }
  }

  async function scanIncomingCode() {
    setNetPanelMode("scanning");
    setHidden(qrCanvas, true);
    setHidden(outCode, true);
    if (!("BarcodeDetector" in window)) {
      setNetPanelMode("manual");
      setNetStatus("Paste code. Other player can tap their QR to show it.");
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setNetPanelMode("manual");
      setNetStatus("Paste code. Other player can tap their QR to show it.");
      return;
    }
    try {
      stopScan();
      const detector = new BarcodeDetector({ formats: ["qr_code"] });
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
      net.scanStream = stream;
      const track = stream.getVideoTracks()[0];
      await applyCameraFocus(track, "continuous");
      scanVideo.srcObject = stream;
      setHidden(scanBox, false);
      await scanVideo.play();
      const run = ++net.scanRun;
      const scan = async () => {
        if (run !== net.scanRun) return;
        try {
          const codes = await detector.detect(scanVideo);
          if (codes.length && codes[0].rawValue) {
            inCode.value = codes[0].rawValue;
            stopScan();
            await useIncomingCode();
            return;
          }
        } catch {}
        requestAnimationFrame(scan);
      };
      setNetStatus(net.mode === "host" ? "Scan answer QR. Tap video to refocus." : "Scan host QR. Tap video to refocus.");
      scan();
    } catch {
      stopScan();
      setNetPanelMode("manual");
      setNetStatus("Paste code. Other player can tap their QR to show it.");
    }
  }

  function updateHud() {
    const collected = game.coins.filter(c => c.taken).length;
    coinHud.textContent = collected;
    coinMaxHud.textContent = game.totalCoins;
    pauseBtn.textContent = game.paused ? "Resume" : "Pause";
    const waitingClient = net.mode === "client" && isChannelOpen();
    startBtn.textContent = game.over ? "Restart" : "Start";
    startBtn.classList.toggle("hidden", waitingClient || (!game.over && game.phase !== "menu"));
    pauseBtn.classList.toggle("hidden", game.over || game.phase === "menu" || game.phase === "countdown");

    const secs = Math.floor(game.activeTime);
    timeHud.textContent = `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, "0")}`;

    playerHud.innerHTML = game.players.map(p => {
      const dash = p.alive && p.dashCooldown > 0 ? " · Dash" : "";
      const state = p.alive ? `${p.hp} HP · ${p.score}${dash}` : "DOWN";
      return `<span class="badge"><span class="dot" style="background:${colors[p.id % colors.length]}"></span>P${p.id + 1}: ${state}</span>`;
    }).join("");
  }

  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function resetGame() {
    game = makeGame();
    if (net.mode === "host" && net.channels.size) {
      const spots = [{ x: 130, y: 92 }, { x: 92, y: 132 }, { x: 130, y: 132 }];
      for (const id of net.channels.keys()) {
        const spot = spots[(id - 1) % spots.length];
        game.players.push(makePlayer(id, spot.x, spot.y, "remote"));
      }
    }
    touch.dash = false;
    dashBtn.classList.remove("down");
    resetJoystick();
    keys.clear();
    remoteInputs.clear();
    if (net.mode === "host") {
      net.sendTimer = 0;
      sendSnapshot(1);
    }
    updateHud();
  }

  function startGame() {
    if (net.mode === "client" && isChannelOpen()) {
      setNetStatus("Host starts the game.");
      return;
    }
    if (game.over) resetGame();
    game.phase = "countdown";
    game.countdown = 3;
    game.activeTime = 0;
    game.over = false;
    game.won = false;
    game.paused = false;
    keys.clear();
    resetJoystick();
    playSfx("start");
    if (net.mode === "host") {
      net.sendTimer = 0;
      sendSnapshot(1);
    }
    updateHud();
  }

  window.addEventListener("keydown", (e) => {
    primeAudio();
    if ((e.code === "Enter" || e.code === "Space") && !e.repeat && (game.phase === "menu" || game.over)) {
      startGame();
      e.preventDefault();
      return;
    }
    if (e.code === "KeyP" && !e.repeat) {
      togglePause();
      e.preventDefault();
      return;
    }
    keys.add(e.code);
    if (["Space"].includes(e.code)) e.preventDefault();
  });
  window.addEventListener("keyup", (e) => keys.delete(e.code));

  async function toggleFullscreen() {
    try {
      if (document.fullscreenElement) await document.exitFullscreen();
      else await document.documentElement.requestFullscreen();
    } catch {
      setNetStatus("Fullscreen unavailable");
    }
  }

  function togglePause() {
    if (net.mode === "client" && isChannelOpen()) {
      setNetStatus("Host pauses the game.");
      return;
    }
    if (game.over || game.phase !== "playing") return;
    game.paused = !game.paused;
    playSfx(game.paused ? "pause" : "resume");
    if (net.mode === "host") {
      net.sendTimer = 0;
      sendSnapshot(1);
    }
    updateHud();
  }

  document.addEventListener("fullscreenchange", () => {
    fullBtn.textContent = document.fullscreenElement ? "Exit" : "Full";
  });

  fullBtn.addEventListener("click", toggleFullscreen);
  startBtn.addEventListener("click", startGame);
  pauseBtn.addEventListener("click", togglePause);
  resetBtn.addEventListener("click", () => {
    if (net.mode === "client" && isChannelOpen()) {
      setNetStatus("Host resets the game.");
      return;
    }
    resetGame();
  });
  netBtn.addEventListener("click", () => netPanel.classList.toggle("show"));
  canvas.addEventListener("pointerdown", () => {
    if (game.phase === "menu" || game.over) startGame();
  });

  function bindHoldButton(el, prop) {
    const down = (e) => { e.preventDefault(); primeAudio(); touch[prop] = true; el.classList.add("down"); };
    const up = (e) => { e.preventDefault(); touch[prop] = false; el.classList.remove("down"); };
    el.addEventListener("pointerdown", down);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
    el.addEventListener("pointerleave", up);
  }
  bindHoldButton(dashBtn, "dash");

  inviteBtn.addEventListener("click", () => {
    primeAudio();
    beginInvite();
  });
  joinBtn.addEventListener("click", () => {
    primeAudio();
    beginJoin();
  });
  useCodeBtn.addEventListener("click", useIncomingCode);
  scanCodeBtn.addEventListener("click", scanIncomingCode);
  scanVideo.addEventListener("pointerdown", refocusScanner);
  qrCanvas.addEventListener("click", () => {
    if (!outCode.value) return;
    setHidden(outCode, !outCode.classList.contains("hidden"));
    setNetStatus(outCode.classList.contains("hidden") ? "QR ready." : "Code shown.");
  });
  function cancelPairingUi() {
    closePairingAttempt();
    clearCodes();
    setNetStatus(isChannelOpen() ? "Connected" : "Ready.");
  }
  cancelNetBtn.addEventListener("click", cancelPairingUi);
  cancelManualBtn.addEventListener("click", cancelPairingUi);

  function joyPos(e) {
    const rect = joyBase.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const stickSize = joyStick.offsetWidth || 44;
    let dx = e.clientX - cx;
    let dy = e.clientY - cy;
    const max = rect.width * .34;
    const l = Math.hypot(dx, dy);
    if (l > max) { dx = dx / l * max; dy = dy / l * max; }
    joyStick.style.left = `${rect.width / 2 - stickSize / 2 + dx}px`;
    joyStick.style.top = `${rect.height / 2 - stickSize / 2 + dy}px`;
    touch.x = dx / max;
    touch.y = dy / max;
  }

  function resetJoystick() {
    const rect = joyBase.getBoundingClientRect();
    const stickSize = joyStick.offsetWidth || 44;
    touch.active = false;
    touch.joyPointerId = null;
    touch.x = 0;
    touch.y = 0;
    joyStick.style.left = `${rect.width / 2 - stickSize / 2}px`;
    joyStick.style.top = `${rect.height / 2 - stickSize / 2}px`;
  }

  joyBase.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    primeAudio();
    if (touch.active && touch.joyPointerId !== e.pointerId) return;
    touch.joyPointerId = e.pointerId;
    try { joyBase.setPointerCapture(e.pointerId); } catch {}
    touch.active = true;
    joyPos(e);
  });
  joyBase.addEventListener("pointermove", (e) => {
    if (!touch.active || touch.joyPointerId !== e.pointerId) return;
    e.preventDefault();
    joyPos(e);
  });
  function joyUp(e) {
    e.preventDefault();
    if (touch.joyPointerId !== e.pointerId) return;
    resetJoystick();
  }
  joyBase.addEventListener("pointerup", joyUp);
  joyBase.addEventListener("pointercancel", joyUp);
  joyBase.addEventListener("lostpointercapture", resetJoystick);
  window.addEventListener("resize", () => { if (!touch.active) resetJoystick(); });

  resetGame();
  setNetPanelMode("ready");
  requestAnimationFrame((t) => { last = t; requestAnimationFrame(loop); });
})();
</script>
</body>
</html>
