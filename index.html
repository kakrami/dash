<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Coin Dash</title>
<style>
:root{
  --bg:#070b14;--panel:#101a2e;--panel2:#08101e;--line:#7edcff33;--text:#f8fbff;--muted:#aebbd2;
  --primary:#48b8ff;--danger:#ff5a73;--ok:#80ff72;--radius:18px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none;overscroll-behavior:none;-webkit-text-size-adjust:100%}
button,textarea{font:inherit}
button{appearance:none;border:0}
.hide{display:none!important}

.app{position:fixed;inset:0;height:100dvh;background:radial-gradient(circle at 50% -8%,#2553a333,#070b14 46%,#03050b 100%)}
.screen{position:absolute;inset:0;width:100%;height:100%}

/* SETUP: one normal menu page, no game controls mixed into the field */
.setup-screen{overflow:auto;padding:calc(var(--safe-top) + 20px) 16px calc(var(--safe-bottom) + 20px);display:grid;place-items:center}
.setup-card{width:min(720px,100%);display:grid;gap:14px}
.setup-hero,.setup-panel,.game-hud,.touch-deck{background:linear-gradient(180deg,#101a2eee,#060914ee);border:1px solid var(--line);box-shadow:0 12px 34px #0008,inset 0 1px #ffffff16;border-radius:var(--radius);backdrop-filter:blur(10px)}
.setup-hero{padding:18px;display:grid;gap:16px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(180deg,#48b8ff77,#1475c555);box-shadow:inset 0 1px #fff4,0 0 22px #48b8ff44;font-weight:1000;font-size:20px;flex:0 0 auto}
.brand h1{margin:0;font-size:28px;letter-spacing:.03em;text-transform:uppercase}
.brand p{margin:3px 0 0;color:var(--muted);font-weight:800}
.setup-actions{display:grid;grid-template-columns:1fr auto;gap:10px}
.setup-panel{padding:14px;display:grid;gap:12px}
.optional-panel{padding:0;overflow:hidden}
.optional-panel details{display:grid}
.optional-panel summary{list-style:none;cursor:pointer;padding:14px 16px;display:grid;grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"title icon" "hint icon";align-items:center;column-gap:12px;row-gap:2px;font-weight:1000;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:var(--text)}
.optional-panel summary::-webkit-details-marker{display:none}
.optional-panel summary span{grid-area:title}
.optional-panel summary small{grid-area:hint;text-transform:none;letter-spacing:0;font-size:12px;font-weight:800;color:var(--muted)}
.optional-panel summary::after{grid-area:icon;content:'+';width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:#ffffff12;border:1px solid #ffffff1f;color:var(--text);font-size:16px}
.optional-panel details[open] summary::after{content:'–'}
.pairing-body{padding:0 14px 14px;display:grid;gap:12px}
.pair-intro{display:grid;gap:10px}
.pair-intro p{margin:0;color:var(--muted);font-size:13px;font-weight:900;line-height:1.35}
.pair-flow{display:grid;gap:10px}
.pair-head{display:flex;align-items:start;justify-content:space-between;gap:10px;padding:10px;border-radius:14px;background:#ffffff0b;border:1px solid #ffffff12}
.pair-title{font-size:15px;font-weight:1000;color:var(--text)}
.pair-hint{margin-top:2px;color:var(--muted);font-size:12px;font-weight:900;line-height:1.3}
.code-field textarea[readonly]{color:#eaf7ff;background:#06111f}
.section-title{font-size:12px;color:var(--muted);font-weight:1000;text-transform:uppercase;letter-spacing:.08em}
.button-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.code-field{display:grid;gap:7px;padding:10px;border-radius:14px;background:#ffffff09;border:1px solid #ffffff12}
.field-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.code-field label{font-size:12px;color:var(--muted);font-weight:1000;text-transform:uppercase;letter-spacing:.04em}
.field-actions{display:grid;grid-template-columns:1fr;gap:7px}
.field-actions.two{grid-template-columns:1fr 1fr}
.field-actions .btn{width:100%;min-height:36px;padding:0 10px;border-radius:10px;font-size:13px}
.code-field textarea{width:100%;min-height:78px;resize:vertical;border:1px solid #ffffff2d;border-radius:12px;background:#0008;color:#fff;padding:9px;font:800 12px/1.25 ui-monospace,Menlo,Consolas,monospace}
.status{font-size:12px;line-height:1.35;color:var(--muted);background:#ffffff0b;border:1px solid #ffffff12;border-radius:12px;padding:9px}

/* GAME: header, field, controls. Nothing overlays the play area. */
.play-screen{display:flex;flex-direction:column;gap:8px;padding:calc(var(--safe-top) + 8px) 8px calc(var(--safe-bottom) + 8px);overflow:hidden;min-height:0}
.game-hud{flex:0 0 auto;min-height:54px;padding:8px;display:grid;grid-template-columns:auto minmax(0,1fr) auto;grid-template-areas:"score players actions";align-items:center;gap:8px}
.score-card{grid-area:score;display:flex;align-items:center;gap:10px;min-width:0}
.score-card .logo{width:32px;height:32px;border-radius:10px;font-size:15px}
.score-title{font-weight:1000;text-transform:uppercase;letter-spacing:.06em;font-size:13px}
.stats-row{display:flex;gap:8px;color:#e9f5ff;font-size:12px;font-weight:900;white-space:nowrap}
.player-strip{grid-area:players;min-width:0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.player-strip::-webkit-scrollbar,.action-row::-webkit-scrollbar{display:none}
.badge{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:999px;background:#ffffff14;border:1px solid #ffffff18;font-size:12px;font-weight:900;white-space:nowrap}
.dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 10px currentColor}
.action-row{grid-area:actions;display:flex;justify-content:flex-end;gap:6px;overflow-x:auto;scrollbar-width:none;min-width:0}

.btn{min-height:38px;padding:0 14px;border-radius:12px;color:var(--text);font-size:14px;font-weight:1000;cursor:pointer;border:1px solid #ffffff2e;background:linear-gradient(180deg,#ffffff22,#ffffff10);box-shadow:inset 0 1px #ffffff24,0 4px 12px #0005;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn-primary{border-color:#72d3ff70;background:linear-gradient(180deg,#48b8ff66,#1475c546)}
.btn-secondary{background:linear-gradient(180deg,#ffffff1e,#ffffff0c)}
.btn-danger{border-color:#ff8da066;background:linear-gradient(180deg,#ff5a7355,#c5163638)}
.btn-icon{width:42px;padding:0;font-size:18px}
.btn-wide{width:100%}

.game-stage{flex:1 1 auto;min-height:0;display:grid;place-items:center;overflow:hidden;background:linear-gradient(180deg,#0b1222,#060913);border:1px solid #ffffff10;border-radius:18px;padding:3px}
canvas{display:block;image-rendering:auto;background:#10192f;border:1px solid #67d7ff45;border-radius:16px;box-shadow:0 20px 70px #000b,0 0 34px #49c7ff1c;max-width:100%;max-height:100%}
.game-menu{position:absolute;inset:0;z-index:10;display:grid;place-items:center;padding:calc(var(--safe-top) + 14px) 14px calc(var(--safe-bottom) + 14px);background:#020713bf;backdrop-filter:blur(6px)}
.game-menu-card{width:min(360px,92vw);display:grid;gap:10px;padding:16px;border-radius:20px;background:linear-gradient(180deg,#101a2ef5,#060914f5);border:1px solid #7edcff55;box-shadow:0 22px 70px #000b,inset 0 1px #ffffff18;text-align:center}
.menu-kicker{font-size:11px;font-weight:1000;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.game-menu h2{margin:0;font-size:30px;line-height:1;text-transform:uppercase;letter-spacing:.03em}
.game-menu p{margin:0 0 4px;color:var(--muted);font-size:13px;font-weight:800}
.menu-buttons{display:grid;gap:8px}

/* Touch controls live in their own dock, never on the field. */
.touch-deck{flex:0 0 112px;display:none;align-items:center;justify-content:space-between;padding:8px 18px;gap:16px}
.touch-group{display:grid;gap:5px;place-items:center}
.control-label{color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;text-align:center}
.joy{position:relative;width:86px;height:86px;border-radius:50%;background:#ffffff17;border:1px solid #ffffff2e;touch-action:none;box-shadow:0 10px 24px #0006,inset 0 1px #ffffff20}
.stick{position:absolute;left:26px;top:26px;width:34px;height:34px;border-radius:50%;background:#ffffff59;border:1px solid #ffffff47}
.dash{width:68px;height:68px;border-radius:50%;display:grid;place-items:center;touch-action:none;background:radial-gradient(circle at 35% 28%,#fff9,#55d7ff55 38%,#ffffff18 70%);border:1px solid #9eeaff66;font-weight:1000;box-shadow:0 10px 24px #0006,inset 0 0 18px #ffffff1c;text-shadow:0 2px 0 #0008}
.down{background:radial-gradient(circle at 35% 28%,#fff,#5df2ffaa 44%,#ffffff30)!important;box-shadow:0 0 22px #55eaff99,0 10px 24px #0008!important}

@media (hover:none),(pointer:coarse),(max-width:900px){
  .touch-deck{display:flex}
  .game-hud{grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"score actions" "players players";align-items:start}
  .score-card{min-width:0}
  .action-row{max-width:52vw}
  .btn{min-height:36px;padding-inline:10px}
  .brand h1{font-size:24px}
  .setup-actions{grid-template-columns:1fr}
  .setup-screen{place-items:start center}
}
@media (max-width:520px){
  .play-screen{gap:6px;padding-left:6px;padding-right:6px}
  .game-hud{padding:7px}
  .score-title{display:none}
  .stats-row{font-size:12px}
  .badge{font-size:11px;padding:5px 7px}
  .button-grid{grid-template-columns:1fr}
  .field-top{display:grid;grid-template-columns:1fr;align-items:start}
  .field-actions{justify-content:stretch;display:grid;grid-template-columns:1fr 1fr}
  .field-actions .btn{width:100%}
  .brand h1{font-size:22px}
  .touch-deck{flex-basis:104px;padding-inline:14px}
  .joy{width:78px;height:78px}
  .stick{width:32px;height:32px}
  .dash{width:62px;height:62px;font-size:12px}
}
@media (orientation:landscape) and (max-height:560px){
  .play-screen{
    display:grid;
    grid-template-rows:42px minmax(0,1fr);
    grid-template-columns:92px minmax(0,1fr) 92px;
    grid-template-areas:"hud hud hud" "move stage action";
    gap:5px;
    padding:4px;
  }
  .game-hud{
    grid-area:hud;
    min-height:0;
    padding:5px 6px;
    grid-template-columns:auto minmax(0,1fr) auto;
    grid-template-areas:"score players actions";
    align-items:center;
    border-radius:14px;
  }
  .score-card{gap:8px}
  .score-card .logo{width:28px;height:28px;border-radius:9px;font-size:13px}
  .score-title{font-size:12px;line-height:1}
  .stats-row{font-size:11px;line-height:1.1;gap:6px}
  .player-strip{align-items:center;max-width:none}
  .badge{font-size:11px;padding:4px 7px;gap:5px}
  .dot{width:8px;height:8px}
  .action-row{max-width:none;gap:5px}
  .btn{min-height:30px;padding-inline:9px;border-radius:10px;font-size:12px}
  .game-stage{grid-area:stage;border-radius:14px;padding:2px}
  canvas{border-radius:12px}
  .touch-deck{display:contents}
  .touch-group{background:linear-gradient(180deg,#101a2eee,#060914ee);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 22px #0007,inset 0 1px #ffffff16;min-height:0;align-content:center;justify-content:center;padding:6px;gap:4px}
  .touch-group:first-child{grid-area:move}
  .touch-group:last-child{grid-area:action}
  .joy{width:72px;height:72px}
  .stick{width:28px;height:28px}
  .dash{width:62px;height:62px;font-size:12px}
  .control-label{display:none}
  .game-menu{grid-area:stage;padding:8px;background:#020713cc}
  .game-menu-card{width:min(320px,90%);padding:12px;border-radius:16px;gap:8px}
  .game-menu h2{font-size:24px}
  .game-menu p{font-size:12px}
  .menu-buttons{gap:6px}
}
</style>
</head>
<body>
<main class="app">
  <section id="setupScreen" class="screen setup-screen" aria-label="Game setup">
    <div class="setup-card">
      <section class="setup-hero">
        <div class="brand">
          <span class="logo">◆</span>
          <div><h1>Coin Dash</h1><p>Simple setup first. Gameplay stays clean.</p></div>
        </div>
        <div class="setup-actions">
          <button type="button" id="startBtn" class="btn btn-primary">Start Game</button>
          <button type="button" id="fullBtn" class="btn btn-secondary">Fullscreen</button>
        </div>
      </section>

      <section id="net" class="setup-panel optional-panel" aria-label="Player setup">
        <details>
          <summary>
            <span>Multiplayer</span>
            <small>Host or Join</small>
          </summary>
          <div class="pairing-body">
            <div id="pairIntro" class="pair-intro">
              <p>Simple setup</p>
              <div class="button-grid pair-choices">
                <button type="button" id="inviteBtn" class="btn btn-primary">Host</button>
                <button type="button" id="joinBtn" class="btn btn-secondary">Join</button>
              </div>
            </div>

            <div id="pairFlow" class="pair-flow hide">
              <div class="pair-head">
                <div>
                  <div id="pairTitle" class="pair-title">Multiplayer</div>
                  <div id="pairHint" class="pair-hint">Setup</div>
                </div>
                <button type="button" id="cancelPairBtn" class="btn btn-secondary">Back</button>
              </div>

              <div id="inviteField" class="code-field">
                <div class="field-top">
                  <label id="codeLabel" for="code">Invite code</label>
                </div>
                <textarea id="code" placeholder="Code goes here."></textarea>
                <div class="field-actions" id="inviteActions">
                  <button type="button" id="useBtn" class="btn btn-primary hide">Make Answer</button>
                  <button type="button" id="copyInviteBtn" class="btn btn-secondary hide">Copy Invite</button>
                </div>
              </div>

              <div id="answerField" class="code-field hide">
                <div class="field-top">
                  <label id="answerLabel" for="answerCode">Answer code</label>
                </div>
                <textarea id="answerCode" placeholder="Answer code goes here."></textarea>
                <div class="field-actions" id="answerActions">
                  <button type="button" id="answerBtn" class="btn btn-primary hide">Connect</button>
                  <button type="button" id="copyAnswerBtn" class="btn btn-secondary hide">Copy Answer</button>
                </div>
              </div>
            </div>

            <div id="status" class="status">Ready.</div>
          </div>
        </details>
      </section>
    </div>
  </section>

  <section id="playScreen" class="screen play-screen hide" aria-label="Gameplay">
    <header class="game-hud" aria-label="Game status">
      <section class="score-card">
        <span class="logo">◆</span>
        <div>
          <div class="score-title">Coin Dash</div>
          <div class="stats-row"><span><span id="coins">0</span>/<span id="coinMax">0</span> coins</span><span id="clock">0:00</span></div>
        </div>
      </section>
      <section id="players" class="player-strip" aria-label="Players"></section>
      <nav class="action-row" aria-label="Game actions">
        <button type="button" id="pauseBtn" class="btn btn-secondary btn-icon" aria-label="Pause menu" title="Pause menu">☰</button>
      </nav>
    </header>

    <section id="stage" class="game-stage" aria-label="Game area"><canvas id="game" width="960" height="540"></canvas></section>

    <section class="touch-deck" aria-label="Touch controls">
      <div class="touch-group"><div id="joy" class="joy"><div id="stick" class="stick"></div></div><div class="control-label">Move</div></div>
      <div class="touch-group"><div id="dash" class="dash">Dash</div><div class="control-label">Dash</div></div>
    </section>

    <section id="pauseOverlay" class="game-menu hide" role="dialog" aria-modal="true" aria-label="Game menu">
      <div class="game-menu-card">
        <div class="menu-kicker" id="menuKicker">Game Menu</div>
        <h2 id="menuTitle">Paused</h2>
        <p id="menuSubtitle">Game paused.</p>
        <div class="menu-buttons">
          <button type="button" id="resumeBtn" class="btn btn-primary btn-wide">Resume</button>
          <button type="button" id="restartBtn" class="btn btn-secondary btn-wide">Restart Run</button>
          <button type="button" id="setupBtn" class="btn btn-secondary btn-wide">Players / Setup</button>
          <button type="button" id="fullGameBtn" class="btn btn-secondary btn-wide">Fullscreen</button>
        </div>
      </div>
    </section>
  </section>
</main>
<script>


(()=>{'use strict';

const $=id=>document.getElementById(id),cv=$('game'),cx=cv.getContext('2d');
cx.imageSmoothingEnabled=true;
cx.lineJoin='round';
cx.lineCap='round';

const W=cv.width,H=cv.height,colors=['#46d0ff','#ff595e','#8ac926','#ffca3a','#c77dff','#ff9f1c'];

const els={setup:$('setupScreen'),play:$('playScreen'),stage:$('stage'),coins:$('coins'),coinMax:$('coinMax'),clock:$('clock'),players:$('players'),net:$('net'),start:$('startBtn'),pause:$('pauseBtn'),full:$('fullBtn'),pauseOverlay:$('pauseOverlay'),menuKicker:$('menuKicker'),menuTitle:$('menuTitle'),menuSubtitle:$('menuSubtitle'),resume:$('resumeBtn'),restart:$('restartBtn'),setupBack:$('setupBtn'),fullGame:$('fullGameBtn'),pairIntro:$('pairIntro'),pairFlow:$('pairFlow'),pairTitle:$('pairTitle'),pairHint:$('pairHint'),inviteField:$('inviteField'),answerField:$('answerField'),answerCode:$('answerCode'),codeLabel:$('codeLabel'),answerLabel:$('answerLabel'),copyInvite:$('copyInviteBtn'),copyAnswer:$('copyAnswerBtn'),cancelPair:$('cancelPairBtn'),invite:$('inviteBtn'),join:$('joinBtn'),answer:$('answerBtn'),use:$('useBtn'),code:$('code'),status:$('status'),joy:$('joy'),stick:$('stick'),dash:$('dash')};

const walls=[r(0,0,W,24),r(0,H-24,W,24),r(0,0,24,H),r(W-24,0,24,H),r(170,118,110,36),r(380,90,42,120),r(610,124,150,32),r(145,345,150,36),r(470,330,40,120),r(675,340,105,36)];

const coinPos=[[145,90],[335,78],[550,85],[815,86],[90,210],[300,220],[660,225],[875,240],[108,330],[320,315],[615,315],[860,340],[230,455],[430,455],[635,455],[805,455]];

const G={floorA:'#13203b',floorB:'#1c315a',grid:'#79d8ff14',wall:'#2c3f6f',wallTop:'#536ba7',wallEdge:'#111a31',coin:'#ffd166',coinHot:'#fff0a3',enemy:'#ef476f',enemyDark:'#35091a',exit:'#80ff72'};
function rr(x,y,w,h,r,fill,stroke){cx.beginPath();cx.roundRect(x,y,w,h,r);if(fill){cx.fillStyle=fill;cx.fill()}if(stroke){cx.strokeStyle=stroke;cx.stroke()}}
function lg(x0,y0,x1,y1,a,b){let g=cx.createLinearGradient(x0,y0,x1,y1);g.addColorStop(0,a);g.addColorStop(1,b);return g}
function rg(x,y,r,a,b){let g=cx.createRadialGradient(x,y,1,x,y,r);g.addColorStop(0,a);g.addColorStop(1,b);return g}
function shadow(x,y,w,h,a=.35){cx.fillStyle=`rgba(0,0,0,${a})`;cx.beginPath();cx.ellipse(x,y,w,h,0,0,7);cx.fill()}


const keys=new Set(),touch={x:0,y:0,dash:false,on:false,id:null},remoteInputs=new Map();

let game=makeGame(),last=performance.now(),net=netState(),audio=null;

function r(x,y,w,h){return{x,y,w,h}}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function hypot(x,y){return Math.hypot(x,y)}
function player(id,x,y,control='local'){return{id,x,y,vx:0,vy:0,r:15,hp:5,score:0,alive:true,control,cd:0,dt:0,dx:1,dy:0,faceX:1,faceY:0,inv:0,bob:Math.random()*9,trail:[],dashHit:0}}
function enemy(x,y){let a=Math.random()*6.28;
return{x,y,vx:Math.cos(a)*70,vy:Math.sin(a)*70,r:14,stun:0}}
function makeGame(){let coins=coinPos.map((p,i)=>({x:p[0],y:p[1],r:9,taken:false,pulse:i*.3}));
return{players:[player(0,92,92)],coins,enemies:[enemy(520,86),enemy(760,275),enemy(535,470)],phase:'menu',count:0,time:0,over:false,won:false,paused:false,exit:{x:W-68,y:H/2,r:28},shake:0,total:coins.length}}
function netState(){return{role:'solo',pc:null,dc:null,channels:new Map(),localId:0,nextId:1,timer:0}}
function control(p){if(p.control==='remote')return remoteInputs.get(p.id)||{x:0,y:0,dash:false};
let x=0,y=0;
if(keys.has('KeyA')||keys.has('ArrowLeft'))x--;
if(keys.has('KeyD')||keys.has('ArrowRight'))x++;
if(keys.has('KeyW')||keys.has('ArrowUp'))y--;
if(keys.has('KeyS')||keys.has('ArrowDown'))y++;
if(touch.on){x+=touch.x;
y+=touch.y}
let l=hypot(x,y);
if(l>1){x/=l;
y/=l}return{x,y,dash:keys.has('Space')||touch.dash}}
function circleRect(o,b){let cx0=clamp(o.x,b.x,b.x+b.w),cy0=clamp(o.y,b.y,b.y+b.h),dx=o.x-cx0,dy=o.y-cy0,d=hypot(dx,dy);
if(d>=o.r)return false;
if(d<.001){let a=[Math.abs(o.x-b.x),Math.abs(o.x-b.x-b.w),Math.abs(o.y-b.y),Math.abs(o.y-b.y-b.h)],m=Math.min(...a);
dx=m===a[0]?-1:m===a[1]?1:0;
dy=m===a[2]?-1:m===a[3]?1:0;
d=1}
let push=o.r-d;
o.x+=dx/d*push;
o.y+=dy/d*push;
if(Math.abs(dx)>Math.abs(dy))o.vx*=-.25;

return true}

  if(!ub||port<49152||port>65535||!isHex(uf)||!isHex(pw)||!isHex(fp)||uf.length!==8||pw.length!==32||fp.length!==64)throw Error('fallback');

function readNano(s){let g=glyphRead(s),type=g(1)?'answer':'offer',setup=type==='answer'?'active':'actpass',hex=n=>{let h='';while(n--)h+=g(4).toString(16);return h},uf=hex(8),pw=hex(32),fp=hex(64),ub=[];for(let i=0;i<16;i++)ub.push(g(8));return makeSdp(type,setup,uf,pw,fp,bytesUuid(ub),49152+g(14))}
async function encodeDesc(d){try{return writeNano(d)}catch(e){try{return 'U'+writeUltra(d)}catch(e2){return 'M'+dense(writeDesc(d))}}}
function cleanCode(s){return String(s||'').replace(/\s+/g,'').trim()}
async function decodeDesc(s){s=cleanCode(s);if(!s)throw Error('Missing code');if(s.codePointAt(0)>=0x10000)return readNano(s);if(s[0]==='U')return readUltra(s.slice(1));if(s[0]==='M')return readDesc(undense(s.slice(1)));return unpack(s)}
function visibleLen(s){return [...s].length}
function pc(){return new RTCPeerConnection({iceServers:[]})}
function iceDone(p){return new Promise(res=>{if(p.iceGatheringState==='complete')return res();
let t=setTimeout(res,1800);
p.onicegatheringstatechange=()=>{if(p.iceGatheringState==='complete'){clearTimeout(t);
res()}}})}
function setStatus(s){els.status.textContent=s}
function showPairButtons(names){
  for(const b of [els.copyInvite,els.copyAnswer,els.answer,els.use])b.classList.add('hide');
  for(const name of names)els[name].classList.remove('hide');
}
function pairReset(){
  els.pairIntro.classList.remove('hide');
  els.pairFlow.classList.add('hide');
  els.inviteField.classList.remove('hide');
  els.answerField.classList.add('hide');
  showPairButtons([]);
  els.code.value='';
  els.answerCode.value='';
  els.code.readOnly=false;
  els.answerCode.readOnly=false;
  closeNet();
  setStatus('Ready.');
}
function pairMode(mode){
  els.pairIntro.classList.add('hide');
  els.pairFlow.classList.remove('hide');
  els.inviteField.classList.remove('hide');
  els.answerField.classList.toggle('hide',mode!=='host');
  showPairButtons(mode==='host'?[]:['use']);
  els.code.value='';
  els.answerCode.value='';
  if(mode==='host'){
    els.pairTitle.textContent='Host';
    els.pairHint.textContent='Host';
    els.codeLabel.textContent='1. Invite';
    els.answerLabel.textContent='2. Answer';
    els.code.placeholder='Invite code will appear here.';
    els.answerCode.placeholder='Enter answer here.';
    els.code.readOnly=true;
    els.answerCode.readOnly=false;
  }else{
    els.pairTitle.textContent='Join';
    els.pairHint.textContent='Join';
    els.codeLabel.textContent='1. Invite';
    els.answerLabel.textContent='2. Answer';
    els.code.placeholder='Enter invite here.';
    els.answerCode.placeholder='Answer code will appear here.';
    els.code.readOnly=false;
    els.answerCode.readOnly=true;
  }
}
async function copyTextFrom(el,label){
  let text=el.value.trim();
  if(!text){setStatus('No code to copy yet.');return}
  try{
    await navigator.clipboard.writeText(text);
    setStatus(label+' copied.');
  }catch(e){
    el.focus();
    el.select();
    try{document.execCommand('copy');setStatus(label+' copied.')}catch(e2){setStatus(label+' selected. Copy it manually.')}
  }
}
function open(ch,id){ch.onopen=()=>{setStatus('Connected. Host starts game.');
if(net.role==='host'){net.channels.set(id,ch);
if(!game.players.some(p=>p.id===id))game.players.push(player(id,110+id*24,120+id*18,'remote'));
ch.send(pack({t:'welcome',id}));
broadcast()}
else send({t:'join'})};
ch.onmessage=e=>msgNet(unpack(e.data),ch,id);
ch.onclose=()=>{net.channels.delete(id);
setStatus('Player disconnected.')}}
async function safePair(btn,working,fn){
  if(btn){btn.disabled=true;btn.dataset.oldText=btn.textContent;btn.textContent=working}
  try{await fn()}
  catch(e){setStatus(e&&e.message==='Missing code'?'Enter the code first.':'That code did not work. Try copying it again.');console.error(e)}
  finally{if(btn){btn.disabled=false;btn.textContent=btn.dataset.oldText||btn.textContent}}
}
async function invite(){return safePair(els.invite,'Making invite...',async()=>{
closeNet();
pairMode('host');
setStatus('Making invite...');
net=netState();
net.role='host';
net.pc=pc();
let id=net.nextId++,ch=net.pc.createDataChannel('game');
open(ch,id);
net.dc=ch;
let offer=await net.pc.createOffer();
await net.pc.setLocalDescription(offer);
await iceDone(net.pc);
els.code.value=await encodeDesc(net.pc.localDescription);
showPairButtons(['copyInvite','answer']);
setStatus('Invite ready.');
})}
async function join(){closeNet();
pairMode('join');
net=netState();
net.role='client';
net.pc=pc();
net.pc.ondatachannel=e=>{net.dc=e.channel;
open(net.dc,0)};
showPairButtons(['use']);
setStatus('Enter invite.')}
async function useInvite(){return safePair(els.use,'Making...',async()=>{
setStatus('Making answer...');
let offer=await decodeDesc(els.code.value);
await net.pc.setRemoteDescription(offer);
let ans=await net.pc.createAnswer();
await net.pc.setLocalDescription(ans);
await iceDone(net.pc);
els.answerField.classList.remove('hide');
els.answerLabel.textContent='2. Answer';
els.answerCode.value=await encodeDesc(net.pc.localDescription);
showPairButtons(['copyAnswer']);
els.inviteField.classList.add('hide');
els.pairHint.textContent='Join';
setStatus('Answer ready.');
})}
async function useAnswer(){return safePair(els.answer,'Connecting...',async()=>{
setStatus('Connecting...');
let ans=await decodeDesc(els.answerCode.value);
await net.pc.setRemoteDescription(ans);
showPairButtons([]);
setStatus('Connected. Start game.');
})}
function closeNet(){try{net.dc&&net.dc.close();
net.pc&&net.pc.close();
for(const c of net.channels.values())c.close()}catch(e){}
remoteInputs.clear()}
function send(o){let ch=net.dc;
if(ch&&ch.readyState==='open')ch.send(pack(o))}
function msgNet(o,ch,id){if(o.t==='input'&&net.role==='host')remoteInputs.set(id,o.v);
if(o.t==='snap'&&net.role==='client'){game=o.g;
if(game.phase!=='menu')showPlay();
syncGameMenu();
ui()}
if(o.t==='welcome'&&net.role==='client'){net.localId=o.id;
setStatus('Joined as P'+(o.id+1)+'. Wait for Host.')}
if(o.t==='start'&&net.role==='host')startGame();
if(o.t==='join'&&net.role==='host')broadcast()}
function broadcast(dt=1){if(net.role!=='host')return;
net.timer+=dt;
if(dt&&net.timer<.05)return;
net.timer=0;
let data=pack({t:'snap',g:game});
for(const c of net.channels.values())if(c.readyState==='open')c.send(data)}
function sendInput(dt){net.timer+=dt;
if(net.timer<.033)return;
net.timer=0;
send({t:'input',v:control({control:'local'})})}
function loop(now){let dt=Math.min(.033,(now-last)/1000||0);
last=now;
update(dt);
draw()}
function centerStick(){let jb=els.joy.getBoundingClientRect(),sw=els.stick.offsetWidth,sh=els.stick.offsetHeight;els.stick.style.left=(jb.width-sw)/2+'px';els.stick.style.top=(jb.height-sh)/2+'px'}
function pointer(e){let b=els.joy.getBoundingClientRect(),sw=els.stick.offsetWidth,sh=els.stick.offsetHeight,x=e.clientX-(b.left+b.width/2),y=e.clientY-(b.top+b.height/2),l=hypot(x,y),m=Math.min((b.width-sw)/2,l);
touch.x=l?x/l:0;
touch.y=l?y/l:0;
els.stick.style.left=(b.width-sw)/2+touch.x*m+'px';
els.stick.style.top=(b.height-sh)/2+touch.y*m+'px'}
window.addEventListener('keydown',e=>{
if(e.code==='Escape'){
  if(game.paused&&!game.over)resumeGame();
  else openGameMenu();
  e.preventDefault();
  return;
}
keys.add(e.code);
if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()});
window.addEventListener('keyup',e=>keys.delete(e.code));

els.joy.addEventListener('pointerdown',e=>{touch.on=true;
touch.id=e.pointerId;
els.joy.setPointerCapture(e.pointerId);
pointer(e)});
els.joy.addEventListener('pointermove',e=>{if(touch.on&&e.pointerId===touch.id)pointer(e)});
function joyEnd(){touch.on=false;
touch.x=touch.y=0;
centerStick()}
els.joy.addEventListener('pointerup',joyEnd);
els.joy.addEventListener('pointercancel',joyEnd);

els.dash.addEventListener('pointerdown',()=>{touch.dash=true;
els.dash.classList.add('down')});
['pointerup','pointercancel','pointerleave'].forEach(ev=>els.dash.addEventListener(ev,()=>{touch.dash=false;
els.dash.classList.remove('down')}));

els.start.onclick=startGame;
els.pause.onclick=openGameMenu;
els.resume.onclick=resumeGame;
els.restart.onclick=restartRun;
els.setupBack.onclick=showSetup;
function toggleFull(){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.()}
els.full.onclick=toggleFull;
els.fullGame.onclick=toggleFull;
els.invite.onclick=()=>invite();
els.join.onclick=()=>join();
els.use.onclick=()=>useInvite();
els.answer.onclick=()=>useAnswer();
els.copyInvite.onclick=()=>copyTextFrom(els.code,'Invite code');
els.copyAnswer.onclick=()=>copyTextFrom(els.answerCode,'Answer code');
els.cancelPair.onclick=pairReset;


function fitCanvas(){
  let b=els.stage.getBoundingClientRect();
  let availW=Math.max(160,b.width-4), availH=Math.max(120,b.height-4);
  let scale=Math.max(.1,Math.min(availW/W,availH/H));
  cv.style.width=Math.floor(W*scale)+'px';
  cv.style.height=Math.floor(H*scale)+'px';
  cv.style.transform='none';
}
if('ResizeObserver'in window)new ResizeObserver(fitCanvas).observe(els.stage);
window.addEventListener('resize',fitCanvas);
window.addEventListener('orientationchange',()=>setTimeout(fitCanvas,250));

ui();
fitCanvas();
centerStick();
requestAnimationFrame(loop);

})();


</script>
